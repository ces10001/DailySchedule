<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pharmacy Schedule Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Outfit', sans-serif; }
    .mono { font-family: 'Space Mono', monospace; }
    
    @media print {
      .no-print { display: none !important; }
      body { background: white !important; }
      .schedule-container { 
        page-break-inside: avoid;
        box-shadow: none !important;
        border: 1px solid #000 !important;
      }
    }
    
    .schedule-cell {
      border: 1px solid #000;
      padding: 4px 8px;
      text-align: center;
      font-weight: 600;
    }
    
    .gradient-mesh {
      background: 
        radial-gradient(at 40% 20%, rgba(16, 185, 129, 0.15) 0px, transparent 50%),
        radial-gradient(at 80% 0%, rgba(59, 130, 246, 0.1) 0px, transparent 50%),
        radial-gradient(at 0% 50%, rgba(16, 185, 129, 0.1) 0px, transparent 50%),
        radial-gradient(at 80% 50%, rgba(59, 130, 246, 0.08) 0px, transparent 50%),
        radial-gradient(at 0% 100%, rgba(16, 185, 129, 0.12) 0px, transparent 50%),
        linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
    }
    
    .card-shadow {
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(0,0,0,0.02);
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      transition: all 0.2s ease;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
    }
    
    .fade-in {
      animation: fadeIn 0.3s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    input[type="checkbox"] {
      accent-color: #10b981;
    }
    
    .tab-active {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
    }
    
    .modal-overlay {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body class="gradient-mesh min-h-screen">
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo } = React;

    // ============================================================
    // SCHEDULING ENGINE - Ported from VBA V9.9
    // ============================================================
    
    const ScheduleEngine = {
      parseSegment(seg) {
        let startHour = -1;
        let endHour = -1;
        
        seg = (seg || '').trim();
        if (!seg || !seg.includes('-')) return { startHour, endHour };
        
        const parts = seg.split('-');
        if (parts.length < 2) return { startHour, endHour };
        
        let startStr = parts[0].trim();
        let endStr = parts[parts.length - 1].trim();
        
        const startAM = startStr.toUpperCase().includes('AM');
        const startPM = startStr.toUpperCase().includes('PM');
        const endAM = endStr.toUpperCase().includes('AM');
        const endPM = endStr.toUpperCase().includes('PM');
        
        startStr = startStr.replace(/AM|PM/gi, '').trim();
        endStr = endStr.replace(/AM|PM/gi, '').trim();
        
        if (!startStr || !endStr) return { startHour, endHour };
        
        const startParts = startStr.split(':');
        let h = parseFloat(startParts[0]) || 0;
        let m = parseFloat(startParts[1]) || 0;
        startHour = h + m / 60;
        
        const endParts = endStr.split(':');
        h = parseFloat(endParts[0]) || 0;
        m = parseFloat(endParts[1]) || 0;
        endHour = h + m / 60;
        
        if (startPM && startHour < 12) startHour += 12;
        if (startAM && startHour === 12) startHour = 0;
        if (endPM && endHour < 12) endHour += 12;
        if (endAM && endHour === 12) endHour = 0;
        
        if (endPM && !startAM && !startPM && startHour < 12) {
          startHour += 12;
        }
        
        if ((startAM || startPM) && !endAM && !endPM) {
          if (endHour <= 12 && endHour < startHour) {
            endHour += 12;
          }
        }
        
        return { startHour, endHour };
      },
      
      isOnPTO(emp, checkDate) {
        const ptoVal = (emp.ptoText || '').trim();
        if (!ptoVal) return false;
        if (ptoVal === '✓' || ptoVal.toUpperCase() === 'TRUE' || ptoVal === 'X' || ptoVal === 'x') return true;
        
        const ranges = ptoVal.split(',');
        for (let rng of ranges) {
          rng = rng.trim();
          if (rng.includes('-')) {
            const parts = rng.split('-');
            const startDate = new Date(parts[0].trim() + '/' + checkDate.getFullYear());
            const endDate = new Date(parts[1].trim() + '/' + checkDate.getFullYear());
            if (checkDate >= startDate && checkDate <= endDate) return true;
          } else {
            const singleDate = new Date(rng + '/' + checkDate.getFullYear());
            if (checkDate.toDateString() === singleDate.toDateString()) return true;
          }
        }
        return false;
      },
      
      getSched(emp, weekNum, dayNum) {
        if (weekNum === 1) return emp.week1?.[dayNum] || '';
        return emp.week2?.[dayNum] || '';
      },
      
      avail(emp, weekNum, dayNum, block, checkDate, isSunday) {
        if (this.isOnPTO(emp, checkDate)) return false;
        
        const sched = this.getSched(emp, weekNum, dayNum);
        if (!sched || sched.toUpperCase() === 'OFF') return false;
        
        let bS, bE;
        if (isSunday) {
          if (block === 1) { bS = 10; bE = 12; }
          else if (block === 2) { bS = 12; bE = 15; }
          else { bS = 15; bE = 18.25; }
        } else {
          if (block === 1) { bS = 9; bE = 12; }
          else if (block === 2) { bS = 12; bE = 16.25; }
          else { bS = 16; bE = 20.25; }
        }
        
        if (sched.includes('/')) {
          const parts = sched.split('/');
          for (const seg of parts) {
            const { startHour, endHour } = this.parseSegment(seg.trim());
            if (startHour >= 0 && endHour >= 0 && startHour <= bS && endHour >= bE) {
              return true;
            }
          }
          return false;
        } else {
          const { startHour, endHour } = this.parseSegment(sched);
          if (startHour < 0 || endHour < 0) return false;
          return startHour <= bS && endHour >= bE;
        }
      },
      
      availHours(emp, weekNum, dayNum, startH, endH, checkDate) {
        if (this.isOnPTO(emp, checkDate)) return false;
        
        const sched = this.getSched(emp, weekNum, dayNum);
        if (!sched || sched.toUpperCase() === 'OFF') return false;
        
        if (sched.includes('/')) {
          const parts = sched.split('/');
          for (const seg of parts) {
            const { startHour, endHour } = this.parseSegment(seg.trim());
            if (startHour >= 0 && endHour >= 0 && startHour <= startH && endHour >= endH) {
              return true;
            }
          }
          return false;
        } else {
          const { startHour, endHour } = this.parseSegment(sched);
          if (startHour < 0 || endHour < 0) return false;
          return startHour <= startH && endHour >= endH;
        }
      },
      
      arrivesEarly(emp, weekNum, dayNum, checkDate, isSunday) {
        if (this.isOnPTO(emp, checkDate)) return false;
        const sched = this.getSched(emp, weekNum, dayNum);
        if (!sched || sched.toUpperCase() === 'OFF') return false;
        
        const threshold = isSunday ? 9.75 : 8.75;
        let earliest = 99;
        
        if (sched.includes('/')) {
          const parts = sched.split('/');
          for (const seg of parts) {
            const { startHour } = this.parseSegment(seg.trim());
            if (startHour >= 0 && startHour < earliest) earliest = startHour;
          }
        } else {
          const { startHour } = this.parseSegment(sched);
          if (startHour >= 0) earliest = startHour;
        }
        
        return earliest <= threshold;
      },
      
      getEmpStartTime(emp, weekNum, dayNum) {
        const sched = this.getSched(emp, weekNum, dayNum);
        if (!sched || sched.toUpperCase() === 'OFF') return 99;
        
        let earliest = 99;
        if (sched.includes('/')) {
          const parts = sched.split('/');
          for (const seg of parts) {
            const { startHour } = this.parseSegment(seg.trim());
            if (startHour >= 0 && startHour < earliest) earliest = startHour;
          }
        } else {
          const { startHour } = this.parseSegment(sched);
          if (startHour >= 0) earliest = startHour;
        }
        return earliest;
      },
      
      isVaultOnly(emp) {
        return emp.vault && !emp.reception && !emp.lod && !emp.ipad && !emp.registers;
      },
      
      isReceptionOnly(emp) {
        return emp.reception && !emp.lod && !emp.ipad && !emp.registers;
      },
      
      isiPadOnly(emp) {
        return emp.ipad && !emp.reception && !emp.lod && !emp.registers;
      },
      
      isRegistersOnly(emp) {
        return emp.registers && !emp.reception && !emp.lod && !emp.ipad;
      },
      
      worksTwoShifts(emp, weekNum, dayNum, isSunday) {
        const sched = this.getSched(emp, weekNum, dayNum);
        if (!sched || sched.toUpperCase() === 'OFF') return false;
        
        let minStart = 99, maxEnd = 0;
        
        if (sched.includes('/')) {
          const parts = sched.split('/');
          for (const seg of parts) {
            const { startHour, endHour } = this.parseSegment(seg.trim());
            if (startHour >= 0 && startHour < minStart) minStart = startHour;
            if (endHour >= 0 && endHour > maxEnd) maxEnd = endHour;
          }
        } else {
          const { startHour, endHour } = this.parseSegment(sched);
          if (startHour >= 0) minStart = startHour;
          if (endHour >= 0) maxEnd = endHour;
        }
        
        if (isSunday) {
          return minStart <= 10 && maxEnd >= 18;
        } else {
          return (minStart <= 8.75 && maxEnd >= 16.25) || (minStart <= 12 && maxEnd >= 20.25);
        }
      },
      
      worksSingleShift(emp, weekNum, dayNum, isSunday) {
        const sched = this.getSched(emp, weekNum, dayNum);
        if (!sched || sched.toUpperCase() === 'OFF') return false;
        if (isSunday) return false;
        if (this.worksTwoShifts(emp, weekNum, dayNum, isSunday)) return false;
        
        let minStart = 99, maxEnd = 0;
        
        if (sched.includes('/')) {
          const parts = sched.split('/');
          for (const seg of parts) {
            const { startHour, endHour } = this.parseSegment(seg.trim());
            if (startHour >= 0 && startHour < minStart) minStart = startHour;
            if (endHour >= 0 && endHour > maxEnd) maxEnd = endHour;
          }
        } else {
          const { startHour, endHour } = this.parseSegment(sched);
          if (startHour >= 0) minStart = startHour;
          if (endHour >= 0) maxEnd = endHour;
        }
        
        return (minStart <= 12 && maxEnd >= 16.25) || (minStart <= 16 && maxEnd >= 20.25);
      },
      
      findRole(employees, weekNum, dayNum, block, role, used, checkDate, isSunday) {
        // Pass 1: Single-role only
        for (const emp of employees) {
          if (this.isOnPTO(emp, checkDate) || this.isVaultOnly(emp)) continue;
          
          let roleMatch = false;
          let singleRoleMatch = false;
          
          switch (role) {
            case 'REC':
              roleMatch = emp.reception;
              singleRoleMatch = this.isReceptionOnly(emp);
              break;
            case 'IPAD':
              roleMatch = emp.ipad;
              singleRoleMatch = this.isiPadOnly(emp);
              break;
            case 'REG':
              roleMatch = emp.registers;
              singleRoleMatch = this.isRegistersOnly(emp);
              break;
            case 'LOD':
              roleMatch = emp.lod;
              singleRoleMatch = true;
              break;
          }
          
          if (!roleMatch || !singleRoleMatch) continue;
          if (this.avail(emp, weekNum, dayNum, block, checkDate, isSunday) && !used.includes(emp.name)) {
            return emp.name;
          }
        }
        
        // Pass 2: Any with role
        for (const emp of employees) {
          if (this.isOnPTO(emp, checkDate) || this.isVaultOnly(emp)) continue;
          
          let roleMatch = false;
          switch (role) {
            case 'REC': roleMatch = emp.reception; break;
            case 'IPAD': roleMatch = emp.ipad; break;
            case 'REG': roleMatch = emp.registers; break;
            case 'LOD': roleMatch = emp.lod; break;
          }
          
          if (!roleMatch) continue;
          if (this.avail(emp, weekNum, dayNum, block, checkDate, isSunday) && !used.includes(emp.name)) {
            return emp.name;
          }
        }
        
        return 'X';
      },
      
      findRoleRotate(employees, weekNum, dayNum, block, role, used, avoid, checkDate, isSunday) {
        // Pass 1: Single-role, NOT in avoid
        for (const emp of employees) {
          if (this.isOnPTO(emp, checkDate) || this.isVaultOnly(emp)) continue;
          if (avoid.includes(emp.name)) continue;
          
          let roleMatch = false;
          let singleRoleMatch = false;
          
          switch (role) {
            case 'REC':
              roleMatch = emp.reception;
              singleRoleMatch = this.isReceptionOnly(emp);
              break;
            case 'REG':
              roleMatch = emp.registers;
              singleRoleMatch = this.isRegistersOnly(emp);
              break;
          }
          
          if (!roleMatch || !singleRoleMatch) continue;
          if (this.avail(emp, weekNum, dayNum, block, checkDate, isSunday) && !used.includes(emp.name)) {
            return emp.name;
          }
        }
        
        // Pass 2: Multi-role, NOT in avoid
        for (const emp of employees) {
          if (this.isOnPTO(emp, checkDate) || this.isVaultOnly(emp)) continue;
          if (avoid.includes(emp.name)) continue;
          
          let roleMatch = false;
          switch (role) {
            case 'REC': roleMatch = emp.reception; break;
            case 'REG': roleMatch = emp.registers; break;
          }
          
          if (!roleMatch) continue;
          if (this.avail(emp, weekNum, dayNum, block, checkDate, isSunday) && !used.includes(emp.name)) {
            return emp.name;
          }
        }
        
        return this.findRole(employees, weekNum, dayNum, block, role, used, checkDate, isSunday);
      },
      
      findIPadSlot(employees, weekNum, dayNum, startH, endH, used, checkDate) {
        for (const emp of employees) {
          if (this.isOnPTO(emp, checkDate) || this.isVaultOnly(emp)) continue;
          if (!emp.ipad || !this.isiPadOnly(emp)) continue;
          if (this.availHours(emp, weekNum, dayNum, startH, endH, checkDate) && !used.includes(emp.name)) {
            return emp.name;
          }
        }
        
        for (const emp of employees) {
          if (this.isOnPTO(emp, checkDate) || this.isVaultOnly(emp)) continue;
          if (!emp.ipad) continue;
          if (this.availHours(emp, weekNum, dayNum, startH, endH, checkDate) && !used.includes(emp.name)) {
            return emp.name;
          }
        }
        
        return 'X';
      },
      
      findIPadSlotRotate(employees, weekNum, dayNum, startH, endH, used, avoid, checkDate) {
        for (const emp of employees) {
          if (this.isOnPTO(emp, checkDate) || this.isVaultOnly(emp)) continue;
          if (avoid.includes(emp.name)) continue;
          if (!emp.ipad || !this.isiPadOnly(emp)) continue;
          if (this.availHours(emp, weekNum, dayNum, startH, endH, checkDate) && !used.includes(emp.name)) {
            return emp.name;
          }
        }
        
        for (const emp of employees) {
          if (this.isOnPTO(emp, checkDate) || this.isVaultOnly(emp)) continue;
          if (avoid.includes(emp.name)) continue;
          if (!emp.ipad) continue;
          if (this.availHours(emp, weekNum, dayNum, startH, endH, checkDate) && !used.includes(emp.name)) {
            return emp.name;
          }
        }
        
        return this.findIPadSlot(employees, weekNum, dayNum, startH, endH, used, checkDate);
      },
      
      findVaultPerson(employees, weekNum, dayNum, block, used, checkDate, isSunday) {
        for (const emp of employees) {
          if (this.isOnPTO(emp, checkDate)) continue;
          if (emp.vault && this.isVaultOnly(emp)) {
            if (this.avail(emp, weekNum, dayNum, block, checkDate, isSunday) && !used.includes(emp.name)) {
              return emp.name;
            }
          }
        }
        
        for (const emp of employees) {
          if (this.isOnPTO(emp, checkDate)) continue;
          if (emp.vault) {
            if (this.avail(emp, weekNum, dayNum, block, checkDate, isSunday) && !used.includes(emp.name)) {
              return emp.name;
            }
          }
        }
        
        return 'X';
      },
      
      formatTime(hour) {
        const h = Math.floor(hour);
        const m = Math.round((hour - h) * 60);
        const suffix = h >= 12 ? ' PM' : ' AM';
        const displayH = h > 12 ? h - 12 : (h === 0 ? 12 : h);
        return m === 0 ? `${displayH}:00${suffix}` : `${displayH}:${m.toString().padStart(2, '0')}${suffix}`;
      },
      
      isBreakBlocked(breakTime, lunchTimes) {
        for (const lt of lunchTimes) {
          if (breakTime >= lt && breakTime < lt + 0.5) return true;
        }
        return false;
      },
      
      buildDay(employees, weekNum, dayNum, dayDate, isSunday, cleanRotation) {
        const dayNames = ['SUNDAY', 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY'];
        const dayTitle = dayNames[dayDate.getDay()];
        const dateStr = `${dayDate.getMonth() + 1}/${dayDate.getDate()}`;
        
        let t1S, t1E, t2S, t2E, t3S, t3E, cleanTime;
        if (isSunday) {
          t1S = '10:00 AM'; t1E = '12:00 PM';
          t2S = '12:00 PM'; t2E = '3:00 PM';
          t3S = '3:00 PM'; t3E = '6:15 PM';
          cleanTime = '9:30 (9:45) AM - 10:00 AM';
        } else {
          t1S = '9:00 AM'; t1E = '12:00 PM';
          t2S = '12:00 PM'; t2E = '4:15 PM';
          t3S = '4:00 PM'; t3E = '8:15 PM';
          cleanTime = '8:30 (8:45) AM - 9:00 AM';
        }
        
        const earlyList = employees.filter(emp => 
          this.arrivesEarly(emp, weekNum, dayNum, dayDate, isSunday) && !this.isVaultOnly(emp)
        );
        
        const tasks = ['RECEPTION', 'DISPENSARY', 'VACUUM', 'BATHROOMS', 'KITCHEN'];
        const cleaning = tasks.map((task, i) => {
          if (earlyList.length > 0) {
            const idx = (cleanRotation + i) % earlyList.length;
            return { task, name: earlyList[idx].name };
          }
          return { task, name: 'X' };
        });
        
        let u1 = [], u2 = [], u3 = [];
        
        const lod1 = this.findRole(employees, weekNum, dayNum, 1, 'LOD', u1, dayDate, isSunday);
        u1.push(lod1);
        const lod2 = this.findRole(employees, weekNum, dayNum, 2, 'LOD', u2, dayDate, isSunday);
        u2.push(lod2);
        const lod3 = this.findRole(employees, weekNum, dayNum, 3, 'LOD', u3, dayDate, isSunday);
        u3.push(lod3);
        
        const r1 = this.findRole(employees, weekNum, dayNum, 1, 'REC', u1, dayDate, isSunday);
        u1.push(r1);
        const r2 = this.findRole(employees, weekNum, dayNum, 1, 'REC', u1, dayDate, isSunday);
        u1.push(r2);
        
        const r1b2 = this.findRoleRotate(employees, weekNum, dayNum, 2, 'REC', u2, [r1], dayDate, isSunday);
        u2.push(r1b2);
        const r2b2 = this.findRoleRotate(employees, weekNum, dayNum, 2, 'REC', u2, [r2], dayDate, isSunday);
        u2.push(r2b2);
        
        const r1b3 = this.findRoleRotate(employees, weekNum, dayNum, 3, 'REC', u3, [r1, r1b2], dayDate, isSunday);
        u3.push(r1b3);
        const r2b3 = this.findRoleRotate(employees, weekNum, dayNum, 3, 'REC', u3, [r2, r2b2], dayDate, isSunday);
        u3.push(r2b3);
        
        let ip1, ip2a, ip2b, ip3a, ip3b;
        let ipDisplay1, ipDisplay2, ipDisplay3;
        let ipTime1, ipTime2, ipTime3;
        
        if (isSunday) {
          ip1 = this.findIPadSlot(employees, weekNum, dayNum, 10, 12, u1, dayDate);
          u1.push(ip1);
          ip2a = this.findIPadSlotRotate(employees, weekNum, dayNum, 12, 15, u2, [ip1], dayDate);
          u2.push(ip2a);
          ip3a = this.findIPadSlotRotate(employees, weekNum, dayNum, 15, 18.25, u3, [ip1, ip2a], dayDate);
          u3.push(ip3a);
          
          ipDisplay1 = ip1;
          ipDisplay2 = ip2a;
          ipDisplay3 = ip3a;
          ipTime1 = '10:00 AM - 12:00 PM';
          ipTime2 = '12:00 PM - 3:00 PM';
          ipTime3 = '3:00 PM - 6:15 PM';
        } else {
          ip1 = this.findIPadSlot(employees, weekNum, dayNum, 9, 12, u1, dayDate);
          u1.push(ip1);
          
          ip2a = this.findIPadSlotRotate(employees, weekNum, dayNum, 12, 14, u2, [ip1], dayDate);
          u2.push(ip2a);
          ip2b = this.findIPadSlotRotate(employees, weekNum, dayNum, 14, 16, u2, [ip1], dayDate);
          u2.push(ip2b);
          
          ip3a = this.findIPadSlotRotate(employees, weekNum, dayNum, 16, 18, u3, [ip1, ip2a, ip2b], dayDate);
          u3.push(ip3a);
          ip3b = this.findIPadSlotRotate(employees, weekNum, dayNum, 18, 20, u3, [ip1, ip2a, ip2b], dayDate);
          u3.push(ip3b);
          
          ipDisplay1 = ip1;
          ipTime1 = '9:00 AM - 12:00 PM';
          
          if (ip2a === ip2b && ip2a !== 'X') {
            ipDisplay2 = ip2a;
          } else if (ip2a !== 'X' && ip2b !== 'X' && ip2a !== ip2b) {
            ipDisplay2 = `${ip2a} 12-2 / ${ip2b} 2-4`;
          } else if (ip2a !== 'X') {
            ipDisplay2 = `${ip2a} 12-2 / X 2-4`;
          } else if (ip2b !== 'X') {
            ipDisplay2 = `X 12-2 / ${ip2b} 2-4`;
          } else {
            ipDisplay2 = 'X';
          }
          ipTime2 = '12:00 PM - 4:00 PM';
          
          if (ip3a === ip3b && ip3a !== 'X') {
            ipDisplay3 = ip3a;
          } else if (ip3a !== 'X' && ip3b !== 'X' && ip3a !== ip3b) {
            ipDisplay3 = `${ip3a} 4-6 / ${ip3b} 6-8`;
          } else if (ip3a !== 'X') {
            ipDisplay3 = `${ip3a} 4-6 / X 6-8`;
          } else if (ip3b !== 'X') {
            ipDisplay3 = `X 4-6 / ${ip3b} 6-8`;
          } else {
            ipDisplay3 = 'X';
          }
          ipTime3 = '4:00 PM - 8:00 PM';
        }
        
        let uReg1 = [r1, r2, ip1];
        let uReg2 = [r1b2, r2b2, ip2a, ip2b].filter(Boolean);
        let uReg3 = [r1b3, r2b3, ip3a, ip3b].filter(Boolean);
        
        const rg3b1 = this.findRole(employees, weekNum, dayNum, 1, 'REG', uReg1, dayDate, isSunday);
        uReg1.push(rg3b1);
        const a1 = this.findRole(employees, weekNum, dayNum, 1, 'REG', uReg1, dayDate, isSunday);
        uReg1.push(a1);
        const a2 = this.findRole(employees, weekNum, dayNum, 1, 'REG', uReg1, dayDate, isSunday);
        uReg1.push(a2);
        const a3 = this.findRole(employees, weekNum, dayNum, 1, 'REG', uReg1, dayDate, isSunday);
        uReg1.push(a3);
        const rg1 = this.findRole(employees, weekNum, dayNum, 1, 'REG', uReg1, dayDate, isSunday);
        uReg1.push(rg1);
        const rg2 = this.findRole(employees, weekNum, dayNum, 1, 'REG', uReg1, dayDate, isSunday);
        uReg1.push(rg2);
        
        const rg3b2 = this.findRoleRotate(employees, weekNum, dayNum, 2, 'REG', uReg2, [rg3b1], dayDate, isSunday);
        uReg2.push(rg3b2);
        const a1b2 = this.findRoleRotate(employees, weekNum, dayNum, 2, 'REG', uReg2, [a1], dayDate, isSunday);
        uReg2.push(a1b2);
        const a2b2 = this.findRoleRotate(employees, weekNum, dayNum, 2, 'REG', uReg2, [a2], dayDate, isSunday);
        uReg2.push(a2b2);
        const a3b2 = this.findRoleRotate(employees, weekNum, dayNum, 2, 'REG', uReg2, [a3], dayDate, isSunday);
        uReg2.push(a3b2);
        const rg1b2 = this.findRoleRotate(employees, weekNum, dayNum, 2, 'REG', uReg2, [rg1], dayDate, isSunday);
        uReg2.push(rg1b2);
        const rg2b2 = this.findRoleRotate(employees, weekNum, dayNum, 2, 'REG', uReg2, [rg2], dayDate, isSunday);
        uReg2.push(rg2b2);
        
        const rg3b3 = this.findRoleRotate(employees, weekNum, dayNum, 3, 'REG', uReg3, [rg3b1, rg3b2], dayDate, isSunday);
        uReg3.push(rg3b3);
        const a1b3 = this.findRoleRotate(employees, weekNum, dayNum, 3, 'REG', uReg3, [a1, a1b2], dayDate, isSunday);
        uReg3.push(a1b3);
        const a2b3 = this.findRoleRotate(employees, weekNum, dayNum, 3, 'REG', uReg3, [a2, a2b2], dayDate, isSunday);
        uReg3.push(a2b3);
        const a3b3 = this.findRoleRotate(employees, weekNum, dayNum, 3, 'REG', uReg3, [a3, a3b2], dayDate, isSunday);
        uReg3.push(a3b3);
        const rg1b3 = this.findRoleRotate(employees, weekNum, dayNum, 3, 'REG', uReg3, [rg1, rg1b2], dayDate, isSunday);
        uReg3.push(rg1b3);
        const rg2b3 = this.findRoleRotate(employees, weekNum, dayNum, 3, 'REG', uReg3, [rg2, rg2b2], dayDate, isSunday);
        uReg3.push(rg2b3);
        
        let vUsed1 = [...uReg1, lod1];
        const vAU1 = this.findVaultPerson(employees, weekNum, dayNum, 1, vUsed1, dayDate, isSunday);
        vUsed1.push(vAU1);
        const vMed1 = this.findVaultPerson(employees, weekNum, dayNum, 1, vUsed1, dayDate, isSunday);
        
        let vUsed2 = [...uReg2, lod2];
        const vAU2 = this.findVaultPerson(employees, weekNum, dayNum, 2, vUsed2, dayDate, isSunday);
        vUsed2.push(vAU2);
        const vMed2 = this.findVaultPerson(employees, weekNum, dayNum, 2, vUsed2, dayDate, isSunday);
        
        let vUsed3 = [...uReg3, lod3];
        const vAU3 = this.findVaultPerson(employees, weekNum, dayNum, 3, vUsed3, dayDate, isSunday);
        vUsed3.push(vAU3);
        const vMed3 = this.findVaultPerson(employees, weekNum, dayNum, 3, vUsed3, dayDate, isSunday);
        
        const lunchEmployees = employees
          .filter(emp => !this.isVaultOnly(emp) && !this.isOnPTO(emp, dayDate) && this.worksTwoShifts(emp, weekNum, dayNum, isSunday))
          .map(emp => ({ name: emp.name, startTime: this.getEmpStartTime(emp, weekNum, dayNum) }))
          .sort((a, b) => a.startTime - b.startTime);
        
        const lunches = [];
        const lunchTimes = [];
        let lunchTime = 12;
        for (const emp of lunchEmployees) {
          if (lunchTime <= 16.5) {
            lunches.push({ name: emp.name, time: this.formatTime(lunchTime) });
            lunchTimes.push(lunchTime);
            lunchTime += 0.5;
          }
        }
        
        const breakEmployees = employees
          .filter(emp => !this.isVaultOnly(emp) && !this.isOnPTO(emp, dayDate) && this.worksSingleShift(emp, weekNum, dayNum, isSunday));
        
        const breaks = [];
        let breakTime = 14;
        for (const emp of breakEmployees) {
          while (this.isBreakBlocked(breakTime, lunchTimes) && breakTime <= 17) {
            breakTime += 0.25;
          }
          if (breakTime <= 17) {
            breaks.push({ name: emp.name, time: this.formatTime(breakTime) });
            breakTime += 0.25;
          }
        }
        
        const countFilled = (n) => n === 'X' ? 0 : 1;
        const stats = {
          vaultB1: 2, vaultB2: 2, vaultB3: 2,
          recB1: countFilled(r1) + countFilled(r2),
          recB2: countFilled(r1b2) + countFilled(r2b2),
          recB3: countFilled(r1b3) + countFilled(r2b3),
          regB1: countFilled(rg3b1) + countFilled(a1) + countFilled(a2) + countFilled(a3) + countFilled(rg1) + countFilled(rg2),
          regB2: countFilled(rg3b2) + countFilled(a1b2) + countFilled(a2b2) + countFilled(a3b2) + countFilled(rg1b2) + countFilled(rg2b2),
          regB3: countFilled(rg3b3) + countFilled(a1b3) + countFilled(a2b3) + countFilled(a3b3) + countFilled(rg1b3) + countFilled(rg2b3),
          ipadB1: countFilled(ip1),
          ipadB2: isSunday ? countFilled(ip2a) : (countFilled(ip2a) + countFilled(ip2b) >= 1 ? 1 : 0),
          ipadB3: isSunday ? countFilled(ip3a) : (countFilled(ip3a) + countFilled(ip3b) >= 1 ? 1 : 0),
        };
        
        return {
          dayTitle,
          dateStr,
          fullTitle: `${dayTitle} ${dateStr}`,
          cleanTime,
          cleaning,
          times: { t1S, t1E, t2S, t2E, t3S, t3E },
          lod: [
            { name: lod1, time: `${t1S} - ${t1E}` },
            { name: lod2, time: `${t2S} - ${t2E}` },
            { name: lod3, time: `${t3S} - ${t3E}` },
          ],
          reception: [
            { r1, r2, time: `${t1S} - ${t1E}` },
            { r1: r1b2, r2: r2b2, time: `${t2S} - ${t2E}` },
            { r1: r1b3, r2: r2b3, time: `${t3S} - ${t3E}` },
          ],
          ipad: [
            { display: ipDisplay1, time: ipTime1 },
            { display: ipDisplay2, time: ipTime2 },
            { display: ipDisplay3, time: ipTime3 },
          ],
          medCheckout: [
            { mc1: rg1, mc2: rg2, med3au1: rg3b1, time: `${t1S} - ${t1E}` },
            { mc1: rg1b2, mc2: rg2b2, med3au1: rg3b2, time: `${t2S} - ${t2E}` },
            { mc1: rg1b3, mc2: rg2b3, med3au1: rg3b3, time: `${t3S} - ${t3E}` },
          ],
          auCheckout: [
            { au2: a1, au3: a2, au4: a3, time: `${t1S} - ${t1E}` },
            { au2: a1b2, au3: a2b2, au4: a3b2, time: `${t2S} - ${t2E}` },
            { au2: a1b3, au3: a2b3, au4: a3b3, time: `${t3S} - ${t3E}` },
          ],
          vault: [
            { au: vAU1 === 'X' ? 'RPH' : vAU1, med: vMed1 === 'X' ? 'RPH' : vMed1, time: `${t1S} - ${t1E}` },
            { au: vAU2 === 'X' ? 'RPH' : vAU2, med: vMed2 === 'X' ? 'RPH' : vMed2, time: `${t2S} - ${t2E}` },
            { au: vAU3 === 'X' ? 'RPH' : vAU3, med: vMed3 === 'X' ? 'RPH' : vMed3, time: `${t3S} - ${t3E}` },
          ],
          vaultOpen: isSunday ? '9:30 AM - 10:00 AM' : '8:00 AM - 9:00 AM',
          lunches,
          breaks,
          stats,
          isSunday,
          weekNum,
          dayNum,
          date: dayDate.toISOString(),
          generatedAt: new Date().toISOString(),
        };
      },
      
      generateSingleDay(employees, targetDate, week1Start, week2Start, cleanRotation = 0) {
        const w1 = new Date(week1Start);
        const w2 = new Date(week2Start);
        const target = new Date(targetDate);
        
        let weekNum = 0;
        let dayNum = 0;
        
        for (let d = 0; d < 7; d++) {
          const checkDate = new Date(w1);
          checkDate.setDate(checkDate.getDate() + d);
          if (checkDate.toDateString() === target.toDateString()) {
            weekNum = 1;
            dayNum = d + 1;
            break;
          }
        }
        
        if (weekNum === 0) {
          for (let d = 0; d < 7; d++) {
            const checkDate = new Date(w2);
            checkDate.setDate(checkDate.getDate() + d);
            if (checkDate.toDateString() === target.toDateString()) {
              weekNum = 2;
              dayNum = d + 1;
              break;
            }
          }
        }
        
        if (weekNum === 0) return null;
        
        const isSunday = dayNum === 7;
        return this.buildDay(employees, weekNum, dayNum, target, isSunday, cleanRotation);
      },
      
      generateAllSchedules(employees, week1Start, week2Start) {
        const schedules = [];
        let cleanRotation = 0;
        
        for (let w = 1; w <= 2; w++) {
          const weekStart = w === 1 ? new Date(week1Start) : new Date(week2Start);
          for (let d = 1; d <= 7; d++) {
            const dayDate = new Date(weekStart);
            dayDate.setDate(dayDate.getDate() + (d - 1));
            const isSunday = d === 7;
            
            const schedule = this.buildDay(employees, w, d, dayDate, isSunday, cleanRotation);
            schedules.push(schedule);
            cleanRotation++;
          }
        }
        
        return schedules;
      }
    };

            <div className="grid grid-cols-7 gap-1">
              {dayNames.map((day, i) => (
                <input key={i} type="text" value={form.week1[i + 1] || ''} onChange={(e) => setForm({ ...form, week1: { ...form.week1, [i + 1]: e.target.value } })}
                  className="px-1 py-1 text-xs border rounded text-center" placeholder={day} />
              ))}
            </div>
          </div>
          <div className="mb-3">
            <label className="block text-xs font-medium mb-1">Week 2</label>
            <div className="grid grid-cols-7 gap-1">
              {dayNames.map((day, i) => (
                <input key={i} type="text" value={form.week2[i + 1] || ''} onChange={(e) => setForm({ ...form, week2: { ...form.week2, [i + 1]: e.target.value } })}
                  className="px-1 py-1 text-xs border rounded text-center" placeholder={day} />
              ))}
            </div>
          </div>
          <div className="flex gap-2">
            <button onClick={() => onSave(form)} className="btn-primary px-4 py-2 text-white rounded-lg text-sm font-medium">Save</button>
            <button onClick={onCancel} className="px-4 py-2 bg-gray-200 rounded-lg text-sm">Cancel</button>
          </div>
        </div>
      );
    };
    
    const LoginModal = ({ onLogin, onClose }) => {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      
      const handleLogin = () => {
        if (username === 'supervisor' && password === 'admin123') {
          onLogin();
        } else {
          setError('Invalid username or password');
        }
      };
      
      return (
        <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50">
          <div className="bg-white rounded-xl p-8 w-full max-w-md card-shadow fade-in">
            <h2 className="text-2xl font-bold mb-6 text-center">Supervisor Login</h2>
            {error && <div className="mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm">{error}</div>}
            <div className="mb-4">
              <label className="block text-sm font-medium mb-1">Username</label>
              <input type="text" value={username} onChange={(e) => setUsername(e.target.value)}
                className="w-full px-4 py-3 border rounded-lg" placeholder="Enter username" />
            </div>
            <div className="mb-6">
              <label className="block text-sm font-medium mb-1">Password</label>
              <input type="password" value={password} onChange={(e) => setPassword(e.target.value)}
                className="w-full px-4 py-3 border rounded-lg" placeholder="Enter password" onKeyPress={(e) => e.key === 'Enter' && handleLogin()} />
            </div>
            <div className="flex gap-3">
              <button onClick={handleLogin} className="flex-1 btn-primary px-4 py-3 text-white rounded-lg font-bold">Login</button>
              <button onClick={onClose} className="px-4 py-3 bg-gray-200 rounded-lg font-medium">Cancel</button>
            </div>
          </div>
        </div>
      );
    };
    
    const MonthlyCalendar = ({ generatedDays, onDayClick, week1Start, week2Start }) => {
      const today = new Date();
      const [viewMonth, setViewMonth] = useState(today.getMonth());
      const [viewYear, setViewYear] = useState(today.getFullYear());
      
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
      const firstDayOfMonth = new Date(viewYear, viewMonth, 1).getDay();
      const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
      
      const days = [];
      for (let i = 0; i < firstDayOfMonth; i++) days.push(null);
      for (let i = 1; i <= daysInMonth; i++) days.push(i);
      
      const isDateGenerated = (day) => {
        if (!day) return null;
        const dateStr = `${viewYear}-${String(viewMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        return generatedDays[dateStr];
      };
      
      const isInScheduleRange = (day) => {
        if (!day || !week1Start || !week2Start) return false;
        const date = new Date(viewYear, viewMonth, day);
        const w1 = new Date(week1Start);
        const w2End = new Date(week2Start);
        w2End.setDate(w2End.getDate() + 6);
        return date >= w1 && date <= w2End;
      };
      
      return (
        <div className="bg-white rounded-lg card-shadow p-4">
          <div className="flex items-center justify-between mb-3">
            <button onClick={() => { if (viewMonth === 0) { setViewMonth(11); setViewYear(viewYear - 1); } else setViewMonth(viewMonth - 1); }}
              className="p-1 hover:bg-gray-100 rounded text-lg">←</button>
            <h3 className="font-bold">{monthNames[viewMonth]} {viewYear}</h3>
            <button onClick={() => { if (viewMonth === 11) { setViewMonth(0); setViewYear(viewYear + 1); } else setViewMonth(viewMonth + 1); }}
              className="p-1 hover:bg-gray-100 rounded text-lg">→</button>
          </div>
          <div className="grid grid-cols-7 gap-1 text-center text-xs font-medium text-gray-500 mb-1">
            {['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'].map(d => <div key={d}>{d}</div>)}
          </div>
          <div className="grid grid-cols-7 gap-1">
            {days.map((day, i) => {
              const generated = isDateGenerated(day);
              const inRange = isInScheduleRange(day);
              const isToday = day === today.getDate() && viewMonth === today.getMonth() && viewYear === today.getFullYear();
              
              return (
                <div key={i} onClick={() => day && inRange && onDayClick(new Date(viewYear, viewMonth, day))}
                  className={`p-1 min-h-[50px] text-xs rounded border ${!day ? 'bg-gray-50 border-transparent' : ''} ${day && inRange ? 'cursor-pointer hover:bg-gray-50' : ''} ${day && !inRange ? 'opacity-30' : ''} ${generated ? 'bg-emerald-100 border-emerald-400' : 'border-gray-200'} ${isToday ? 'ring-2 ring-blue-500' : ''}`}>
                  {day && (
                    <>
                      <div className={`font-bold ${isToday ? 'text-blue-600' : ''}`}>{day}</div>
                      {generated && <div className="text-[8px] text-emerald-700 mt-0.5">✓ {new Date(generated).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>}
                    </>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    };
    
    // ============================================================
    // MAIN APP
    // ============================================================
    
    const App = () => {
      const [tab, setTab] = useState('schedule');
      const [employees, setEmployees] = useState([]);
      const [schedules, setSchedules] = useState([]);
      const [generatedDays, setGeneratedDays] = useState({});
      const [week1Start, setWeek1Start] = useState('');
      const [week2Start, setWeek2Start] = useState('');
      const [selectedDay, setSelectedDay] = useState(0);
      const [editingEmployee, setEditingEmployee] = useState(null);
      const [showAddForm, setShowAddForm] = useState(false);
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [showLoginModal, setShowLoginModal] = useState(false);
      
      useEffect(() => {
        const saved = localStorage.getItem('pharmacy-scheduler');
        if (saved) {
          const data = JSON.parse(saved);
          setEmployees(data.employees || []);
          setWeek1Start(data.week1Start || '');
          setWeek2Start(data.week2Start || '');
          setSchedules(data.schedules || []);
          setGeneratedDays(data.generatedDays || {});
        }
      }, []);
      
      useEffect(() => {
        localStorage.setItem('pharmacy-scheduler', JSON.stringify({ employees, week1Start, week2Start, schedules, generatedDays, savedDate: new Date().toDateString() }));
      }, [employees, week1Start, week2Start, schedules, generatedDays]);
      
      const todaySchedule = useMemo(() => {
        if (schedules.length === 0) return null;
        const today = new Date().toDateString();
        return schedules.find(s => new Date(s.date).toDateString() === today) || null;
      }, [schedules]);
      
      const generateAllSchedules = () => {
        if (!week1Start || !week2Start || employees.length === 0) return;
        const scheds = ScheduleEngine.generateAllSchedules(employees, week1Start, week2Start);
        setSchedules(scheds);
        const newGenerated = { ...generatedDays };
        scheds.forEach(s => {
          const dateKey = new Date(s.date).toISOString().split('T')[0];
          newGenerated[dateKey] = new Date().toISOString();
        });
        setGeneratedDays(newGenerated);
        setSelectedDay(0);
      };
      
      const generateSingleDay = (targetDate) => {
        if (!week1Start || !week2Start || employees.length === 0) return;
        const schedule = ScheduleEngine.generateSingleDay(employees, targetDate, week1Start, week2Start);
        if (!schedule) return;
        
        const dateKey = new Date(targetDate).toISOString().split('T')[0];
        const existingIndex = schedules.findIndex(s => new Date(s.date).toISOString().split('T')[0] === dateKey);
        
        const newSchedules = [...schedules];
        if (existingIndex >= 0) newSchedules[existingIndex] = schedule;
        else { newSchedules.push(schedule); newSchedules.sort((a, b) => new Date(a.date) - new Date(b.date)); }
        setSchedules(newSchedules);
        setGeneratedDays({ ...generatedDays, [dateKey]: new Date().toISOString() });
        
        const newIndex = newSchedules.findIndex(s => new Date(s.date).toISOString().split('T')[0] === dateKey);
        setSelectedDay(newIndex >= 0 ? newIndex : 0);
      };
      
      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const data = new Uint8Array(evt.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet, { header: 1 });
            
            const newEmployees = [];
            for (let i = 2; i < json.length; i++) {
              const row = json[i];
              if (!row[0]) continue;
              const isCheck = (v) => v === '✓' || v === 'X' || v === 'x' || v === true || v === 'TRUE';
              newEmployees.push({
                name: row[0] || '', vault: isCheck(row[1]), reception: isCheck(row[2]), lod: isCheck(row[3]), ipad: isCheck(row[4]), registers: isCheck(row[5]), ptoText: row[6] || '', notes: row[7] || '',
                week1: { 1: row[8] || '', 2: row[9] || '', 3: row[10] || '', 4: row[11] || '', 5: row[12] || '', 6: row[13] || '', 7: row[14] || '' },
                week2: { 1: row[15] || '', 2: row[16] || '', 3: row[17] || '', 4: row[18] || '', 5: row[19] || '', 6: row[20] || '', 7: row[21] || '' }
              });
            }
            setEmployees(newEmployees);
          } catch (err) { console.error(err); }
        };
        reader.readAsArrayBuffer(file);
      };
      
      const handleSaveEmployee = (emp) => {
        if (editingEmployee !== null) { const updated = [...employees]; updated[editingEmployee] = emp; setEmployees(updated); setEditingEmployee(null); }
        else { setEmployees([...employees, emp]); setShowAddForm(false); }
      };
      
      const handleCalendarDayClick = (date) => {
        const dateKey = date.toISOString().split('T')[0];
        const existingIndex = schedules.findIndex(s => new Date(s.date).toISOString().split('T')[0] === dateKey);
        if (existingIndex >= 0) setSelectedDay(existingIndex);
        else generateSingleDay(date);
      };
      
      return (
        <div className="min-h-screen pb-20">
          {showLoginModal && <LoginModal onLogin={() => { setIsLoggedIn(true); setShowLoginModal(false); }} onClose={() => setShowLoginModal(false)} />}
          
          <header className="no-print bg-white/80 backdrop-blur-sm border-b sticky top-0 z-40">
            <div className="max-w-[1800px] mx-auto px-4 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-400 to-emerald-600 flex items-center justify-center">
                    <span className="text-white text-xl">📋</span>
                  </div>
                  <h1 className="text-xl font-bold text-gray-900">Scheduler</h1>
                </div>
                
                <div className="flex items-center gap-4">
                  <div className="flex gap-2">
                    <button onClick={() => setTab('schedule')} className={`px-4 py-2 rounded-lg font-medium text-sm transition-all ${tab === 'schedule' ? 'tab-active' : 'bg-gray-100 hover:bg-gray-200'}`}>
                      Daily Schedule
                    </button>
                    {isLoggedIn && (
                      <>
                        <button onClick={() => setTab('employees')} className={`px-4 py-2 rounded-lg font-medium text-sm transition-all ${tab === 'employees' ? 'tab-active' : 'bg-gray-100 hover:bg-gray-200'}`}>
                          Employee Master Schedule
                        </button>
                        <button onClick={() => setTab('summary')} className={`px-4 py-2 rounded-lg font-medium text-sm transition-all ${tab === 'summary' ? 'tab-active' : 'bg-gray-100 hover:bg-gray-200'}`}>
                          Staffing Summary
                        </button>
                      </>
                    )}
                  </div>
                  
                  {!isLoggedIn ? (
                    <button onClick={() => setShowLoginModal(true)} className="px-4 py-2 bg-gray-800 text-white rounded-lg font-medium text-sm hover:bg-gray-900">
                      🔐 Supervisor Login
                    </button>
                  ) : (
                    <button onClick={() => { setIsLoggedIn(false); setTab('schedule'); }} className="px-4 py-2 bg-red-600 text-white rounded-lg font-medium text-sm hover:bg-red-700">
                      Logout
                    </button>
                  )}
                </div>
              </div>
            </div>
          </header>
          
          <main className="max-w-[1800px] mx-auto px-4 py-6">
            {/* Daily Schedule Tab - Public */}
            {tab === 'schedule' && (
              <div className="fade-in">
                {todaySchedule ? (
                  <>
                    <div className="no-print flex items-center justify-between mb-4">
                      <h2 className="text-xl font-bold">Today's Schedule</h2>
                      <button onClick={() => window.print()} className="px-4 py-2 bg-gray-800 text-white rounded-lg font-medium hover:bg-gray-900">🖨️ Print</button>
                    </div>
                    <ScheduleDisplay schedule={todaySchedule} />
                  </>
                ) : (
                  <div className="text-center py-12 bg-white rounded-lg card-shadow">
                    <span className="text-5xl mb-4 block">📅</span>
                    <p className="text-gray-500 mb-4">No schedule available for today.</p>
                    {isLoggedIn ? (
                      <button onClick={() => setTab('employees')} className="btn-primary px-6 py-2 text-white rounded-lg font-medium">Go to Employee Master Schedule →</button>
                    ) : (
                      <p className="text-sm text-gray-400">Please contact a supervisor to generate schedules.</p>
                    )}
                  </div>
                )}
              </div>
            )}
            
            {/* Employee Master Schedule Tab - Supervisor Only */}
            {tab === 'employees' && isLoggedIn && (
              <div className="fade-in">
                <div className="grid grid-cols-12 gap-4">
                  {/* Left Column */}
                  <div className="col-span-3">
                    <div className="bg-white p-4 rounded-lg card-shadow mb-4">
                      <h3 className="font-bold mb-3">Schedule Period</h3>
                      <div className="space-y-2">
                        <div>
                          <label className="block text-xs font-medium mb-1">Week 1 Start</label>
                          <input type="date" value={week1Start} onChange={(e) => { setWeek1Start(e.target.value); const d = new Date(e.target.value); d.setDate(d.getDate() + 7); setWeek2Start(d.toISOString().split('T')[0]); }}
                            className="w-full px-2 py-1.5 text-sm border rounded-lg" />
                        </div>
                        <div>
                          <label className="block text-xs font-medium mb-1">Week 2 Start</label>
                          <input type="date" value={week2Start} onChange={(e) => setWeek2Start(e.target.value)} className="w-full px-2 py-1.5 text-sm border rounded-lg" />
                        </div>
                      </div>
                      {employees.length > 0 && week1Start && week2Start && (
                        <button onClick={generateAllSchedules} className="mt-3 btn-primary px-3 py-2 text-white rounded-lg font-bold text-sm w-full">
                          🗓️ Generate All 14 Days
                        </button>
                      )}
                    </div>
                    
                    <MonthlyCalendar generatedDays={generatedDays} onDayClick={handleCalendarDayClick} week1Start={week1Start} week2Start={week2Start} />
                    
                    <div className="mt-4 bg-white p-4 rounded-lg card-shadow">
                      <h3 className="font-bold mb-2">Import</h3>
                      <label className="block">
                        <div className="border-2 border-dashed border-gray-300 rounded-lg p-3 text-center cursor-pointer hover:border-emerald-500 hover:bg-emerald-50 transition-all">
                          <span className="text-xl">📁</span>
                          <p className="text-xs font-medium text-gray-700">Upload Excel</p>
                          <input type="file" accept=".xlsx,.xls,.csv" onChange={handleFileUpload} className="hidden" />
                        </div>
                      </label>
                      <button onClick={() => setShowAddForm(true)} className="mt-2 w-full px-3 py-1.5 bg-gray-100 rounded-lg text-xs font-medium hover:bg-gray-200">
                        ➕ Add Manually
                      </button>
                    </div>
                  </div>
                  
                  {/* Right Column */}
                  <div className="col-span-9">
                    {/* Day Selector */}
                    {schedules.length > 0 && (
                      <div className="flex flex-wrap gap-1 mb-3">
                        {schedules.map((s, i) => (
                          <button key={i} onClick={() => setSelectedDay(i)}
                            className={`px-2 py-1 rounded text-xs font-medium transition-all ${selectedDay === i ? 'bg-emerald-600 text-white' : 'bg-white hover:bg-gray-100 border'}`}>
                            {s.isSunday ? '☀️' : ''} {s.dateStr}
                          </button>
                        ))}
                      </div>
                    )}
                    
                    {(showAddForm || editingEmployee !== null) && (
                      <div className="mb-3">
                        <EmployeeForm employee={editingEmployee !== null ? employees[editingEmployee] : null} onSave={handleSaveEmployee} onCancel={() => { setShowAddForm(false); setEditingEmployee(null); }} />
                      </div>
                    )}
                    
                    {schedules.length > 0 && schedules[selectedDay] && (
                      <div className="mb-4">
                        <ScheduleDisplay schedule={schedules[selectedDay]} />
                      </div>
                    )}
                    
                    {employees.length > 0 && (
                      <div className="bg-white rounded-lg card-shadow overflow-hidden">
                        <div className="bg-gray-800 text-white px-4 py-2 flex justify-between items-center">
                          <h3 className="font-bold text-sm">Master Schedule ({employees.length})</h3>
                          {schedules.length > 0 && <span className="text-emerald-300 text-xs">🟢 = Scheduled for {schedules[selectedDay]?.fullTitle}</span>}
                        </div>
                        <div className="overflow-x-auto max-h-[300px] overflow-y-auto">
                          <table className="w-full text-xs">
                            <thead className="sticky top-0 z-10">
                              <tr className="bg-gray-100">
                                <th className="px-2 py-1 text-left font-semibold sticky left-0 bg-gray-100 z-20">Name</th>
                                <th className="px-1 py-1 text-center">V</th>
                                <th className="px-1 py-1 text-center">R</th>
                                <th className="px-1 py-1 text-center">L</th>
                                <th className="px-1 py-1 text-center">I</th>
                                <th className="px-1 py-1 text-center">Reg</th>
                                <th className="px-1 py-1 text-center">PTO</th>
                                {['M','T','W','Th','F','Sa','Su'].map((d,i) => <th key={`w1-${i}`} className="px-1 py-1 text-center bg-blue-50 text-[10px]">{d}</th>)}
                                {['M','T','W','Th','F','Sa','Su'].map((d,i) => <th key={`w2-${i}`} className="px-1 py-1 text-center bg-green-50 text-[10px]">{d}</th>)}
                                <th className="px-1 py-1"></th>
                              </tr>
                            </thead>
                            <tbody>
                              {employees.map((emp, idx) => {
                                const currentSchedule = schedules[selectedDay];
                                let isScheduledToday = false;
                                if (currentSchedule) {
                                  const allNames = [...currentSchedule.lod.map(l => l.name), ...currentSchedule.reception.flatMap(r => [r.r1, r.r2]), ...currentSchedule.ipad.map(i => i.display),
                                    ...currentSchedule.medCheckout.flatMap(m => [m.mc1, m.mc2, m.med3au1]), ...currentSchedule.auCheckout.flatMap(a => [a.au2, a.au3, a.au4]),
                                    ...currentSchedule.vault.flatMap(v => [v.au, v.med]), ...currentSchedule.cleaning.map(c => c.name), ...currentSchedule.lunches.map(l => l.name), ...currentSchedule.breaks.map(b => b.name)
                                  ].map(n => n?.toUpperCase());
                                  isScheduledToday = allNames.includes(emp.name.toUpperCase());
                                }
                                
                                return (
                                  <tr key={idx} className={`border-t ${isScheduledToday ? 'bg-emerald-50' : 'hover:bg-gray-50'}`}>
                                    <td className={`px-2 py-1 font-medium sticky left-0 ${isScheduledToday ? 'bg-emerald-100' : 'bg-white'}`}>{isScheduledToday && '🟢 '}{emp.name}</td>
                                    <td className="px-1 py-1 text-center">{emp.vault && <div className="w-3 h-3 mx-auto rounded bg-emerald-500"></div>}</td>
                                    <td className="px-1 py-1 text-center">{emp.reception && <div className="w-3 h-3 mx-auto rounded bg-emerald-500"></div>}</td>
                                    <td className="px-1 py-1 text-center">{emp.lod && <div className="w-3 h-3 mx-auto rounded bg-emerald-500"></div>}</td>
                                    <td className="px-1 py-1 text-center">{emp.ipad && <div className="w-3 h-3 mx-auto rounded bg-emerald-500"></div>}</td>
                                    <td className="px-1 py-1 text-center">{emp.registers && <div className="w-3 h-3 mx-auto rounded bg-emerald-500"></div>}</td>
                                    <td className="px-1 py-1 text-center text-[10px]">{emp.ptoText || '-'}</td>
                                    {[1,2,3,4,5,6,7].map(d => <td key={`w1-${d}`} className="px-1 py-1 text-center text-[10px] bg-blue-50/30 max-w-[40px] truncate">{emp.week1?.[d] || '-'}</td>)}
                                    {[1,2,3,4,5,6,7].map(d => <td key={`w2-${d}`} className="px-1 py-1 text-center text-[10px] bg-green-50/30 max-w-[40px] truncate">{emp.week2?.[d] || '-'}</td>)}
                                    <td className="px-1 py-1"><button onClick={() => setEditingEmployee(idx)} className="text-blue-600 hover:underline text-[10px]">Edit</button></td>
                                  </tr>
                                );
                              })}
                            </tbody>
                          </table>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            )}
            
            {/* Staffing Summary Tab */}
            {tab === 'summary' && isLoggedIn && (
              <div className="fade-in">
                {schedules.length > 0 ? <StaffingSummary schedules={schedules} /> : (
                  <div className="text-center py-12 bg-white rounded-lg card-shadow">
                    <p className="text-gray-500">Generate schedules first to see the summary.</p>
                  </div>
                )}
              </div>
            )}
          </main>
        </div>
      );
    };
    
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
