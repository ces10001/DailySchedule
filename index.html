<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// ============== CONSTANTS ==============
const COLORS = ['#3B82F6','#EF4444','#10B981','#F59E0B','#8B5CF6','#EC4899','#06B6D4','#84CC16','#F97316','#6366F1','#14B8A6','#F43F5E','#0EA5E9','#A855F7','#22C55E','#EAB308','#E11D48','#7C3AED','#0D9488','#DC2626','#2563EB','#16A34A'];
const CLEANING_AREAS = ['RECEPTION','DISPENSARY','VACUUM','BATHROOMS','KITCHEN'];
const CLEANING_TASKS = {
  RECEPTION: ['Wipe down front counter','Clean glass doors','Sweep and mop floor','Empty trash','Organize displays','Sanitize touchscreens'],
  DISPENSARY: ['Wipe down counters','Clean screens/keyboards','Organize bins','Restock supplies','Clean printers','Sanitize stations'],
  VACUUM: ['Vacuum carpeted areas','Vacuum behind counters','Vacuum break room','Empty vacuum','Check for clogs'],
  BATHROOMS: ['Sanitize toilets','Clean sinks/mirrors','Refill supplies','Empty trash','Mop floors'],
  KITCHEN: ['Wash dishes','Wipe counters','Clean microwave','Clean fridge','Empty trash','Mop floor']
};
const TIME_SLOTS = [
  {v:'',l:'OFF'},{v:'8:30 AM - 12:00 PM',l:'8:30 AM - 12:00 PM'},{v:'8:45 AM - 12:00 PM',l:'8:45 AM - 12:00 PM'},
  {v:'8:30 AM - 4:15 PM',l:'8:30 AM - 4:15 PM'},{v:'8:45 AM - 4:15 PM',l:'8:45 AM - 4:15 PM'},
  {v:'12:00 PM - 8:15 PM',l:'12:00 PM - 8:15 PM'},{v:'12:00 PM - 4:15 PM',l:'12:00 PM - 4:15 PM'},
  {v:'4:00 PM - 8:15 PM',l:'4:00 PM - 8:15 PM'},{v:'8:30 AM - 8:15 PM',l:'8:30 AM - 8:15 PM'},{v:'8:45 AM - 8:15 PM',l:'8:45 AM - 8:15 PM'}
];
const SUNDAY_SLOTS = [{v:'',l:'OFF'},{v:'9:30 AM - 6:15 PM',l:'9:30 AM - 6:15 PM'},{v:'9:45 AM - 6:15 PM',l:'9:45 AM - 6:15 PM'}];

// ============== UTILITIES ==============
const formatEST = (iso) => new Date(iso).toLocaleString('en-US',{timeZone:'America/New_York',month:'numeric',day:'numeric',year:'2-digit',hour:'numeric',minute:'2-digit',hour12:true});
const getESTHour = () => parseInt(new Date().toLocaleString('en-US',{timeZone:'America/New_York',hour:'numeric',hour12:false}));
const formatTime = (h) => { const hr = Math.floor(h), m = Math.round((h-hr)*60), sfx = hr >= 12 ? ' PM' : ' AM', dh = hr > 12 ? hr-12 : (hr === 0 ? 12 : hr); return m === 0 ? dh+':00'+sfx : dh+':'+String(m).padStart(2,'0')+sfx; };
const toDateKey = (d) => d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
const todayKey = () => toDateKey(new Date());

// ============== UTILITIES (continued) ==============

// ============== SCHEDULING ENGINE ==============
const Engine = {
  parse(seg) {
    if (!seg || !seg.includes('-')) return { s: -1, e: -1 };
    const pts = seg.split('-'), startStr = pts[0].trim(), endStr = pts[pts.length-1].trim();
    const sAM = /AM/i.test(startStr), sPM = /PM/i.test(startStr), eAM = /AM/i.test(endStr), ePM = /PM/i.test(endStr);
    const sp = startStr.replace(/AM|PM/gi,'').trim().split(':'), ep = endStr.replace(/AM|PM/gi,'').trim().split(':');
    let s = (parseFloat(sp[0])||0) + (parseFloat(sp[1])||0)/60;
    let e = (parseFloat(ep[0])||0) + (parseFloat(ep[1])||0)/60;
    if (sPM && s < 12) s += 12; if (sAM && s === 12) s = 0;
    if (ePM && e < 12) e += 12; if (eAM && e === 12) e = 0;
    if (ePM && !sAM && !sPM && s < 12) s += 12;
    return { s, e };
  },
  onPTO(emp, date) {
    const pto = (emp.ptoText||'').trim();
    if (!pto) return false;
    if (['✓','TRUE','X','x'].includes(pto)) return true;
    for (let rng of pto.split(',')) {
      rng = rng.trim();
      if (rng.includes('-')) {
        const [a,b] = rng.split('-');
        const sd = new Date(a.trim()+'/'+date.getFullYear()), ed = new Date(b.trim()+'/'+date.getFullYear());
        if (date >= sd && date <= ed) return true;
      } else {
        if (date.toDateString() === new Date(rng+'/'+date.getFullYear()).toDateString()) return true;
      }
    }
    return false;
  },
  sched(emp, wk, dy) { return wk === 1 ? emp.week1?.[dy]||'' : emp.week2?.[dy]||''; },
  avail(emp, wk, dy, blk, date, sun) {
    if (this.onPTO(emp, date)) return false;
    const sc = this.sched(emp, wk, dy);
    if (!sc || sc.toUpperCase() === 'OFF') return false;
    let bS, bE;
    if (sun) { bS = blk===1?10:blk===2?12:15; bE = blk===1?12:blk===2?15:18.25; }
    else { bS = blk===1?9:blk===2?12:16; bE = blk===1?12:blk===2?16.25:20.25; }
    const { s, e } = this.parse(sc);
    return s >= 0 && s <= bS && e >= bE;
  },
  availH(emp, wk, dy, sH, eH, date) {
    if (this.onPTO(emp, date)) return false;
    const sc = this.sched(emp, wk, dy);
    if (!sc || sc.toUpperCase() === 'OFF') return false;
    const { s, e } = this.parse(sc);
    return s >= 0 && s <= sH && e >= eH;
  },
  startTime(emp, wk, dy) { const { s } = this.parse(this.sched(emp, wk, dy)); return s >= 0 ? s : 99; },
  endTime(emp, wk, dy) { const { e } = this.parse(this.sched(emp, wk, dy)); return e >= 0 ? e : 0; },
  vaultOnly: e => e.vault && !e.reception && !e.lod && !e.ipad && !e.registers,
  recOnly: e => e.reception && !e.lod && !e.ipad && !e.registers,
  ipadOnly: e => e.ipad && !e.reception && !e.lod && !e.registers,
  regOnly: e => e.registers && !e.reception && !e.lod && !e.ipad,
  isEarly(emp, wk, dy) { const s = this.startTime(emp, wk, dy), e = this.endTime(emp, wk, dy); return s >= 8 && s <= 9 && e >= 16 && e <= 16.5; },
  isLate(emp, wk, dy) { const s = this.startTime(emp, wk, dy), e = this.endTime(emp, wk, dy); return s >= 12 && s <= 12.25 && e >= 20; },
  isEvening(emp, wk, dy) { const s = this.startTime(emp, wk, dy), e = this.endTime(emp, wk, dy); return s >= 16 && s <= 16.25 && e >= 20; },
  arrivesEarly(emp, wk, dy, date, sun) {
    if (this.onPTO(emp, date)) return false;
    const sc = this.sched(emp, wk, dy);
    if (!sc || sc.toUpperCase() === 'OFF') return false;
    const { s } = this.parse(sc);
    return s >= 0 && s <= (sun ? 9.75 : 8.75);
  },
  findRole(emps, wk, dy, blk, role, used, date, sun, exLOD) {
    const check = (e, single) => {
      if (this.onPTO(e, date) || this.vaultOnly(e)) return false;
      if (exLOD && e.lod) return false;
      let match = false, sMatch = false;
      if (role === 'REC') { match = e.reception; sMatch = this.recOnly(e); }
      else if (role === 'IPAD') { match = e.ipad; sMatch = this.ipadOnly(e); }
      else if (role === 'REG') { match = e.registers; sMatch = this.regOnly(e); }
      else if (role === 'LOD') { match = e.lod; sMatch = true; }
      return single ? (match && sMatch) : match;
    };
    for (const e of emps) if (check(e, true) && this.avail(e, wk, dy, blk, date, sun) && !used.includes(e.name)) return e.name;
    for (const e of emps) if (check(e, false) && this.avail(e, wk, dy, blk, date, sun) && !used.includes(e.name)) return e.name;
    return 'X';
  },
  findRoleRotate(emps, wk, dy, blk, role, used, avoid, date, sun) {
    const check = (e, single) => {
      if (this.onPTO(e, date) || this.vaultOnly(e) || avoid.includes(e.name)) return false;
      let match = false, sMatch = false;
      if (role === 'REC') { match = e.reception; sMatch = this.recOnly(e); }
      else if (role === 'REG') { match = e.registers; sMatch = this.regOnly(e); }
      return single ? (match && sMatch) : match;
    };
    for (const e of emps) if (check(e, true) && this.avail(e, wk, dy, blk, date, sun) && !used.includes(e.name)) return e.name;
    for (const e of emps) if (check(e, false) && this.avail(e, wk, dy, blk, date, sun) && !used.includes(e.name)) return e.name;
    return this.findRole(emps, wk, dy, blk, role, used, date, sun, false);
  },
  findIPad(emps, wk, dy, sH, eH, used, date) {
    for (const e of emps) if (!this.onPTO(e, date) && !this.vaultOnly(e) && e.ipad && this.ipadOnly(e) && this.availH(e, wk, dy, sH, eH, date) && !used.includes(e.name)) return e.name;
    for (const e of emps) if (!this.onPTO(e, date) && !this.vaultOnly(e) && e.ipad && this.availH(e, wk, dy, sH, eH, date) && !used.includes(e.name)) return e.name;
    return 'X';
  },
  findIPadRotate(emps, wk, dy, sH, eH, used, avoid, date) {
    for (const e of emps) if (!this.onPTO(e, date) && !this.vaultOnly(e) && !avoid.includes(e.name) && e.ipad && this.ipadOnly(e) && this.availH(e, wk, dy, sH, eH, date) && !used.includes(e.name)) return e.name;
    for (const e of emps) if (!this.onPTO(e, date) && !this.vaultOnly(e) && !avoid.includes(e.name) && e.ipad && this.availH(e, wk, dy, sH, eH, date) && !used.includes(e.name)) return e.name;
    return this.findIPad(emps, wk, dy, sH, eH, used, date);
  },
  findVault(emps, wk, dy, blk, used, date, sun) {
    for (const e of emps) if (!this.onPTO(e, date) && e.vault && this.vaultOnly(e) && this.avail(e, wk, dy, blk, date, sun) && !used.includes(e.name)) return e.name;
    for (const e of emps) if (!this.onPTO(e, date) && e.vault && this.avail(e, wk, dy, blk, date, sun) && !used.includes(e.name)) return e.name;
    return 'X';
  },
  buildDay(emps, wk, dy, date, sun, rot) {
    const days = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
    const title = days[date.getDay()], dateStr = (date.getMonth()+1)+'/'+date.getDate();
    const t1S = sun?'10:00 AM':'9:00 AM', t1E = '12:00 PM', t2S = '12:00 PM', t2E = sun?'3:00 PM':'4:15 PM', t3S = sun?'3:00 PM':'4:00 PM', t3E = sun?'6:15 PM':'8:15 PM';
    const cleanTime = sun ? '9:30 (9:45) AM - 10:00 AM' : '8:30 (8:45) AM - 9:00 AM';
    
    // Cleaning assignments
    const early = emps.filter(e => this.arrivesEarly(e, wk, dy, date, sun) && !this.vaultOnly(e));
    const cleaning = CLEANING_AREAS.map((task, i) => ({ task, name: early.length ? early[(rot+i)%early.length].name : 'X' }));
    
    // Position assignments
    let u1=[], u2=[], u3=[];
    const lod1 = this.findRole(emps, wk, dy, 1, 'LOD', u1, date, sun, false); u1.push(lod1);
    const lod2 = this.findRole(emps, wk, dy, 2, 'LOD', u2, date, sun, false); u2.push(lod2);
    const lod3 = this.findRole(emps, wk, dy, 3, 'LOD', u3, date, sun, false); u3.push(lod3);
    
    const r1 = this.findRole(emps, wk, dy, 1, 'REC', [...u1], date, sun, true); u1.push(r1);
    const r2 = this.findRole(emps, wk, dy, 1, 'REC', [...u1], date, sun, true); u1.push(r2);
    const r1b2 = this.findRoleRotate(emps, wk, dy, 2, 'REC', [...u2], [r1,lod2], date, sun); u2.push(r1b2);
    const r2b2 = this.findRoleRotate(emps, wk, dy, 2, 'REC', [...u2], [r2,lod2], date, sun); u2.push(r2b2);
    const r1b3 = this.findRoleRotate(emps, wk, dy, 3, 'REC', [...u3], [r1,r1b2,lod3], date, sun); u3.push(r1b3);
    const r2b3 = this.findRoleRotate(emps, wk, dy, 3, 'REC', [...u3], [r2,r2b2,lod3], date, sun); u3.push(r2b3);
    
    // iPad - store split info separately for register swap
    let ip1, ip2a, ip2b, ip3a, ip3b, ipD1, ipD2, ipD3, ipT1, ipT2, ipT3;
    let ipadSplit2 = null, ipadSplit3 = null;
    
    if (sun) {
      ip1 = this.findIPad(emps, wk, dy, 10, 12, u1, date); u1.push(ip1);
      ip2a = this.findIPadRotate(emps, wk, dy, 12, 15, u2, [ip1], date); u2.push(ip2a);
      ip3a = this.findIPadRotate(emps, wk, dy, 15, 18.25, u3, [ip1,ip2a], date); u3.push(ip3a);
      ipD1=ip1; ipD2=ip2a; ipD3=ip3a;
      ipT1='10:00 AM - 12:00 PM'; ipT2='12:00 PM - 3:00 PM'; ipT3='3:00 PM - 6:15 PM';
    } else {
      ip1 = this.findIPad(emps, wk, dy, 9, 12, u1, date); u1.push(ip1);
      ip2a = this.findIPadRotate(emps, wk, dy, 12, 14, u2, [ip1], date); u2.push(ip2a);
      ip2b = this.findIPadRotate(emps, wk, dy, 14, 16, u2, [ip1], date); u2.push(ip2b);
      ip3a = this.findIPadRotate(emps, wk, dy, 16, 18, u3, [ip1,ip2a,ip2b], date); u3.push(ip3a);
      ip3b = this.findIPadRotate(emps, wk, dy, 18, 20, u3, [ip1,ip2a,ip2b], date); u3.push(ip3b);
      ipD1=ip1; ipT1='9:00 AM - 12:00 PM';
      
      // Block 2 iPad split detection - if only one half found, check if they can cover full block
      if (ip2a !== ip2b && ip2a !== 'X' && ip2b !== 'X') {
        ipD2 = ip2a+' 12-2 / '+ip2b+' 2-4';
        ipadSplit2 = { first: ip2a, second: ip2b };
      } else if (ip2a === ip2b && ip2a !== 'X') {
        ipD2 = ip2a;
      } else if (ip2a !== 'X' && ip2b === 'X') {
        // Check if ip2a can cover full block 2 (12-16.25)
        const emp2a = emps.find(e => e.name === ip2a);
        if (emp2a && this.availH(emp2a, wk, dy, 12, 16, date)) { ipD2 = ip2a; }
        else { ipD2 = ip2a+' 12-2'; }
      } else if (ip2b !== 'X' && ip2a === 'X') {
        const emp2b = emps.find(e => e.name === ip2b);
        if (emp2b && this.availH(emp2b, wk, dy, 12, 16, date)) { ipD2 = ip2b; }
        else { ipD2 = ip2b+' 2-4'; }
      } else {
        ipD2 = 'X';
      }
      ipT2='12:00 PM - 4:00 PM';
      
      // Block 3 iPad split detection - if only one half found, check if they can cover full block
      if (ip3a !== ip3b && ip3a !== 'X' && ip3b !== 'X') {
        ipD3 = ip3a+' 4-6 / '+ip3b+' 6-8';
        ipadSplit3 = { first: ip3a, second: ip3b };
      } else if (ip3a === ip3b && ip3a !== 'X') {
        ipD3 = ip3a;
      } else if (ip3a !== 'X' && ip3b === 'X') {
        const emp3a = emps.find(e => e.name === ip3a);
        if (emp3a && this.availH(emp3a, wk, dy, 16, 20, date)) { ipD3 = ip3a; }
        else { ipD3 = ip3a+' 4-6'; }
      } else if (ip3b !== 'X' && ip3a === 'X') {
        const emp3b = emps.find(e => e.name === ip3b);
        if (emp3b && this.availH(emp3b, wk, dy, 16, 20, date)) { ipD3 = ip3b; }
        else { ipD3 = ip3b+' 6-8'; }
      } else {
        ipD3 = 'X';
      }
      ipT3='4:00 PM - 8:00 PM';
    }
    
    // Registers
    let uR1=[r1,r2,ip1], uR2=[r1b2,r2b2,ip2a,ip2b].filter(Boolean), uR3=[r1b3,r2b3,ip3a,ip3b].filter(Boolean);
    const rg3b1 = lod1!=='X' ? lod1 : this.findRole(emps, wk, dy, 1, 'REG', uR1, date, sun, false); uR1.push(rg3b1);
    const a1 = this.findRole(emps, wk, dy, 1, 'REG', uR1, date, sun, false); uR1.push(a1);
    const a2 = this.findRole(emps, wk, dy, 1, 'REG', uR1, date, sun, false); uR1.push(a2);
    const a3 = this.findRole(emps, wk, dy, 1, 'REG', uR1, date, sun, false); uR1.push(a3);
    const rg1 = this.findRole(emps, wk, dy, 1, 'REG', uR1, date, sun, false); uR1.push(rg1);
    const rg2 = this.findRole(emps, wk, dy, 1, 'REG', uR1, date, sun, false);
    
    const rg3b2 = lod2!=='X' ? lod2 : this.findRoleRotate(emps, wk, dy, 2, 'REG', uR2, [rg3b1], date, sun); uR2.push(rg3b2);
    
    // AU CHECKOUT 2 Block 2 - iPad split swap: iPad 12-2 person → register 2-4, iPad 2-4 person → register 12-2
    let a1b2, a1b2Split = null;
    if (ipadSplit2) {
      a1b2 = ipadSplit2.second + ' 12-2 / ' + ipadSplit2.first + ' 2-4';
      a1b2Split = { first: ipadSplit2.second, second: ipadSplit2.first };
      uR2.push(ipadSplit2.first); uR2.push(ipadSplit2.second);
    } else {
      a1b2 = this.findRoleRotate(emps, wk, dy, 2, 'REG', uR2, [a1], date, sun); uR2.push(a1b2);
    }
    
    const a2b2 = this.findRoleRotate(emps, wk, dy, 2, 'REG', uR2, [a2], date, sun); uR2.push(a2b2);
    const a3b2 = this.findRoleRotate(emps, wk, dy, 2, 'REG', uR2, [a3], date, sun); uR2.push(a3b2);
    const rg1b2 = this.findRoleRotate(emps, wk, dy, 2, 'REG', uR2, [rg1], date, sun); uR2.push(rg1b2);
    const rg2b2 = this.findRoleRotate(emps, wk, dy, 2, 'REG', uR2, [rg2], date, sun);
    
    const rg3b3 = lod3!=='X' ? lod3 : this.findRoleRotate(emps, wk, dy, 3, 'REG', uR3, [rg3b1,rg3b2], date, sun); uR3.push(rg3b3);
    
    // AU CHECKOUT 2 Block 3 - iPad split swap
    let a1b3, a1b3Split = null;
    if (ipadSplit3) {
      a1b3 = ipadSplit3.second + ' 4-6 / ' + ipadSplit3.first + ' 6-8';
      a1b3Split = { first: ipadSplit3.second, second: ipadSplit3.first };
      uR3.push(ipadSplit3.first); uR3.push(ipadSplit3.second);
    } else {
      a1b3 = this.findRoleRotate(emps, wk, dy, 3, 'REG', uR3, [a1,a1b2], date, sun); uR3.push(a1b3);
    }
    
    const a2b3 = this.findRoleRotate(emps, wk, dy, 3, 'REG', uR3, [a2,a2b2], date, sun); uR3.push(a2b3);
    const a3b3 = this.findRoleRotate(emps, wk, dy, 3, 'REG', uR3, [a3,a3b2], date, sun); uR3.push(a3b3);
    const rg1b3 = this.findRoleRotate(emps, wk, dy, 3, 'REG', uR3, [rg1,rg1b2], date, sun); uR3.push(rg1b3);
    const rg2b3 = this.findRoleRotate(emps, wk, dy, 3, 'REG', uR3, [rg2,rg2b2], date, sun);
    
    // Vault
    let vU1=[...uR1,lod1]; const vAU1 = this.findVault(emps, wk, dy, 1, vU1, date, sun); vU1.push(vAU1); const vMed1 = this.findVault(emps, wk, dy, 1, vU1, date, sun);
    let vU2=[...uR2,lod2]; const vAU2 = this.findVault(emps, wk, dy, 2, vU2, date, sun); vU2.push(vAU2); const vMed2 = this.findVault(emps, wk, dy, 2, vU2, date, sun);
    let vU3=[...uR3,lod3]; const vAU3 = this.findVault(emps, wk, dy, 3, vU3, date, sun); vU3.push(vAU3); const vMed3 = this.findVault(emps, wk, dy, 3, vU3, date, sun);
    
    // Lunches
    const earlyL = emps.filter(e => !this.vaultOnly(e) && !this.onPTO(e, date) && this.isEarly(e, wk, dy));
    const lateL = emps.filter(e => !this.vaultOnly(e) && !this.onPTO(e, date) && this.isLate(e, wk, dy));
    const lunches = []; let lt = 12;
    for (const e of earlyL) if (lt <= 14) { lunches.push({ name: e.name, time: formatTime(lt), cover: '' }); lt += 0.5; }
    for (const e of lateL) if (lt <= 16) { lunches.push({ name: e.name, time: formatTime(lt), cover: '' }); lt += 0.5; }
    while (lt <= 16) { lunches.push({ name: '', time: formatTime(lt), cover: '' }); lt += 0.5; }
    
    // 15-min breaks
    const brkEmps = emps.filter(e => !this.vaultOnly(e) && !this.onPTO(e, date) && this.isEvening(e, wk, dy));
    const breaks = []; const brkSlots = [17, 17.25, 17.5, 17.75];
    brkEmps.forEach((e, i) => { if (i < 4) breaks.push({ name: e.name, time: formatTime(brkSlots[i]), cover: '' }); });
    while (breaks.length < 4) breaks.push({ name: '', time: formatTime(brkSlots[breaks.length]), cover: '' });
    
    // cf counts people: X=0, regular=1, split=2
    const cf = n => !n || n === 'X' ? 0 : n.includes('/') ? 2 : 1;
    const stats = { vB1: cf(vAU1)+cf(vMed1), vB2: cf(vAU2)+cf(vMed2), vB3: cf(vAU3)+cf(vMed3), rB1: cf(r1)+cf(r2), rB2: cf(r1b2)+cf(r2b2), rB3: cf(r1b3)+cf(r2b3), rgB1: cf(rg3b1)+cf(a1)+cf(a2)+cf(a3)+cf(rg1)+cf(rg2), rgB2: cf(rg3b2)+cf(a1b2)+cf(a2b2)+cf(a3b2)+cf(rg1b2)+cf(rg2b2), rgB3: cf(rg3b3)+cf(a1b3)+cf(a2b3)+cf(a3b3)+cf(rg1b3)+cf(rg2b3) };
    
    return {
      dayTitle: title, dateStr, fullTitle: title+' '+dateStr, cleanTime, cleaning,
      times: { t1S, t1E, t2S, t2E, t3S, t3E },
      lod: [{name:lod1,time:t1S+' - '+t1E},{name:lod2,time:t2S+' - '+t2E},{name:lod3,time:t3S+' - '+t3E}],
      reception: [{r1,r2,time:t1S+' - '+t1E},{r1:r1b2,r2:r2b2,time:t2S+' - '+t2E},{r1:r1b3,r2:r2b3,time:t3S+' - '+t3E}],
      ipad: [{display:ipD1,time:ipT1,split:null},{display:ipD2,time:ipT2,split:ipadSplit2},{display:ipD3,time:ipT3,split:ipadSplit3}],
      medCheckout: [{mc1:rg1,mc2:rg2,med3au1:rg3b1,time:t1S+' - '+t1E},{mc1:rg1b2,mc2:rg2b2,med3au1:rg3b2,time:t2S+' - '+t2E},{mc1:rg1b3,mc2:rg2b3,med3au1:rg3b3,time:t3S+' - '+t3E}],
      auCheckout: [
        {au2:a1,au3:a2,au4:a3,time:t1S+' - '+t1E,au2Split:null},
        {au2:a1b2,au3:a2b2,au4:a3b2,time:t2S+' - '+t2E,au2Split:a1b2Split},
        {au2:a1b3,au3:a2b3,au4:a3b3,time:t3S+' - '+t3E,au2Split:a1b3Split}
      ],
      vault: [{au:vAU1==='X'?'RPH':vAU1,med:vMed1==='X'?'RPH':vMed1,time:t1S+' - '+t1E},{au:vAU2==='X'?'RPH':vAU2,med:vMed2==='X'?'RPH':vMed2,time:t2S+' - '+t2E},{au:vAU3==='X'?'RPH':vAU3,med:vMed3==='X'?'RPH':vMed3,time:t3S+' - '+t3E}],
      vaultOpen: sun ? '9:30 AM - 10:00 AM' : '8:00 AM - 9:00 AM',
      lunches, breaks, stats, isSunday: sun, weekNum: wk, dayNum: dy, date: date.toISOString(), generatedAt: new Date().toISOString()
    };
  },
  genStandalone(emps, date, rot) { const d = new Date(date); return this.buildDay(emps, 1, d.getDay()===0?7:d.getDay(), d, d.getDay()===0, rot||0); },
  genSingle(emps, date, w1, w2, rot) {
    const target = new Date(date); let wk=0, dy=0;
    for (let d=0; d<7; d++) { const c = new Date(w1); c.setDate(c.getDate()+d); if (c.toDateString()===target.toDateString()) { wk=1; dy=d+1; break; } }
    if (!wk) for (let d=0; d<7; d++) { const c = new Date(w2); c.setDate(c.getDate()+d); if (c.toDateString()===target.toDateString()) { wk=2; dy=d+1; break; } }
    return wk ? this.buildDay(emps, wk, dy, target, dy===7, rot||0) : null;
  },
  genAll(emps, w1, w2) {
    const out = []; let rot = 0;
    for (let w=1; w<=2; w++) {
      const start = new Date(w===1?w1:w2);
      for (let d=1; d<=7; d++) { const dd = new Date(start); dd.setDate(dd.getDate()+(d-1)); out.push(this.buildDay(emps, w, d, dd, d===7, rot++)); }
    }
    return out;
  }
};

const CleaningModal = ({ task, onClose, onSubmit, log }) => {
  const [checked, setChecked] = useState(log?.tasks || {});
  const [initials, setInitials] = useState(log?.initials || '');
  const tasks = CLEANING_TASKS[task] || [];
  const view = !!log, allDone = tasks.every((_, i) => checked[i]);
  const canSubmit = allDone && initials.trim().length > 0;
  const submit = () => {
    if (!initials.trim()) return alert('Enter initials');
    if (!allDone) return alert('Complete all tasks');
    onSubmit({ task, initials: initials.trim().toUpperCase(), tasks: checked, completedAt: new Date().toISOString() });
    onClose();
  };
  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50">
      <div className="bg-white rounded-xl p-6 w-full max-w-lg card-shadow fade-in max-h-[80vh] overflow-y-auto">

        {!view && <button onClick={() => { const c={}; tasks.forEach((_,i)=>c[i]=true); setChecked(c); }} className="mb-4 px-4 py-2 bg-emerald-100 text-emerald-700 rounded-lg text-sm font-medium">✓ Select All</button>}
        <div className="space-y-2 mb-4">{tasks.map((t,i) => <label key={i} className="flex items-start gap-3 p-2 rounded hover:bg-gray-50"><input type="checkbox" checked={checked[i]||false} onChange={e=>!view&&setChecked({...checked,[i]:e.target.checked})} disabled={view} className="mt-1 w-5 h-5"/><span className="text-sm">{t}</span></label>)}</div>
        {!view && <div className="mb-4"><label className="block text-sm font-medium mb-1">Initials</label><input value={initials} onChange={e=>setInitials(e.target.value.slice(0,4))} className="w-full px-4 py-2 border rounded-lg uppercase" maxLength={4}/></div>}
        <div className="flex gap-2">

// Split cell for iPad and AU2 splits - vertical layout with both shapes
const SplitCell = ({ value, shapes, editable, onUpdate, splitData, hl, allShapes }) => {
  const [editing, setEditing] = useState(false);
  const [text, setText] = useState(value||'');
  const save = () => { onUpdate(text); setEditing(false); };
  const isSplit = value && value.includes(' / ');
  
  if (editing) {
    return (
      <div className="schedule-cell bg-white p-0">
        <input value={text} onChange={e=>setText(e.target.value)} onBlur={save} 
          onKeyDown={e=>{if(e.key==='Enter')save();if(e.key==='Escape'){setText(value);setEditing(false);}}} 
          autoFocus className="w-full h-full px-2 py-1 text-xs font-bold text-center border-0 outline-none"/>
      </div>
    );
  }
  
  if (isSplit) {
    const parts = value.split(' / ');
    const first = parts[0] || '';
    const second = parts[1] || '';
    // Extract first word as name, rest as time - use case-insensitive replace
    const firstName = first.split(' ')[0].toUpperCase();
    const secondName = second.split(' ')[0].toUpperCase();
    // Remove the name (case-insensitive) to get just the time portion
    const firstTime = first.replace(new RegExp('^' + first.split(' ')[0] + '\\s*', 'i'), '').trim();
    const secondTime = second.replace(new RegExp('^' + second.split(' ')[0] + '\\s*', 'i'), '').trim();
    const sh1 = shapes?.[firstName];
    const sh2 = shapes?.[secondName];
    const hl1 = hl && hl.size > 0 && hl.has(firstName);
    const hl2 = hl && hl.size > 0 && hl.has(secondName);
    const anyHl = hl1 || hl2;
    const hlColor1 = hl1 && allShapes?.[firstName]?.color;
    const hlColor2 = hl2 && allShapes?.[secondName]?.color;
    
    return (
      <div onClick={()=>editable&&setEditing(true)} 
        className={'schedule-cell bg-white font-bold text-xs min-w-[220px] whitespace-nowrap '+(anyHl?'cell-highlight ':'')+(editable?'cursor-pointer hover:bg-gray-50':'')}
        style={anyHl ? {'--hl-color': hlColor1 || hlColor2 || '#3B82F6'} : {}}>
        <span>{firstName}</span>
        <span className="text-gray-500 text-[10px] mx-0.5">{firstTime}</span>
        <span className="text-gray-400 mx-0.5">/</span>
        <span>{secondName}</span>
        <span className="text-gray-500 text-[10px] mx-0.5">{secondTime}</span>
        {editable && <span className="text-gray-400 text-[10px] ml-1">✏️</span>}
      </div>
    );
  }
  
  const firstName = value && value!=='X' ? value.split(' ')[0].toUpperCase() : null;
  const sh = firstName && shapes?.[firstName];
  const isHl = hl && hl.size > 0 && firstName && hl.has(firstName);
  const hlColor = isHl && allShapes?.[firstName]?.color;
  const hlStyle = isHl ? { '--hl-color': hlColor || '#3B82F6' } : {};
  const base = 'schedule-cell font-bold text-xs flex items-center justify-center gap-1 '+(value==='X'||!value?'bg-gray-400':'bg-white')+(isHl?' cell-highlight':'');
  if (!editable) return <div className={base} style={hlStyle}>{(value||'X').toUpperCase()}</div>;
  return <div onClick={()=>setEditing(true)} className={base+' cursor-pointer hover:bg-gray-50'} style={hlStyle}><span>{(value||'X').toUpperCase()}</span><span className="text-gray-400 text-[10px] ml-1">✏️</span></div>;
};

const CoverageAlert = ({ sched, staffReqs }) => {
  if (!sched) return null;
  const sun = sched.isSunday;
  const st = sched.stats;
  const reqs = sun ? staffReqs.sunday : staffReqs.weekday;
  
  const blkLabels = sun 
    ? { 1: { name: 'MORNING', time: '10A-12P' }, 2: { name: 'NOON', time: '12P-3P' }, 3: { name: 'EVENING', time: '3P-6:15P' } }
    : { 1: { name: 'MORNING', time: '9A-12P' }, 2: { name: 'NOON', time: '12P-4:15P' }, 3: { name: 'EVENING', time: '4P-8:15P' } };
  
  const issues = [];
  [1,2,3].forEach(b => {
    const bi = b - 1;
    const blk = [];
    if (sched.lod[bi]?.name === 'X') blk.push({ pos: 'LOD', need: 1, have: 0 });
    const recCount = st['rB'+b];
    if (recCount < reqs.r[bi]) blk.push({ pos: 'Reception', need: reqs.r[bi], have: recCount });
    const regCount = st['rgB'+b];
    if (regCount < reqs.rg[bi]) blk.push({ pos: 'Registers', need: reqs.rg[bi], have: regCount, of: 6 });
    const vaultCount = st['vB'+b];
    if (vaultCount < reqs.v[bi]) blk.push({ pos: 'Vault', need: reqs.v[bi], have: vaultCount });
    if (blk.length > 0) issues.push({ block: b, label: blkLabels[b], items: blk });
  });
  
  if (issues.length === 0) return null;
  
  const totalNeeded = issues.reduce((s, x) => s + x.items.length, 0);
  
  return (
    <div className="bg-red-100 border-2 border-red-500 rounded-lg p-3 mt-4">
      <p className="font-bold text-red-800 text-sm mb-2">⚠️ COVERAGE NEEDED</p>
      <div className="space-y-2">
        {issues.map(({ block, label, items }) => (
          <div key={block} className="bg-white rounded p-2 border border-red-300">
            <div className="flex items-center justify-between mb-1">
              <span className="font-bold text-red-900 text-xs">{label.name} <span className="font-normal text-red-600">({label.time})</span></span>
            </div>
            <div className="text-xs text-red-800 space-y-0.5">
              {items.map((it, i) => (
                <div key={i} className="flex items-center gap-2">
                  <span className="font-bold bg-red-200 px-1.5 py-0.5 rounded text-red-900">x{it.need - it.have} needed</span>
                  <span>{it.pos} — have {it.have}{it.of ? '/'+it.of : ''}, need {it.need}</span>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

// ============== SCHEDULE VALIDATOR - Cross-references master vs daily ==============
const ScheduleValidator = ({ sched, emps }) => {
  if (!sched || !emps || emps.length === 0) return null;
  
  const date = new Date(sched.date);
  const sun = sched.isSunday;
  const wk = sched.weekNum;
  const dy = sched.dayNum;
  
  // Collect all names appearing in each block of daily schedule
  const getNamesInBlock = (blockIdx) => {
    const names = new Set();
    const add = (n) => { if (n && n !== 'X' && n !== 'RPH') {
      // Handle split cells: "A 12-2 / B 2-4"
      if (n.includes(' / ')) {
        n.split(' / ').forEach(p => names.add(p.split(' ')[0].toUpperCase()));
      } else if (n.includes(' ')) {
        names.add(n.split(' ')[0].toUpperCase());
      } else {
        names.add(n.toUpperCase());
      }
    }};
    add(sched.lod[blockIdx]?.name);
    add(sched.reception[blockIdx]?.r1); add(sched.reception[blockIdx]?.r2);
    add(sched.ipad[blockIdx]?.display);
    add(sched.medCheckout[blockIdx]?.mc1); add(sched.medCheckout[blockIdx]?.mc2); add(sched.medCheckout[blockIdx]?.med3au1);
    add(sched.auCheckout[blockIdx]?.au2); add(sched.auCheckout[blockIdx]?.au3); add(sched.auCheckout[blockIdx]?.au4);
    add(sched.vault[blockIdx]?.au); add(sched.vault[blockIdx]?.med);
    return names;
  };
  
  const issues = [];
  
  // For each employee who should be working, verify they're in the schedule for their blocks
  emps.forEach(emp => {
    if (Engine.onPTO(emp, date)) return;
    const shift = wk === 1 ? emp.week1?.[dy] : emp.week2?.[dy];
    if (!shift || shift.toUpperCase() === 'OFF') return;
    
    const { s, e } = Engine.parse(shift);
    if (s < 0) return;
    
    const upName = emp.name.toUpperCase();
    const blocks = [];
    
    // Determine which blocks this employee should appear in
    if (sun) {
      if (s <= 10 && e >= 12) blocks.push(0);
      if (s <= 12 && e >= 15) blocks.push(1);
      if (s <= 15 && e >= 18.25) blocks.push(2);
    } else {
      if (s <= 9 && e >= 12) blocks.push(0);
      if (s <= 12 && e >= 16.25) blocks.push(1);
      if (s <= 16 && e >= 20.25) blocks.push(2);
    }
    
    // Check they appear in each expected block
    const missingBlocks = [];
    blocks.forEach(bIdx => {
      const names = getNamesInBlock(bIdx);
      if (!names.has(upName)) {
        missingBlocks.push(bIdx + 1);
      }
    });
    
    if (missingBlocks.length > 0 && !Engine.vaultOnly(emp)) {
      issues.push({
        name: emp.name,
        shift,
        issue: 'Scheduled ' + shift + ' but missing from block(s) ' + missingBlocks.join(', '),
        severity: 'warning'
      });
    }
  });
  
  // Check for actual conflicts (not LOD+register or split iPad+register which are by design)
  [0, 1, 2].forEach(bIdx => {
    // Track which categories each person appears in
    const personCats = {};
    const addCat = (n, cat) => { if (n && n !== 'X' && n !== 'RPH') {
      if (n.includes(' / ')) {
        n.split(' / ').forEach(p => {
          const nm = p.split(' ')[0].toUpperCase();
          if (!personCats[nm]) personCats[nm] = new Set();
          personCats[nm].add(cat);
        });
      } else {
        const nm = n.split(' ')[0].toUpperCase();
        if (!personCats[nm]) personCats[nm] = new Set();
        personCats[nm].add(cat);
      }
    }};
    addCat(sched.lod[bIdx]?.name, 'lod');
    addCat(sched.reception[bIdx]?.r1, 'reception'); addCat(sched.reception[bIdx]?.r2, 'reception');
    addCat(sched.ipad[bIdx]?.display, 'ipad');
    addCat(sched.medCheckout[bIdx]?.mc1, 'register'); addCat(sched.medCheckout[bIdx]?.mc2, 'register'); addCat(sched.medCheckout[bIdx]?.med3au1, 'register');
    addCat(sched.auCheckout[bIdx]?.au2, 'register'); addCat(sched.auCheckout[bIdx]?.au3, 'register'); addCat(sched.auCheckout[bIdx]?.au4, 'register');
    addCat(sched.vault[bIdx]?.au, 'vault'); addCat(sched.vault[bIdx]?.med, 'vault');
    
    Object.entries(personCats).forEach(([name, cats]) => {
      // LOD + register is OK by design
      // iPad + register is OK if it's a split (both appear in the split cell)
      const hasSplitIpadReg = cats.has('ipad') && cats.has('register') && 
        (sched.ipad[bIdx]?.display?.includes(' / ') || sched.auCheckout[bIdx]?.au2?.includes(' / '));
      
      // Only flag: reception+register, ipad+reception, or non-split ipad+register
      const hasConflict = (cats.has('reception') && cats.has('register')) ||
        (cats.has('ipad') && cats.has('reception')) ||
        (cats.has('ipad') && cats.has('register') && !hasSplitIpadReg);
      
      if (hasConflict) {
        const catList = [...cats].filter(c => c !== 'lod').join(' + ');
        issues.push({
          name,
          shift: '',
          issue: 'On ' + catList + ' in block ' + (bIdx + 1) + ' (conflict)',
          severity: 'error'
        });
      }
    });
  });
  
  // Check for PTO employees appearing in schedule
  emps.forEach(emp => {
    if (!Engine.onPTO(emp, date)) return;
    const upName = emp.name.toUpperCase();
    [0, 1, 2].forEach(bIdx => {
      if (getNamesInBlock(bIdx).has(upName)) {
        issues.push({
          name: emp.name,
          shift: '',
          issue: 'On PTO but appears in block ' + (bIdx + 1),
          severity: 'error'
        });
      }
    });
  });
  
  if (issues.length === 0) return (
    <div className="bg-emerald-50 border-2 border-emerald-500 rounded-lg p-3 mt-3">
      <p className="font-bold text-emerald-800 text-sm">✓ Cross-Reference: All schedules match master</p>
    </div>
  );
  
  return (
    <div className="bg-amber-50 border-2 border-amber-500 rounded-lg p-3 mt-3">

const Calendar = ({ generated, onClick, allScheds }) => {
  const today = new Date();
  const [month, setMonth] = useState(today.getMonth());
  const [year, setYear] = useState(today.getFullYear());
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dim = new Date(year, month+1, 0).getDate(), fd = new Date(year, month, 1).getDay();
  const days = [...Array(fd).fill(null), ...Array.from({length:dim},(_,i)=>i+1)];
  const gen = d => d ? generated[year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0')] : null;
  const getSch = d => d ? allScheds?.[year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0')] : null;
  const isPast = d => d && new Date(year,month,d,23,59) < today;
  
  return (
    <div className="bg-white rounded-lg card-shadow p-4">
      <div className="flex items-center justify-between mb-3">
        <button onClick={()=>{if(month===0){setMonth(11);setYear(year-1);}else setMonth(month-1);}} className="p-1 hover:bg-gray-100 rounded text-lg">←</button>
        <h3 className="font-bold">{months[month]} {year}</h3>
        <button onClick={()=>{if(month===11){setMonth(0);setYear(year+1);}else setMonth(month+1);}} className="p-1 hover:bg-gray-100 rounded text-lg">→</button>
      </div>
      <div className="grid grid-cols-7 gap-1 text-center text-xs font-medium text-gray-500 mb-1">{['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=><div key={d}>{d}</div>)}</div>
      <div className="grid grid-cols-7 gap-1">{days.map((d,i) => {
        const g = gen(d), isT = d===today.getDate()&&month===today.getMonth()&&year===today.getFullYear();
        const s = getSch(d);
        const lastTime = s?.editedAt || s?.generatedAt || g;
        const past = isPast(d) && !g;
        return <div key={i} onClick={()=>d&&onClick(new Date(year,month,d,12,0,0))} className={'p-1 min-h-[55px] text-xs rounded border cursor-pointer hover:bg-gray-50 '+(!d?'bg-gray-50 border-transparent':'')+(g?' bg-emerald-100 border-emerald-400':past?' bg-red-50 border-red-300':' border-gray-200')+(isT?' ring-2 ring-blue-500':'')}>{d && <><div className={'font-bold '+(isT?'text-blue-600':'')}>{d}</div>{g && lastTime ? <div className="text-[7px] text-emerald-700 mt-0.5" title={lastTime}>✓ {new Date(lastTime).toLocaleString('en-US',{month:'numeric',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true}).replace(',','')}</div> : past ? <div className="text-[8px] text-red-500 mt-0.5">✗</div> : null}</>}</div>;
      })}</div>
    </div>
  );
};

  });

  }, [hoveredEmp, pinnedEmps]);
  
  const togglePin = (name) => {

  };

  }, [emps, w1, w2, scheds, allScheds, generated, cleanLogs, staffReqs]);
  
  useEffect(() => {

        const key = toDateKey(tmr);

          if (idx >= 0 && idx !== selDay) setSelDay(idx);
        }
      }
    };
    const int = setInterval(check, 60000);
    return () => clearInterval(int);
  }, [allScheds, scheds, selDay, tab]);

  };

        }
        setEmps(ne);
      } catch(err) { console.error(err); }

    reader.readAsArrayBuffer(file);
  };

                  <div className="flex gap-2">
                    {dirty && <button onClick={save} className="px-4 py-1 bg-amber-500 text-white rounded text-sm font-medium hover:bg-amber-600">💾 Save</button>}
                    <button onClick={()=>{if(confirm('Clear this day\'s schedule? All positions will be reset to empty (X).')){const s=JSON.parse(JSON.stringify(scheds[selDay]));s.lod.forEach(l=>l.name='X');s.reception.forEach(r=>{r.r1='X';r.r2='X';});s.ipad.forEach(i=>{i.display='X';i.split=null;});s.medCheckout.forEach(m=>{m.mc1='X';m.mc2='X';m.med3au1='X';});s.auCheckout.forEach(a=>{a.au2='X';a.au3='X';a.au4='X';a.au2Split=null;});s.vault.forEach(v=>{v.au='RPH';v.med='RPH';});s.cleaning.forEach(c=>c.name='X');s.lunches.forEach(l=>{l.name='';l.cover='';});s.breaks.forEach(b=>{b.name='';b.cover='';});s.manuallyEdited=true;s.editedAt=new Date().toISOString();updSched(s);}}} className="px-3 py-1 bg-red-500 text-white rounded text-sm font-medium hover:bg-red-600">🗑️ Clear Day</button>
                  </div>
                </div>
                <ScheduleDisplay sched={scheds[selDay]} emps={sorted} shapes={shapes} onUpdate={updSched} editable={true} onSign={setCleanModal} showShapes={true} cleanLogs={cleanLogs} highlightEmps={highlightEmps}/>
              </div>}
              
              {emps.length>0 && <div className="bg-white rounded-lg card-shadow overflow-hidden">
                <div className="bg-gray-800 text-white px-4 py-2 flex justify-between items-center">
                  <h3 className="font-bold text-sm">Master Schedule ({emps.length} Employees)</h3>
                  <div className="flex items-center gap-3">
                    {pinnedEmps.length > 0 && <button onClick={()=>setPinnedEmps([])} className="px-2 py-0.5 bg-red-500 text-white rounded text-[10px] hover:bg-red-600">Clear {pinnedEmps.length} highlight{pinnedEmps.length>1?'s':''}</button>}
                    {scheds.length>0&&scheds[selDay] && <span className="text-emerald-300 text-xs">🟢 = Scheduled &nbsp; Click name = highlight on schedule</span>}
                  </div>
                </div>
                <div className="overflow-x-auto max-h-[350px] overflow-y-auto">
                  <table className="w-full text-xs">
                    <thead className="sticky top-0 z-10">
                      <tr className="bg-gray-100">
                        <th className="px-2 py-1 text-left font-semibold sticky left-0 bg-gray-100 z-20 min-w-[150px]">Name</th>
                        <th className="px-1 py-1 text-center w-8">V</th><th className="px-1 py-1 text-center w-8">R</th><th className="px-1 py-1 text-center w-8">L</th><th className="px-1 py-1 text-center w-8">I</th><th className="px-1 py-1 text-center w-8">Rg</th><th className="px-1 py-1 text-center min-w-[50px]">PTO</th>
                        {w1 && [1,2,3,4,5,6,7].map(d=><th key={'w1'+d} className="px-1 py-1 text-center bg-blue-50 min-w-[85px]"><div className="text-[10px]">{['Mon','Tue','Wed','Thu','Fri','Sat','Sun'][d-1]}</div><div className="text-[9px] text-gray-500">{dateForDay(1,d)}</div></th>)}
                        {w2 && [1,2,3,4,5,6,7].map(d=><th key={'w2'+d} className="px-1 py-1 text-center bg-green-50 min-w-[85px]"><div className="text-[10px]">{['Mon','Tue','Wed','Thu','Fri','Sat','Sun'][d-1]}</div><div className="text-[9px] text-gray-500">{dateForDay(2,d)}</div></th>)}
                        <th className="px-1 py-1 min-w-[40px]"></th>
                      </tr>
                    </thead>
                    <tbody>{sorted.map((emp,idx) => {
                      const cur = scheds[selDay];
                      let onSched = false;
                      if (cur) {
                        const all = [...cur.lod.map(l=>l.name),...cur.reception.flatMap(r=>[r.r1,r.r2]),...cur.ipad.map(i=>i.display),...cur.medCheckout.flatMap(m=>[m.mc1,m.mc2,m.med3au1]),...cur.auCheckout.flatMap(a=>[a.au2,a.au3,a.au4]),...cur.vault.flatMap(v=>[v.au,v.med]),...cur.cleaning.map(c=>c.name),...cur.lunches.map(l=>l.name),...cur.breaks.filter(b=>b.name).map(b=>b.name)].map(n=>n?n.toUpperCase():'');
                        onSched = all.includes(emp.name.toUpperCase()) || all.some(n => n && n.includes(emp.name.toUpperCase()));
                      }
                      const sh = shapes[emp.name.toUpperCase()];
                      const realIdx = emps.findIndex(e=>e.name===emp.name);
                      const isPinned = pinnedEmps.some(n => n.toUpperCase() === emp.name.toUpperCase());
                      const pinColor = sh?.color || '#3B82F6';
                      return <tr key={idx} className={'border-t '+(onSched?'bg-emerald-50':'hover:bg-gray-50')}>
                        <td className={'px-2 py-1 font-medium sticky left-0 z-[5] '+(onSched?'bg-emerald-100':'bg-white')}>
                          <div className={'emp-name-btn inline-flex items-center rounded px-1 py-0.5 '+(isPinned?'emp-pinned':'')}
                            style={isPinned ? {outlineColor: pinColor, backgroundColor: pinColor+'22'} : {}}
                            onMouseEnter={()=>setHoveredEmp(emp.name)}
                            onMouseLeave={()=>setHoveredEmp(null)}
                            onClick={(e)=>{e.stopPropagation();togglePin(emp.name);}}>
                            <span className="w-2.5 h-2.5 rounded-full inline-block mr-1.5 flex-shrink-0" style={{backgroundColor: pinColor}}/>{emp.name}
                          </div>
                        </td>
                        <td className="px-1 py-1 text-center">{emp.vault && <div className="w-3 h-3 mx-auto rounded bg-emerald-500"/>}</td>
                        <td className="px-1 py-1 text-center">{emp.reception && <div className="w-3 h-3 mx-auto rounded bg-emerald-500"/>}</td>
                        <td className="px-1 py-1 text-center">{emp.lod && <div className="w-3 h-3 mx-auto rounded bg-emerald-500"/>}</td>
                        <td className="px-1 py-1 text-center">{emp.ipad && <div className="w-3 h-3 mx-auto rounded bg-emerald-500"/>}</td>
                        <td className="px-1 py-1 text-center">{emp.registers && <div className="w-3 h-3 mx-auto rounded bg-emerald-500"/>}</td>
                        <td className="px-1 py-1 text-center text-[10px]">{emp.ptoText||'-'}</td>
                        {w1 && [1,2,3,4,5,6,7].map(d=><td key={'w1'+d} className="px-1 py-1 text-center text-[10px] bg-blue-50/30">{emp.week1?.[d]||'-'}</td>)}
                        {w2 && [1,2,3,4,5,6,7].map(d=><td key={'w2'+d} className="px-1 py-1 text-center text-[10px] bg-green-50/30">{emp.week2?.[d]||'-'}</td>)}
                        <td className="px-1 py-1"><button onClick={()=>setEditEmp(realIdx)} className="text-blue-600 hover:underline text-[10px]">Edit</button></td>
                      </tr>;
                    })}</tbody>
                  </table>
                </div>
              </div>}
            </div>
          </div>
        )}
        
        {tab === 'summary' && logged && (scheds.length>0 ? <StaffingSummary scheds={scheds} allScheds={allScheds} onSelect={setSelDay} staffReqs={staffReqs} setStaffReqs={setStaffReqs}/> : <div className="text-center py-12 bg-white rounded-lg card-shadow"><p className="text-gray-500">Generate schedules first.</p></div>)}
        
        {tab === 'cleaning' && logged && <CleaningLogs logs={cleanLogs} onView={setViewLog} allScheds={allScheds} onClearLog={setCleanLogs}/>}
        
        {tab === 'help' && logged && (
          <div className="fade-in max-w-4xl mx-auto">
            <div className="bg-white rounded-xl card-shadow p-8">
              <h2 className="text-2xl font-bold mb-6">How to Use the Scheduler</h2>
              
              <div className="space-y-6">
                <div className="border-l-4 border-emerald-500 pl-4">
                  <h3 className="font-bold text-lg mb-2">1. Getting Started</h3>
                  <p className="text-sm text-gray-700 mb-2">Click <strong>Login</strong> (top right) with your supervisor credentials to access all features. Without logging in, only the public Daily Schedule is visible.</p>
                </div>

                <div className="border-l-4 border-blue-500 pl-4">
                  <h3 className="font-bold text-lg mb-2">2. Import Your Employee Data</h3>
                  <p className="text-sm text-gray-700 mb-2">Go to <strong>Employee Master Schedule</strong> tab. Use the <strong>Upload Excel</strong> button on the left to import your master schedule spreadsheet. The file should have columns: Name, Vault, Reception, LOD, iPad, Registers, PTO, Notes, then 7 days for Week 1 and 7 days for Week 2.</p>
                  <p className="text-sm text-gray-700">You can also click <strong>Add Manually</strong> to enter employees one at a time, or click <strong>Edit</strong> on any row to update an existing employee.</p>
                </div>

                <div className="border-l-4 border-purple-500 pl-4">
                  <h3 className="font-bold text-lg mb-2">3. Set Week Dates & Generate Schedules</h3>
                  <p className="text-sm text-gray-700 mb-2">On the left panel, set <strong>Week 1 Start</strong> date (Week 2 auto-fills). Then click <strong>Generate All 14 Days</strong> to create schedules for the full 2-week period. Or use <strong>Generate Single Day</strong> with a date picker for just one day.</p>
                  <p className="text-sm text-gray-700">The engine automatically assigns employees to positions based on their qualifications, availability, and role priorities.</p>
                </div>

                <div className="border-l-4 border-amber-500 pl-4">
                  <h3 className="font-bold text-lg mb-2">4. Editing a Daily Schedule</h3>
                  <p className="text-sm text-gray-700 mb-2">Click any day button at the top to view that day's schedule. To change an assignment, click any name cell to open a dropdown and pick a different employee. For iPad and AU Checkout 2 cells, click the <strong>✏️ edit</strong> to type directly (useful for split shifts).</p>
                  <p className="text-sm text-gray-700 mb-2">Click <strong>💾 Save</strong> when you're done editing. Use <strong>🗑️ Clear Day</strong> to reset all positions to empty if you want to fill in manually from scratch.</p>
                </div>

                <div className="border-l-4 border-pink-500 pl-4">
                  <h3 className="font-bold text-lg mb-2">5. Highlight Employees</h3>
                  <p className="text-sm text-gray-700 mb-2"><strong>Hover</strong> over any employee name in the Master Schedule table below the daily schedule — their assigned positions light up in the schedule above with their unique color.</p>
                  <p className="text-sm text-gray-700">Click a name to <strong>pin</strong> the highlight so it stays on. Click again to unpin. Pin multiple employees at once to see all their positions highlighted. Use <strong>Clear highlights</strong> to remove all pins.</p>
                </div>

                <div className="border-l-4 border-red-500 pl-4">
                  <h3 className="font-bold text-lg mb-2">6. Coverage Alerts & Validation</h3>
                  <p className="text-sm text-gray-700 mb-2">Below the Import section on the left, you'll see a <strong>Coverage Needed</strong> alert if any shift is understaffed. It breaks down by Morning, Noon, and Evening with exact counts.</p>
                  <p className="text-sm text-gray-700 mb-1"><strong>Minimum requirements:</strong></p>
                  <p className="text-sm text-gray-700 mb-2">Reception: 2 all shifts. Registers: 2 of 6 (morning), 3 of 6 (noon & evening). Vault: 2 weekdays, 1 Sunday.</p>
                  <p className="text-sm text-gray-700">The <strong>Cross-Reference Validator</strong> below that checks that every scheduled employee actually appears in the daily and flags PTO violations or double-bookings.</p>
                </div>

                <div className="border-l-4 border-cyan-500 pl-4">
                  <h3 className="font-bold text-lg mb-2">7. iPad Split Shifts & Register Swaps</h3>
                  <p className="text-sm text-gray-700">When two different people cover the iPad in a single block (e.g. Dre 12-2 / Pete 2-4), the system automatically swaps them on the registers: Pete gets 12-2 on registers and Dre gets 2-4. Both names are stacked in the same cell.</p>
                </div>

                <div className="border-l-4 border-emerald-500 pl-4">
                  <h3 className="font-bold text-lg mb-2">8. Daily Schedule (Public View)</h3>
                  <p className="text-sm text-gray-700 mb-2">The <strong>Daily Schedule</strong> tab shows today's schedule (or tomorrow's after 8 PM EST). This view is designed to be displayed on a shared screen — no login required.</p>
                  <p className="text-sm text-gray-700">Staff can click the <strong>Sign</strong> button on their cleaning task to open a checklist. Check all items, enter initials, and submit. The button turns to a green ✓ when complete.</p>
                </div>

                <div className="border-l-4 border-orange-500 pl-4">
                  <h3 className="font-bold text-lg mb-2">9. Cleaning Logs</h3>
                  <p className="text-sm text-gray-700 mb-2">The <strong>Cleaning Logs</strong> tab shows a monthly calendar. Green = all 5 areas done, amber = partial, red = none. Click a day to see who signed off each area with timestamps.</p>
                  <p className="text-sm text-gray-700">Missing areas show the assigned cleaner's name in parentheses. Use <strong>🗑️ Clear Day</strong> to reset a day's logs if needed.</p>
                </div>

                <div className="border-l-4 border-blue-500 pl-4">
                  <h3 className="font-bold text-lg mb-2">10. Staffing Summary</h3>
                  <p className="text-sm text-gray-700">The <strong>Staffing Summary</strong> tab shows a monthly overview. Green days = fully staffed, red = shortages. Click any day to see a detailed breakdown of what positions are short and by how much.</p>
                </div>

                <div className="border-l-4 border-gray-400 pl-4">
                  <h3 className="font-bold text-lg mb-2">11. Printing</h3>
                  <p className="text-sm text-gray-700">On the Daily Schedule tab, click <strong>🖨️ Print</strong> to print the current day's schedule. The navigation header and buttons are automatically hidden.</p>
                </div>
              </div>
            </div>
          </div>
        )}
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
