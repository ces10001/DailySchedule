const App = () => {
  const [tab, setTab] = useState('schedule');
  const [emps, setEmps] = useState([]);
  const [scheds, setScheds] = useState([]);
  const [allScheds, setAllScheds] = useState({});
  const [generated, setGenerated] = useState({});
  const [cleanLogs, setCleanLogs] = useState({});
  const [breakSignups, setBreakSignups] = useState({});
  const [w1, setW1] = useState('');
  const [w2, setW2] = useState('');
  const [singleDate, setSingleDate] = useState('');
  const [endDate, setEndDate] = useState('');
  const [selDay, setSelDay] = useState(0);
  
  // Clamp selDay when scheds array changes
  const initialNav = React.useRef(false);
  useEffect(() => {
    if (scheds.length === 0) return;
    if (selDay < 0 || selDay >= scheds.length) setSelDay(Math.max(0, scheds.length - 1));
    // On first data load, jump to today (or closest future day)
    if (!initialNav.current) {
      initialNav.current = true;
      const todayStr = todayKey();
      // If today's schedule is in allScheds but not scheds, load it
      if (allScheds[todayStr] && !scheds.some(s => toDateKey(new Date(s.date)) === todayStr)) {
        const ns = [...scheds, sanitizeSched(allScheds[todayStr])];
        ns.sort((a,b) => new Date(a.date) - new Date(b.date));
        setScheds(ns);
        setSelDay(ns.findIndex(x => toDateKey(new Date(x.date)) === todayStr));
        return;
      }
      let bestIdx = 0;
      for (let i = 0; i < scheds.length; i++) {
        const k = toDateKey(new Date(scheds[i].date));
        if (k === todayStr) { bestIdx = i; break; }
        if (k > todayStr && (bestIdx === 0 || k < toDateKey(new Date(scheds[bestIdx].date)))) bestIdx = i;
      }
      setSelDay(bestIdx);
    }
  }, [scheds.length, Object.keys(allScheds).length]);
  const [editEmp, setEditEmp] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [logged, setLogged] = useState(false);
  const [showLogin, setShowLogin] = useState(false);
  const [cleanModal, setCleanModal] = useState(null);
  const [viewLog, setViewLog] = useState(null);
  const [dirty, setDirty] = useState(false);
  const [hoveredEmp, setHoveredEmp] = useState(null);
  const [pinnedEmps, setPinnedEmps] = useState([]);
  const [staffReqs, setStaffReqs] = useState({
    weekday: { v: [2,2,2], r: [2,2,2], rg: [2,3,3] },
    sunday: { v: [1,1,1], r: [2,2,2], rg: [3,3,3] }
  });
  const [toast, setToast] = useState(null);
  const [undoHistory, setUndoHistory] = useState([]);
  const [uploadWeek, setUploadWeek] = useState('1');
  const [fbStatus, setFbStatus] = useState(fbDB ? 'connecting' : 'local');
  const [weekPicker, setWeekPicker] = useState(null); // {date: Date} — shows Wk1/Wk2 modal
  
  const fromFB = React.useRef(false);
  const writeTimer = React.useRef(null);
  const dataLoaded = React.useRef(false);
  
  const showToast = (msg, type = 'success') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  };
  
  const pushUndo = (action, data) => {
    setUndoHistory(prev => [...prev.slice(-9), { action, data, at: Date.now() }]);
  };
  
  // Load data: Firebase if available, otherwise localStorage
  useEffect(() => {
    if (fbDB) {
      // Track connection state
      firebase.database().ref('.info/connected').on('value', (snap) => {
        setFbStatus(snap.val() ? 'connected' : 'disconnected');
      });
      fbDB.on('value', (snap) => {
        const d = snap.val();
        if (!d) { dataLoaded.current = true; return; }
        fromFB.current = true;
        setEmps(d.employees || []);
        setW1(d.week1Start || '');
        setW2(d.week2Start || '');
        // Sanitize every schedule from Firebase (Firebase drops empty arrays like lunches:[])
        const rawScheds = d.schedules || [];
        setScheds(rawScheds.map(s => sanitizeSched(s)).filter(Boolean));
        const rawAll = d.allSchedules || {};
        const sanAll = {};
        Object.entries(rawAll).forEach(([k,v]) => { const s = sanitizeSched(v); if (s) sanAll[k] = s; });
        setAllScheds(sanAll);
        setGenerated(d.generatedDays || {});
        setCleanLogs(d.cleaningLogs || {});
        setBreakSignups(d.breakSignups || {});
        if (d.staffReqs) setStaffReqs(d.staffReqs);
        dataLoaded.current = true;
        setTimeout(() => { fromFB.current = false; }, 700);
      });
      return () => fbDB.off();
    } else {
      // No Firebase — use localStorage
      const d = localStorage.getItem('pharmacy-scheduler-v3');
      if (d) { try { const p = JSON.parse(d); setEmps(p.employees||[]); setW1(p.week1Start||''); setW2(p.week2Start||''); setScheds((p.schedules||[]).map(s=>sanitizeSched(s)).filter(Boolean)); const sa={}; Object.entries(p.allSchedules||{}).forEach(([k,v])=>{const s=sanitizeSched(v);if(s)sa[k]=s;}); setAllScheds(sa); setGenerated(p.generatedDays||{}); setCleanLogs(p.cleaningLogs||{}); setBreakSignups(p.breakSignups||{}); if(p.staffReqs) setStaffReqs(p.staffReqs); } catch(e){} }
      dataLoaded.current = true;
    }
  }, []);
  
  // Save data: Firebase + localStorage cache
  useEffect(() => {
    if (!dataLoaded.current || fromFB.current) return;
    if (writeTimer.current) clearTimeout(writeTimer.current);
    writeTimer.current = setTimeout(() => {
      // Double-check fromFB at execution time (not just schedule time)
      if (fromFB.current) return;
      const data = { employees:emps, week1Start:w1, week2Start:w2, schedules:scheds, allSchedules:allScheds, generatedDays:generated, cleaningLogs:cleanLogs, breakSignups, staffReqs };
      if (fbDB) {
        fbDB.set(data).catch(e => {
          console.error('Firebase write error:', e);
          showToast('Sync error — saving locally', 'warning');
        });
      }
      try { localStorage.setItem('pharmacy-scheduler-v3', JSON.stringify(data)); } catch(e) {}
    }, 500);
  }, [emps, w1, w2, scheds, allScheds, generated, cleanLogs, breakSignups, staffReqs]);
  
  const highlightEmps = useMemo(() => {
    const set = new Set(pinnedEmps.map(n => n.toUpperCase()));
    if (hoveredEmp) set.add(hoveredEmp.toUpperCase());
    return set;
  }, [hoveredEmp, pinnedEmps]);
  
  const togglePin = (name) => {
    const up = name.toUpperCase();
    setPinnedEmps(prev => prev.some(n => n.toUpperCase() === up) ? prev.filter(n => n.toUpperCase() !== up) : [...prev, name]);
  };
  
  const shapes = useMemo(() => {
    const s = {}, sorted = [...emps].sort((a,b) => a.name.localeCompare(b.name));
    sorted.forEach((e, i) => {
      s[e.name.toUpperCase()] = { color: COLORS[i % COLORS.length] };
    });
    return s;
  }, [emps]);
  
  const sorted = useMemo(() => [...emps].sort((a,b) => a.name.localeCompare(b.name)), [emps]);
  
  // Check for duplicate employee names
  const duplicateNames = useMemo(() => {
    const counts = {};
    emps.forEach(e => {
      const n = e.name.toUpperCase().trim();
      counts[n] = (counts[n] || 0) + 1;
    });
    return Object.entries(counts).filter(([,c]) => c > 1).map(([n]) => n);
  }, [emps]);
  
  useEffect(() => {
    const check = () => {
      if (tab !== 'schedule') return;
      if (getESTTime() >= 20.25) {
        const tmr = new Date(); tmr.setDate(tmr.getDate()+1);
        const key = toDateKey(tmr);
        if (allScheds[key]) {
          let idx = scheds.findIndex(s => toDateKey(new Date(s.date)) === key);
          if (idx < 0) {
            const ns = [...scheds, allScheds[key]];
            ns.sort((a,b) => new Date(a.date) - new Date(b.date));
            setScheds(ns);
            idx = ns.findIndex(x => toDateKey(new Date(x.date)) === key);
          }
          if (idx >= 0 && idx !== selDay) setSelDay(idx);
        }
      }
    };
    const int = setInterval(check, 60000);
    return () => clearInterval(int);
  }, [allScheds, scheds, selDay, tab]);
  
  const todaySched = useMemo(() => {
    const d = new Date();
    if (getESTTime() >= 20.25) d.setDate(d.getDate()+1);
    return sanitizeSched(allScheds[toDateKey(d)]) || null;
  }, [allScheds]);
  
  const genSingle = (date, weekNum) => {
    if (emps.length === 0) return;
    const target = new Date(date); target.setHours(12,0,0,0);
    const wk = weekNum || 1;
    const dow = target.getDay() === 0 ? 7 : target.getDay();
    const s = Engine.buildDay(sorted, wk, dow, target, dow === 7, 0);
    if (!s) return;
    const key = toDateKey(target);
    setScheds(prev => {
      const ns = [...prev];
      const idx = ns.findIndex(x => toDateKey(new Date(x.date)) === key);
      if (idx >= 0) ns[idx] = s; else { ns.push(s); ns.sort((a,b) => new Date(a.date) - new Date(b.date)); }
      return ns;
    });
    setGenerated(prev => ({...prev, [key]: new Date().toISOString()}));
    setAllScheds(prev => ({...prev, [key]: s}));
    // Only update selDay for the last generated day (handled by caller for batch)
    return { key, schedule: s };
  };
  
  const genBatch = (from, to, weekNum) => {
    if (emps.length === 0) return;
    const d = new Date(from); d.setHours(12,0,0,0);
    const end = new Date(to); end.setHours(12,0,0,0);
    const newScheds = [];
    const newGen = {};
    const newAll = {};
    while (d <= end) {
      const wk = weekNum || 1;
      const dow = d.getDay() === 0 ? 7 : d.getDay();
      const s = Engine.buildDay(sorted, wk, dow, new Date(d), dow === 7, 0);
      if (s) {
        const key = toDateKey(new Date(d));
        newScheds.push(s);
        newGen[key] = new Date().toISOString();
        newAll[key] = s;
      }
      d.setDate(d.getDate() + 1);
    }
    if (newScheds.length === 0) return;
    setScheds(prev => {
      const ns = [...prev];
      newScheds.forEach(s => {
        const key = toDateKey(new Date(s.date));
        const idx = ns.findIndex(x => toDateKey(new Date(x.date)) === key);
        if (idx >= 0) ns[idx] = s; else ns.push(s);
      });
      ns.sort((a,b) => new Date(a.date) - new Date(b.date));
      return ns;
    });
    setGenerated(prev => ({...prev, ...newGen}));
    setAllScheds(prev => ({...prev, ...newAll}));
    // Select the first generated day
    setTimeout(() => {
      setScheds(cur => {
        const firstKey = toDateKey(new Date(from));
        const idx = cur.findIndex(x => toDateKey(new Date(x.date)) === firstKey);
        if (idx >= 0) setSelDay(idx);
        return cur;
      });
    }, 50);
    showToast('Generated ' + newScheds.length + ' day' + (newScheds.length > 1 ? 's' : ''));
  };
  
  const updSched = (s) => {
    // Recalculate stats on every edit so Coverage Alert stays current
    const cf = n => !n || n === 'X' ? 0 : n.includes('/') ? 2 : 1;
    const san = sanitizeSched(s);
    san.stats = {
      vB1: cf(san.vault[0].au)+cf(san.vault[0].med), vB2: cf(san.vault[1].au)+cf(san.vault[1].med), vB3: cf(san.vault[2].au)+cf(san.vault[2].med),
      rB1: cf(san.reception[0].r1)+cf(san.reception[0].r2), rB2: cf(san.reception[1].r1)+cf(san.reception[1].r2), rB3: cf(san.reception[2].r1)+cf(san.reception[2].r2),
      rgB1: cf(san.medCheckout[0].mc1)+cf(san.medCheckout[0].mc2)+cf(san.medCheckout[0].med3au1)+cf(san.auCheckout[0].au2)+cf(san.auCheckout[0].au3)+cf(san.auCheckout[0].au4),
      rgB2: cf(san.medCheckout[1].mc1)+cf(san.medCheckout[1].mc2)+cf(san.medCheckout[1].med3au1)+cf(san.auCheckout[1].au2)+cf(san.auCheckout[1].au3)+cf(san.auCheckout[1].au4),
      rgB3: cf(san.medCheckout[2].mc1)+cf(san.medCheckout[2].mc2)+cf(san.medCheckout[2].med3au1)+cf(san.auCheckout[2].au2)+cf(san.auCheckout[2].au3)+cf(san.auCheckout[2].au4)
    };
    const key = toDateKey(new Date(san.date));
    setScheds(prev => {
      const ns = [...prev];
      const idx = ns.findIndex(x => toDateKey(new Date(x.date)) === key);
      if (idx >= 0) ns[idx] = san;
      return ns;
    });
    setAllScheds(prev => ({...prev, [key]: san}));
    setDirty(true);
  };
  
  const save = () => { setDirty(false); showToast('Schedule saved'); };
  
  const undo = () => {

      setCleanLogs(last.data);

  const exportData = () => {

  const upload = (e) => {
    const file = e.target.files[0]; if (!file) return;

      try {

        const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1});
        const updated = [...emps];

          const weekData = {1:norm(r[8]),2:norm(r[9]),3:norm(r[10]),4:norm(r[11]),5:norm(r[12]),6:norm(r[13]),7:norm(r[14])};

          const existIdx = updated.findIndex(emp => emp.name.toUpperCase() === name.toUpperCase());

            // Update roles, PTO, and selected week
            updated[existIdx] = {
              ...updated[existIdx],
              vault: chk(r[1]), reception: chk(r[2]), lod: chk(r[3]), ipad: chk(r[4]), registers: chk(r[5]),
              ptoText: r[6]||updated[existIdx].ptoText, notes: r[7]||updated[existIdx].notes,
              [wk==='1'?'week1':'week2']: weekData
            };
            updatedCount++;
          } else {
            // New employee
            const newEmp = { name, vault:chk(r[1]), reception:chk(r[2]), lod:chk(r[3]), ipad:chk(r[4]), registers:chk(r[5]), ptoText:r[6]||'', notes:r[7]||'', noBreak:false, supervisor:false, birthday:'', week1:{1:'',2:'',3:'',4:'',5:'',6:'',7:''}, week2:{1:'',2:'',3:'',4:'',5:'',6:'',7:''} };

            updated.push(newEmp);
            addedCount++;
          }

    // Add (dy-1) days from Monday

            </div>}
          </div>

        {tab === 'breaks' && (
          <BreakSignUp emps={sorted} breakSignups={breakSignups} setBreakSignups={setBreakSignups}/>

                  <div><label className="block text-xs font-medium mb-1">From</label><input type="date" value={singleDate} onChange={e=>setSingleDate(e.target.value)} className="w-full px-2 py-1.5 text-sm border rounded-lg"/></div>

                  setWeekPicker({ from, to });
                }} disabled={!singleDate||emps.length===0} className="mt-3 w-full px-3 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 disabled:opacity-50">Generate {endDate && singleDate && endDate !== singleDate ? Math.round((new Date(endDate+'T12:00:00') - new Date(singleDate+'T12:00:00'))/(86400000))+1 + ' Days' : 'Day'}</button>
                <p className="text-[10px] text-gray-500 mt-2">Or click any day on the calendar below to generate or view it.</p>
              </div>
              
              {weekPicker && <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50">

                      : <>Generating for <strong>{['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][(weekPicker.date||weekPicker.from).getDay()]} {((weekPicker.date||weekPicker.from).getMonth()+1)+'/'+((weekPicker.date||weekPicker.from).getDate())}</strong></>
                    }

                  </div>
                  <button onClick={()=>setWeekPicker(null)} className="w-full px-3 py-2 bg-gray-200 rounded-lg text-sm hover:bg-gray-300">Cancel</button>
                </div>

              <Calendar generated={generated} onClick={calClick} allScheds={allScheds}/>

                  <button onClick={()=>setUploadWeek('2')} className={'flex-1 px-2 py-1.5 rounded-lg text-xs font-medium border-2 '+(uploadWeek==='2'?'border-green-500 bg-green-50 text-green-800':'border-gray-200 hover:border-gray-300')}>Week 2</button>

                  <button onClick={exportData} className="px-2 py-1 bg-gray-100 rounded text-[10px] font-medium hover:bg-gray-200">💾 Backup</button>

                    <button onClick={()=>{if(confirm('Clear this day\'s schedule? All positions will be reset to empty (X).')){pushUndo('clearDay',JSON.parse(JSON.stringify(scheds[selDay])));const s=sanitizeSched(JSON.parse(JSON.stringify(scheds[selDay])));s.lod.forEach(l=>l.name='X');s.reception.forEach(r=>{r.r1='X';r.r2='X';});s.ipad.forEach(i=>{i.display='X';i.split=null;});s.medCheckout.forEach(m=>{m.mc1='X';m.mc2='X';m.med3au1='X';});s.auCheckout.forEach(a=>{a.au2='X';a.au3='X';a.au4='X';a.au2Split=null;});s.vault.forEach(v=>{v.au='RPH';v.med='RPH';});s.cleaning.forEach(c=>c.name='X');s.lunches.forEach(l=>{l.name='';l.cover='';});s.breaks.forEach(b=>{b.name='';b.cover='';});if(s.deposits)s.deposits.forEach(d=>{d.person='';});s.manuallyEdited=true;s.editedAt=new Date().toISOString();updSched(s);showToast('Day cleared — click Undo to restore');}}} className="px-3 py-1 bg-red-500 text-white rounded text-sm font-medium hover:bg-red-600">🗑️ Clear Day</button>

                    </thead>
                    <tbody>{sorted.map((emp,idx) => {
                      const cur = sanitizeSched(scheds[selDay]);
                      let onSched = false;
                      if (cur) {
                        const all = [...cur.lod.map(l=>l.name),...cur.reception.flatMap(r=>[r.r1,r.r2]),...cur.ipad.map(i=>i.display),...cur.medCheckout.flatMap(m=>[m.mc1,m.mc2,m.med3au1]),...cur.auCheckout.flatMap(a=>[a.au2,a.au3,a.au4]),...cur.vault.flatMap(v=>[v.au,v.med]),...cur.cleaning.map(c=>c.name),...cur.lunches.map(l=>l.name),...cur.breaks.filter(b=>b.name).map(b=>b.name)].map(n=>n?n.toUpperCase():'');
                        onSched = all.includes(emp.name.toUpperCase()) || all.some(n => n && n.includes(emp.name.toUpperCase()));
                      }
                      const sh = shapes[emp.name.toUpperCase()];
                      const realIdx = emps.findIndex(e=>e.name===emp.name);
                      const isPinned = pinnedEmps.some(n => n.toUpperCase() === emp.name.toUpperCase());
                      const pinColor = sh?.color || '#3B82F6';
                      const updShift = (wk, dy, val) => {
                        const u = [...emps]; const e = {...u[realIdx]};
                        if (wk===1) e.week1 = {...e.week1, [dy]: val};
                        else e.week2 = {...e.week2, [dy]: val};
                        u[realIdx] = e; setEmps(u);
                      };
                      const slots = (d) => d===7 ? SUNDAY_SLOTS : TIME_SLOTS;
                      return <tr key={idx} className={'border-t '+(onSched?'bg-emerald-50':'hover:bg-gray-50')}>
                        <td className={'px-2 py-1 font-medium sticky left-0 z-[5] cursor-pointer '+(onSched?'bg-emerald-100':'bg-white')}
                          onMouseEnter={()=>setHoveredEmp(emp.name)}
                          onMouseLeave={()=>setHoveredEmp(null)}
                          onClick={()=>togglePin(emp.name)}>
                          <div className={'emp-name-btn inline-flex items-center rounded px-1 py-0.5 '+(isPinned?'emp-pinned':'')}
                            style={isPinned ? {outlineColor: pinColor, backgroundColor: pinColor+'22'} : {}}>
                            <span className="w-2.5 h-2.5 rounded-full inline-block mr-1.5 flex-shrink-0" style={{backgroundColor: pinColor}}/>{emp.name}
                            {emp.noBreak && <span className="ml-1 text-[8px] bg-gray-200 text-gray-600 px-1 rounded" title="No break needed">NB</span>}
                            {emp.supervisor && <span className="ml-1 text-[8px] bg-amber-200 text-amber-700 px-1 rounded" title="Supervisor - stays on same position">SUP</span>}
                          </div>
                        </td>
                        <td className="px-1 py-1 text-center">{emp.vault && <div className="w-3 h-3 mx-auto rounded bg-emerald-500"/>}</td>
                        <td className="px-1 py-1 text-center">{emp.reception && <div className="w-3 h-3 mx-auto rounded bg-emerald-500"/>}</td>
                        <td className="px-1 py-1 text-center">{emp.lod && <div className="w-3 h-3 mx-auto rounded bg-emerald-500"/>}</td>
                        <td className="px-1 py-1 text-center">{emp.ipad && <div className="w-3 h-3 mx-auto rounded bg-emerald-500"/>}</td>
                        <td className="px-1 py-1 text-center">{emp.registers && <div className="w-3 h-3 mx-auto rounded bg-emerald-500"/>}</td>
                        <td className="px-1 py-1 text-center text-[10px]">{emp.ptoText||'-'}</td>
                        {w1 && [1,2,3,4,5,6,7].map(d=>{
                          const curVal = emp.week1?.[d]||'';
                          const curNorm = curVal.toUpperCase() === 'OFF' ? '' : curVal;
                          const sl = slots(d);
                          const hasMatch = sl.some(s => s.v === curNorm);
                          return <td key={'w1'+d} className="px-0.5 py-0.5 text-center bg-blue-50/30">
                          <select value={curNorm} onChange={e=>updShift(1,d,e.target.value)} className="w-full text-[9px] bg-transparent border-0 cursor-pointer text-center p-0 hover:bg-blue-100 rounded">
                            {!hasMatch && curNorm && <option value={curNorm}>{curNorm}</option>}
                            {sl.map((s,j)=><option key={j} value={s.v}>{s.v?s.l:'OFF'}</option>)}
                          </select>
                        </td>;
                        })}
                        {w2 && [1,2,3,4,5,6,7].map(d=>{
                          const curVal = emp.week2?.[d]||'';
                          const curNorm = curVal.toUpperCase() === 'OFF' ? '' : curVal;
                          const sl = slots(d);
                          const hasMatch = sl.some(s => s.v === curNorm);
                          return <td key={'w2'+d} className="px-0.5 py-0.5 text-center bg-green-50/30">
                          <select value={curNorm} onChange={e=>updShift(2,d,e.target.value)} className="w-full text-[9px] bg-transparent border-0 cursor-pointer text-center p-0 hover:bg-green-100 rounded">
                            {!hasMatch && curNorm && <option value={curNorm}>{curNorm}</option>}
                            {sl.map((s,j)=><option key={j} value={s.v}>{s.v?s.l:'OFF'}</option>)}
                          </select>
                        </td>;
                        })}
                        <td className="px-1 py-1 whitespace-nowrap">
                          <button onClick={()=>setEditEmp(realIdx)} className="text-blue-600 hover:underline text-[10px]">Edit</button>
                          <button onClick={()=>{if(confirm('Remove '+emp.name+'?')){const u=[...emps];u.splice(realIdx,1);setEmps(u);showToast(emp.name+' removed');}}} className="text-red-400 hover:text-red-600 text-[10px] ml-1">✕</button>
                        </td>
                      </tr>;
                    })}</tbody>
                  </table>
                </div>
              </div>}
            </div>
          </div>
        )}
        
        {tab === 'summary' && logged && (scheds.length>0 ? <StaffingSummary scheds={scheds} allScheds={allScheds} onSelect={setSelDay} staffReqs={staffReqs} setStaffReqs={setStaffReqs}/> : <div className="text-center py-12 bg-white rounded-lg card-shadow"><p className="text-gray-500">Generate schedules first.</p></div>)}
        
        {tab === 'cleaning' && logged && <CleaningLogs logs={cleanLogs} onView={setViewLog} allScheds={allScheds} onClearLog={setCleanLogs} breakSignups={breakSignups} onClearBreaks={setBreakSignups} onUpdateSched={(key,sched)=>{setAllScheds(prev=>({...prev,[key]:sched}));setScheds(prev=>{const ns=[...prev];const idx=ns.findIndex(x=>toDateKey(new Date(x.date))===key);if(idx>=0)ns[idx]=sched;return ns;});}}/>}
        
        {tab === 'help' && logged && (
          <div className="fade-in max-w-4xl mx-auto">
            <div className="bg-white rounded-xl card-shadow p-8">
              <h2 className="text-2xl font-bold mb-2">How to Use the Scheduler</h2>
              <p className="text-sm text-gray-500 mb-6">All changes save automatically across all devices.</p>
              
              <div className="space-y-6">
                <div className="border-l-4 border-emerald-500 pl-4">
                  <h3 className="font-bold text-lg mb-2">Tabs Overview</h3>
                  <p className="text-sm text-gray-700 mb-2">There are 6 tabs across the top:</p>
                  <ul className="text-sm text-gray-700 list-disc ml-5 space-y-1">
                    <li><strong>Daily Schedule</strong> — the public view anyone can see without logging in. Shows today's schedule (or tomorrow's after 8 PM). Designed for a shared pharmacy screen.</li>
                    <li><strong>15 Min Break Sign-Up</strong> — public sign-up sheet for 15-minute breaks. Shows today only. Employees pick their name, station, time, and who's covering.</li>
                    <li><strong>Employee Master Schedule</strong> — the main workspace. Manage employees, set shifts, generate daily schedules, and make edits. Requires login.</li>
                    <li><strong>Staffing Summary</strong> — monthly calendar showing which days are fully staffed (green) or short (red). Click any day for a breakdown.</li>
                    <li><strong>Cleaning/Break Logs</strong> — supervisor view of cleaning completions and break sign-ups by day. Click a day to see details.</li>
                  </ul>
                </div>

                <div className="border-l-4 border-blue-500 pl-4">
                  <h3 className="font-bold text-lg mb-2">Logging In</h3>
                  <p className="text-sm text-gray-700">Click <strong>🔐 Login</strong> (top right) with your supervisor credentials to unlock all features. Without logging in, only the Daily Schedule and 15 Min Break Sign-Up tabs are visible.</p>
                </div>

                <div className="border-l-4 border-indigo-500 pl-4">
                  <h3 className="font-bold text-lg mb-2">Loading Employee Schedules</h3>
                  <p className="text-sm text-gray-700 mb-2">On the <strong>Employee Master Schedule</strong> tab, use the left panel to load shifts from an Excel file:</p>
                  <ul className="text-sm text-gray-700 list-disc ml-5 space-y-1">
                    <li>Select <strong>Week 1</strong> or <strong>Week 2</strong></li>
                    <li>Click <strong>📁 Upload</strong> and choose your Excel file</li>
                    <li>Employees are added or updated — existing data is not erased</li>
                  </ul>
                  <p className="text-sm text-gray-700 mt-2">You can also click <strong>➕ Add Employee Manually</strong> to add someone by hand.</p>
                </div>

                <div className="border-l-4 border-purple-500 pl-4">
                  <h3 className="font-bold text-lg mb-2">Editing the Master Schedule</h3>
                  <p className="text-sm text-gray-700 mb-2">The master table shows all employees, their roles, and weekly shifts. <strong>Week 1</strong> = blue columns, <strong>Week 2</strong> = green columns.</p>
                  <ul className="text-sm text-gray-700 list-disc ml-5 space-y-1">
                    <li><strong>Change a shift</strong> — click any shift cell to pick a new time or OFF. Custom times from Excel are preserved.</li>
                    <li><strong>Edit an employee</strong> — click <strong>Edit</strong> to change name, roles, or PTO</li>
                    <li><strong>Remove an employee</strong> — click the <strong>✕</strong> next to Edit</li>
                    <li><strong>PTO format</strong> — <code className="bg-gray-100 px-1 rounded">3/1</code> for one day, <code className="bg-gray-100 px-1 rounded">3/1-3/5</code> for a range, comma-separate multiples</li>
                  </ul>
                </div>

                <div className="border-l-4 border-amber-500 pl-4">
                  <h3 className="font-bold text-lg mb-2">Generating Schedules</h3>
                  <p className="text-sm text-gray-700 mb-2">There are two ways to generate a daily schedule:</p>
                  <ul className="text-sm text-gray-700 list-disc ml-5 space-y-1">
                    <li><strong>Click any day on the calendar</strong> — if no schedule exists, a popup asks you to choose <strong>Week 1</strong> or <strong>Week 2</strong></li>
                    <li><strong>Use the date range picker</strong> — set From/To dates, click Generate, then choose Week 1 or Week 2 to generate multiple days at once</li>
                  </ul>
                  <p className="text-sm text-gray-700 mt-2">If a schedule already exists for that day, clicking the calendar shows it immediately. Each calendar day shows a <strong>W1</strong> or <strong>W2</strong> badge so you know which master schedule was used.</p>
                </div>

                <div className="border-l-4 border-teal-500 pl-4">
                  <h3 className="font-bold text-lg mb-2">Editing a Daily Schedule</h3>
                  <p className="text-sm text-gray-700 mb-2">The app defaults to today's schedule when you open it. Click any day on the calendar to switch. You can:</p>
                  <ul className="text-sm text-gray-700 list-disc ml-5 space-y-1">
                    <li><strong>Click any name cell</strong> — opens a dropdown to reassign. Employees with conflicts show a ⚠️ warning.</li>
                    <li><strong>Edit lunch times</strong> — click the time field to type a new time</li>
                    <li><strong>Edit break times</strong> — click the time field for a dropdown (15-min intervals from 10 AM to 6 PM)</li>
                    <li><strong>Edit deposits</strong> — click the person field for an employee dropdown</li>
                    <li><strong>↶ Undo</strong> — reverts the last action (up to 10 steps)</li>
                    <li><strong>🗑️ Clear Day</strong> — resets all positions to start fresh</li>
                    <li><strong>💾 Save</strong> — confirms your changes</li>
                  </ul>
                </div>

                <div className="border-l-4 border-cyan-500 pl-4">
                  <h3 className="font-bold text-lg mb-2">Split Shifts</h3>
                  <p className="text-sm text-gray-700 mb-2">When two people share iPad or AU Checkout 2 in one block, the cell shows both names with times (e.g. "DRE 12-2 / PETE 2-4"). Registers auto-swap to match.</p>
                  <p className="text-sm text-gray-700">To create or edit a split, click the ✏️ on the cell and type <code className="bg-gray-100 px-1 rounded">NAME 12-2 / NAME 2-4</code>. To remove, replace with a single name or <code className="bg-gray-100 px-1 rounded">X</code>.</p>
                </div>

                <div className="border-l-4 border-pink-500 pl-4">
                  <h3 className="font-bold text-lg mb-2">Employee Highlighting</h3>
                  <p className="text-sm text-gray-700 mb-2"><strong>Hover</strong> over any name in the master table — their positions in the daily schedule light up with their color.</p>
                  <p className="text-sm text-gray-700"><strong>Click</strong> anywhere in the name cell to pin a highlight. Click again to unpin. Pin multiple employees at once. Use <strong>Clear highlights</strong> to remove all.</p>
                </div>

                <div className="border-l-4 border-red-500 pl-4">
                  <h3 className="font-bold text-lg mb-2">Coverage Alerts & Validation</h3>
                  <p className="text-sm text-gray-700 mb-2">On the left panel:</p>
                  <ul className="text-sm text-gray-700 list-disc ml-5 space-y-1">
                    <li><strong>⚠️ Coverage Needed</strong> — warns when a shift is understaffed, showing which positions are short</li>
                    <li><strong>Schedule Validation</strong> — flags employees who are scheduled but not assigned, in conflicting positions, or manually added on a day they're normally off (shown in orange)</li>
                  </ul>
                  <p className="text-sm text-gray-700 mt-2">Green ✓ means everything checks out.</p>
                </div>

                <div className="border-l-4 border-emerald-500 pl-4">
                  <h3 className="font-bold text-lg mb-2">Daily Schedule (Public View)</h3>
                  <p className="text-sm text-gray-700 mb-2">This is what everyone sees — no login needed. It auto-switches to tomorrow after 8:15 PM. The schedule title shows the day and which week's master was used (e.g. "FRIDAY 5/9 (Wk 1)").</p>
                  <p className="text-sm text-gray-700 mb-2"><strong>Cleaning:</strong> Staff click <strong>Sign</strong> on their assigned cleaning task, check off each item, enter initials, and submit. Completed tasks show a green ✓.</p>
                  <p className="text-sm text-gray-700"><strong>Downtime Cleaning:</strong> Below the main schedule, the 2PM-4PM and 6PM-7PM cleaning blocks each have individual Sign buttons per task. Staff sign off one task at a time as they complete it.</p>
                </div>

                <div className="border-l-4 border-blue-500 pl-4">
                  <h3 className="font-bold text-lg mb-2">15 Min Break Sign-Up</h3>
                  <p className="text-sm text-gray-700 mb-2">A public tab (no login needed) where employees sign up for their 15-minute break. Shows today only — resets each new day.</p>
                  <p className="text-sm text-gray-700 mb-2">The full schedule shows every 15-minute slot from 10:00 AM to 6:00 PM. For each slot, employees pick their name, station (AU2, MED3, Reception, etc.), and who is covering. "X" is available if no one is covering.</p>
                  <p className="text-sm text-gray-700">Supervisors can review past days' break sign-ups in the <strong>Cleaning/Break Logs</strong> tab.</p>
                </div>

                <div className="border-l-4 border-orange-500 pl-4">
                  <h3 className="font-bold text-lg mb-2">Cleaning/Break Logs (Supervisor)</h3>
                  <p className="text-sm text-gray-700 mb-2">Monthly calendar view. Each day shows cleaning completion count and break sign-up count. Click any day to see:</p>
                  <ul className="text-sm text-gray-700 list-disc ml-5 space-y-1">
                    <li><strong>Cleaning Log</strong> — which areas were signed off, by whom, and when. Missing areas shown in red with assigned cleaner's name.</li>
                    <li><strong>Downtime Cleaning</strong> — individual task sign-offs for 2PM-4PM and 6PM-7PM blocks.</li>
                    <li><strong>15 Min Break Sign-Up</strong> — table of who took breaks, when, at what station, and who covered.</li>
                  </ul>
                  <p className="text-sm text-gray-700 mt-2">Supervisors can clear individual cleaning entries (✕), individual downtime entries (✕), or all break sign-ups for a day (🗑️ Clear Breaks).</p>
                </div>

                <div className="border-l-4 border-violet-500 pl-4">
                  <h3 className="font-bold text-lg mb-2">Calendar & Printing</h3>
                  <p className="text-sm text-gray-700 mb-2">The mini-calendar shows which days have schedules at a glance. Green ✓ = created (with timestamp), W1/W2 badge = which week was used, red ✗ = past day missing. Blue ring = today. Click any day to view or generate.</p>
                  <p className="text-sm text-gray-700">Click <strong>🖨️ Print</strong> on the Daily Schedule to print in landscape — all colors preserved, buttons hidden automatically.</p>
                </div>

                <div className="border-l-4 border-yellow-500 pl-4">
                  <h3 className="font-bold text-lg mb-2">Troubleshooting</h3>
                  <ul className="text-sm text-gray-700 list-disc ml-5 space-y-1">
                    <li><strong>Duplicate names</strong> — a warning banner appears. Rename one (e.g. "ARIFA K" / "ARIFA M").</li>
                    <li><strong>Generate not working</strong> — make sure employees are loaded first.</li>
                    <li><strong>Wrong employees on a schedule</strong> — regenerate the day. Check master schedule shifts are correct for that day.</li>
                    <li><strong>Changes not showing on another device</strong> — check internet and refresh the page.</li>
                    <li><strong>Cleaning/downtime sign-offs disappeared</strong> — refresh the page. All data syncs automatically and persists unless manually cleared by a supervisor.</li>
                  </ul>
                </div>
              </div>
            </div>
          </div>
        )}
      </main>
    </div>
  );
};

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  componentDidCatch(error, info) { console.error('Schedule crash:', error, info); }
  render() {
    if (this.state.hasError) {
      return React.createElement('div', {className:'min-h-screen flex items-center justify-center bg-slate-50 p-8'},
        React.createElement('div', {className:'bg-white rounded-xl p-8 max-w-md card-shadow text-center'},
          React.createElement('div', {className:'text-4xl mb-4'}, '⚠️'),
          React.createElement('h2', {className:'text-xl font-bold mb-2'}, 'Something went wrong'),
          React.createElement('p', {className:'text-gray-600 mb-4'}, 'The schedule display encountered an error. This usually happens with older schedule data.'),
          React.createElement('button', {className:'btn-primary px-6 py-2 text-white rounded-lg font-bold', onClick:()=>{this.setState({hasError:false,error:null});window.location.reload();}}, 'Reload Page')
        )
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ErrorBoundary, null, React.createElement(App)));
</script>
</body>
</html>
