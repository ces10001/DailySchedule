<body class="gradient-mesh min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    
    const EMPLOYEE_COLORS = ['#3B82F6','#EF4444','#10B981','#F59E0B','#8B5CF6','#EC4899','#06B6D4','#84CC16','#F97316','#6366F1','#14B8A6','#F43F5E','#0EA5E9','#A855F7','#22C55E','#EAB308','#E11D48','#7C3AED','#0D9488','#DC2626','#2563EB','#16A34A'];
    const SHAPES = ['circle','square','diamond','triangle','star','hexagon'];
    const CLEANING_AREAS = ['RECEPTION','DISPENSARY','VACUUM','BATHROOMS','KITCHEN'];
    const CLEANING_TASKS = {
      RECEPTION: ['Wipe down front counter','Clean glass doors','Sweep and mop floor','Empty trash','Organize displays','Sanitize touchscreens'],
      DISPENSARY: ['Wipe down counters','Clean screens/keyboards','Organize bins','Restock supplies','Clean printers','Sanitize stations'],
      VACUUM: ['Vacuum carpeted areas','Vacuum behind counters','Vacuum break room','Empty vacuum','Check for clogs'],
      BATHROOMS: ['Sanitize toilets','Clean sinks/mirrors','Refill supplies','Empty trash','Mop floors'],
      KITCHEN: ['Wash dishes','Wipe counters','Clean microwave','Clean fridge','Empty trash','Mop floor']
    };
    const TIME_SLOTS = [{value:'',label:'OFF'},{value:'8:30 AM - 12:00 PM',label:'8:30 AM - 12:00 PM'},{value:'8:45 AM - 12:00 PM',label:'8:45 AM - 12:00 PM'},{value:'8:30 AM - 4:15 PM',label:'8:30 AM - 4:15 PM'},{value:'8:45 AM - 4:15 PM',label:'8:45 AM - 4:15 PM'},{value:'12:00 PM - 8:15 PM',label:'12:00 PM - 8:15 PM'},{value:'12:00 PM - 4:15 PM',label:'12:00 PM - 4:15 PM'},{value:'4:00 PM - 8:15 PM',label:'4:00 PM - 8:15 PM'},{value:'8:30 AM - 8:15 PM',label:'8:30 AM - 8:15 PM'},{value:'8:45 AM - 8:15 PM',label:'8:45 AM - 8:15 PM'}];
    const SUNDAY_TIME_SLOTS = [{value:'',label:'OFF'},{value:'9:30 AM - 6:15 PM',label:'9:30 AM - 6:15 PM'},{value:'9:45 AM - 6:15 PM',label:'9:45 AM - 6:15 PM'}];
    
    const formatToEST = (iso) => new Date(iso).toLocaleString('en-US',{timeZone:'America/New_York',month:'numeric',day:'numeric',year:'2-digit',hour:'numeric',minute:'2-digit',hour12:true});
    const getESTHour = () => { const d = new Date(); return parseInt(d.toLocaleString('en-US',{timeZone:'America/New_York',hour:'numeric',hour12:false})); };
    
    // Bold, visible shape component - size 16px
    const EmpShape = ({ color, shape }) => {
      const size = 16;
      if (shape === 'circle') return <span style={{width:size,height:size,backgroundColor:color,borderRadius:'50%',display:'inline-block',marginRight:6,border:'2px solid #000'}}></span>;
      if (shape === 'square') return <span style={{width:size,height:size,backgroundColor:color,borderRadius:2,display:'inline-block',marginRight:6,border:'2px solid #000'}}></span>;
      if (shape === 'diamond') return <span style={{width:size,height:size,backgroundColor:color,transform:'rotate(45deg)',borderRadius:2,display:'inline-block',marginRight:6,border:'2px solid #000'}}></span>;
      if (shape === 'triangle') return <svg width={size+2} height={size} style={{display:'inline-block',marginRight:6}}><polygon points={`${(size+2)/2},1 ${size+1},${size-1} 1,${size-1}`} fill={color} stroke="#000" strokeWidth="2"/></svg>;
      if (shape === 'star') return <svg width={size+2} height={size+2} style={{display:'inline-block',marginRight:6}}><polygon points="9,1 11,7 17,7 12,11 14,17 9,13 4,17 6,11 1,7 7,7" fill={color} stroke="#000" strokeWidth="1.5"/></svg>;
      if (shape === 'hexagon') return <svg width={size+2} height={size} style={{display:'inline-block',marginRight:6}}><polygon points="9,1 16,5 16,13 9,17 2,13 2,5" fill={color} stroke="#000" strokeWidth="2"/></svg>;
      return <span style={{width:size,height:size,backgroundColor:color,borderRadius:'50%',display:'inline-block',marginRight:6,border:'2px solid #000'}}></span>;
    };

    const ScheduleEngine = {
      parseSegment(seg) {
        let startHour = -1, endHour = -1;
        seg = (seg || '').trim();
        if (!seg || !seg.includes('-')) return { startHour, endHour };
        const parts = seg.split('-');
        if (parts.length < 2) return { startHour, endHour };
        let startStr = parts[0].trim();
        let endStr = parts[parts.length - 1].trim();
        const startAM = startStr.toUpperCase().includes('AM');
        const startPM = startStr.toUpperCase().includes('PM');
        const endAM = endStr.toUpperCase().includes('AM');
        const endPM = endStr.toUpperCase().includes('PM');
        startStr = startStr.replace(/AM|PM/gi, '').trim();
        endStr = endStr.replace(/AM|PM/gi, '').trim();
        if (!startStr || !endStr) return { startHour, endHour };
        const sp = startStr.split(':');
        let h = parseFloat(sp[0]) || 0;
        let m = parseFloat(sp[1]) || 0;
        startHour = h + m / 60;
        const ep = endStr.split(':');
        h = parseFloat(ep[0]) || 0;
        m = parseFloat(ep[1]) || 0;
        endHour = h + m / 60;
        if (startPM && startHour < 12) startHour += 12;
        if (startAM && startHour === 12) startHour = 0;
        if (endPM && endHour < 12) endHour += 12;
        if (endAM && endHour === 12) endHour = 0;
        if (endPM && !startAM && !startPM && startHour < 12) startHour += 12;
        if ((startAM || startPM) && !endAM && !endPM && endHour <= 12 && endHour < startHour) endHour += 12;
        return { startHour, endHour };
      },
      isOnPTO(emp, checkDate) {
        const ptoVal = (emp.ptoText || '').trim();
        if (!ptoVal) return false;
        if (ptoVal === '✓' || ptoVal.toUpperCase() === 'TRUE' || ptoVal === 'X' || ptoVal === 'x') return true;
        const ranges = ptoVal.split(',');
        for (let rng of ranges) {
          rng = rng.trim();
          if (rng.includes('-')) {
            const pts = rng.split('-');
            const sd = new Date(pts[0].trim() + '/' + checkDate.getFullYear());
            const ed = new Date(pts[1].trim() + '/' + checkDate.getFullYear());
            if (checkDate >= sd && checkDate <= ed) return true;
          } else {
            const single = new Date(rng + '/' + checkDate.getFullYear());
            if (checkDate.toDateString() === single.toDateString()) return true;
          }
        }
        return false;
      },
      getSched(emp, wk, dy) { return wk === 1 ? (emp.week1 && emp.week1[dy]) || '' : (emp.week2 && emp.week2[dy]) || ''; },
      avail(emp, wk, dy, block, checkDate, isSunday) {
        if (this.isOnPTO(emp, checkDate)) return false;
        const sched = this.getSched(emp, wk, dy);
        if (!sched || sched.toUpperCase() === 'OFF') return false;
        let bS, bE;
        if (isSunday) { if (block === 1) { bS = 10; bE = 12; } else if (block === 2) { bS = 12; bE = 15; } else { bS = 15; bE = 18.25; } }
        else { if (block === 1) { bS = 9; bE = 12; } else if (block === 2) { bS = 12; bE = 16.25; } else { bS = 16; bE = 20.25; } }
        const { startHour, endHour } = this.parseSegment(sched);
        if (startHour < 0 || endHour < 0) return false;
        return startHour <= bS && endHour >= bE;
      },
      availHours(emp, wk, dy, startH, endH, checkDate) {
        if (this.isOnPTO(emp, checkDate)) return false;
        const sched = this.getSched(emp, wk, dy);
        if (!sched || sched.toUpperCase() === 'OFF') return false;
        const { startHour, endHour } = this.parseSegment(sched);
        if (startHour < 0 || endHour < 0) return false;
        return startHour <= startH && endHour >= endH;
      },
      arrivesEarly(emp, wk, dy, checkDate, isSunday) {
        if (this.isOnPTO(emp, checkDate)) return false;
        const sched = this.getSched(emp, wk, dy);
        if (!sched || sched.toUpperCase() === 'OFF') return false;
        const threshold = isSunday ? 9.75 : 8.75;
        const { startHour } = this.parseSegment(sched);
        return startHour >= 0 && startHour <= threshold;
      },
      getEmpStartTime(emp, wk, dy) { const sched = this.getSched(emp, wk, dy); if (!sched || sched.toUpperCase() === 'OFF') return 99; const { startHour } = this.parseSegment(sched); return startHour >= 0 ? startHour : 99; },
      getEmpEndTime(emp, wk, dy) { const sched = this.getSched(emp, wk, dy); if (!sched || sched.toUpperCase() === 'OFF') return 0; const { endHour } = this.parseSegment(sched); return endHour >= 0 ? endHour : 0; },
      getEmpHours(emp, wk, dy) { const s = this.getEmpStartTime(emp, wk, dy), e = this.getEmpEndTime(emp, wk, dy); if (s === 99 || e === 0) return 0; return e - s; },
      isVaultOnly: (e) => e.vault && !e.reception && !e.lod && !e.ipad && !e.registers,
      isReceptionOnly: (e) => e.reception && !e.lod && !e.ipad && !e.registers,
      isiPadOnly: (e) => e.ipad && !e.reception && !e.lod && !e.registers,
      isRegistersOnly: (e) => e.registers && !e.reception && !e.lod && !e.ipad,
      worksTwoShifts(emp, wk, dy) { return this.getEmpHours(emp, wk, dy) >= 7; },
      worksSingleShift(emp, wk, dy) { const h = this.getEmpHours(emp, wk, dy); return h >= 4 && h < 7; },
      findRole(employees, wk, dy, block, role, used, checkDate, isSunday, excludeLOD) {
        for (const emp of employees) {
          if (this.isOnPTO(emp, checkDate) || this.isVaultOnly(emp)) continue;
          if (excludeLOD && emp.lod) continue;
          let roleMatch = false, singleRoleMatch = false;
          if (role === 'REC') { roleMatch = emp.reception; singleRoleMatch = this.isReceptionOnly(emp); }
          else if (role === 'IPAD') { roleMatch = emp.ipad; singleRoleMatch = this.isiPadOnly(emp); }
          else if (role === 'REG') { roleMatch = emp.registers; singleRoleMatch = this.isRegistersOnly(emp); }
          else if (role === 'LOD') { roleMatch = emp.lod; singleRoleMatch = true; }
          if (!roleMatch || !singleRoleMatch) continue;
          if (this.avail(emp, wk, dy, block, checkDate, isSunday) && !used.includes(emp.name)) return emp.name;
        }
        for (const emp of employees) {
          if (this.isOnPTO(emp, checkDate) || this.isVaultOnly(emp)) continue;
          if (excludeLOD && emp.lod) continue;
          let roleMatch = false;
          if (role === 'REC') roleMatch = emp.reception;
          else if (role === 'IPAD') roleMatch = emp.ipad;
          else if (role === 'REG') roleMatch = emp.registers;
          else if (role === 'LOD') roleMatch = emp.lod;
          if (!roleMatch) continue;
          if (this.avail(emp, wk, dy, block, checkDate, isSunday) && !used.includes(emp.name)) return emp.name;
        }
        return 'X';
      },
      findRoleRotate(employees, wk, dy, block, role, used, avoid, checkDate, isSunday) {
        for (const emp of employees) {
          if (this.isOnPTO(emp, checkDate) || this.isVaultOnly(emp) || avoid.includes(emp.name)) continue;
          let roleMatch = false, singleRoleMatch = false;
          if (role === 'REC') { roleMatch = emp.reception; singleRoleMatch = this.isReceptionOnly(emp); }
          else if (role === 'REG') { roleMatch = emp.registers; singleRoleMatch = this.isRegistersOnly(emp); }
          if (!roleMatch || !singleRoleMatch) continue;
          if (this.avail(emp, wk, dy, block, checkDate, isSunday) && !used.includes(emp.name)) return emp.name;
        }
        for (const emp of employees) {
          if (this.isOnPTO(emp, checkDate) || this.isVaultOnly(emp) || avoid.includes(emp.name)) continue;
          const roleMatch = role === 'REC' ? emp.reception : emp.registers;
          if (!roleMatch) continue;
          if (this.avail(emp, wk, dy, block, checkDate, isSunday) && !used.includes(emp.name)) return emp.name;
        }
        return this.findRole(employees, wk, dy, block, role, used, checkDate, isSunday, false);
      },
      findIPadSlot(employees, wk, dy, startH, endH, used, checkDate) {
        for (const emp of employees) {
          if (this.isOnPTO(emp, checkDate) || this.isVaultOnly(emp)) continue;
          if (!emp.ipad || !this.isiPadOnly(emp)) continue;
          if (this.availHours(emp, wk, dy, startH, endH, checkDate) && !used.includes(emp.name)) return emp.name;
        }
        for (const emp of employees) {
          if (this.isOnPTO(emp, checkDate) || this.isVaultOnly(emp) || !emp.ipad) continue;
          if (this.availHours(emp, wk, dy, startH, endH, checkDate) && !used.includes(emp.name)) return emp.name;
        }
        return 'X';
      },
      findIPadSlotRotate(employees, wk, dy, startH, endH, used, avoid, checkDate) {
        for (const emp of employees) {
          if (this.isOnPTO(emp, checkDate) || this.isVaultOnly(emp) || avoid.includes(emp.name)) continue;
          if (!emp.ipad || !this.isiPadOnly(emp)) continue;
          if (this.availHours(emp, wk, dy, startH, endH, checkDate) && !used.includes(emp.name)) return emp.name;
        }
        for (const emp of employees) {
          if (this.isOnPTO(emp, checkDate) || this.isVaultOnly(emp) || avoid.includes(emp.name) || !emp.ipad) continue;
          if (this.availHours(emp, wk, dy, startH, endH, checkDate) && !used.includes(emp.name)) return emp.name;
        }
        return this.findIPadSlot(employees, wk, dy, startH, endH, used, checkDate);
      },
      findVaultPerson(employees, wk, dy, block, used, checkDate, isSunday) {
        for (const emp of employees) {
          if (this.isOnPTO(emp, checkDate)) continue;
          if (emp.vault && this.isVaultOnly(emp) && this.avail(emp, wk, dy, block, checkDate, isSunday) && !used.includes(emp.name)) return emp.name;
        }
        for (const emp of employees) {
          if (this.isOnPTO(emp, checkDate) || !emp.vault) continue;
          if (this.avail(emp, wk, dy, block, checkDate, isSunday) && !used.includes(emp.name)) return emp.name;
        }
        return 'X';
      },
      formatTime(hour) {
        const h = Math.floor(hour); const m = Math.round((hour - h) * 60);
        const suffix = h >= 12 ? ' PM' : ' AM';
        const displayH = h > 12 ? h - 12 : (h === 0 ? 12 : h);
        return m === 0 ? displayH + ':00' + suffix : displayH + ':' + m.toString().padStart(2, '0') + suffix;
      },
      isBreakBlocked(breakTime, lunchTimes) { for (const lt of lunchTimes) if (breakTime >= lt && breakTime < lt + 0.5) return true; return false; },
      buildDay(employees, wk, dy, dayDate, isSunday, cleanRotation) {
        const dayNames = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
        const dayTitle = dayNames[dayDate.getDay()];
        const dateStr = (dayDate.getMonth()+1) + '/' + dayDate.getDate();
        let t1S, t1E, t2S, t2E, t3S, t3E, cleanTime;
        if (isSunday) { t1S = '10:00 AM'; t1E = '12:00 PM'; t2S = '12:00 PM'; t2E = '3:00 PM'; t3S = '3:00 PM'; t3E = '6:15 PM'; cleanTime = '9:30 (9:45) AM - 10:00 AM'; }
        else { t1S = '9:00 AM'; t1E = '12:00 PM'; t2S = '12:00 PM'; t2E = '4:15 PM'; t3S = '4:00 PM'; t3E = '8:15 PM'; cleanTime = '8:30 (8:45) AM - 9:00 AM'; }
        const earlyList = employees.filter(emp => this.arrivesEarly(emp, wk, dy, dayDate, isSunday) && !this.isVaultOnly(emp));
        const tasks = ['RECEPTION','DISPENSARY','VACUUM','BATHROOMS','KITCHEN'];
        const cleaning = tasks.map((task, i) => {
          if (earlyList.length > 0) { const idx = (cleanRotation + i) % earlyList.length; return { task: task, name: earlyList[idx].name }; }
          return { task: task, name: 'X' };
        });
        let u1 = [], u2 = [], u3 = [];
        const lod1 = this.findRole(employees, wk, dy, 1, 'LOD', u1, dayDate, isSunday, false); u1.push(lod1);
        const lod2 = this.findRole(employees, wk, dy, 2, 'LOD', u2, dayDate, isSunday, false); u2.push(lod2);
        const lod3 = this.findRole(employees, wk, dy, 3, 'LOD', u3, dayDate, isSunday, false); u3.push(lod3);
        const r1 = this.findRole(employees, wk, dy, 1, 'REC', u1.slice(), dayDate, isSunday, true); u1.push(r1);
        const r2 = this.findRole(employees, wk, dy, 1, 'REC', u1.slice(), dayDate, isSunday, true); u1.push(r2);
        const r1b2 = this.findRoleRotate(employees, wk, dy, 2, 'REC', u2.slice(), [r1, lod2], dayDate, isSunday); u2.push(r1b2);
        const r2b2 = this.findRoleRotate(employees, wk, dy, 2, 'REC', u2.slice(), [r2, lod2], dayDate, isSunday); u2.push(r2b2);
        const r1b3 = this.findRoleRotate(employees, wk, dy, 3, 'REC', u3.slice(), [r1, r1b2, lod3], dayDate, isSunday); u3.push(r1b3);
        const r2b3 = this.findRoleRotate(employees, wk, dy, 3, 'REC', u3.slice(), [r2, r2b2, lod3], dayDate, isSunday); u3.push(r2b3);
        let ip1, ip2a, ip2b, ip3a, ip3b, ipDisplay1, ipDisplay2, ipDisplay3, ipTime1, ipTime2, ipTime3;
        if (isSunday) {
          ip1 = this.findIPadSlot(employees, wk, dy, 10, 12, u1, dayDate); u1.push(ip1);
          ip2a = this.findIPadSlotRotate(employees, wk, dy, 12, 15, u2, [ip1], dayDate); u2.push(ip2a);
          ip3a = this.findIPadSlotRotate(employees, wk, dy, 15, 18.25, u3, [ip1, ip2a], dayDate); u3.push(ip3a);
          ipDisplay1 = ip1; ipDisplay2 = ip2a; ipDisplay3 = ip3a;
          ipTime1 = '10:00 AM - 12:00 PM'; ipTime2 = '12:00 PM - 3:00 PM'; ipTime3 = '3:00 PM - 6:15 PM';
        } else {
          ip1 = this.findIPadSlot(employees, wk, dy, 9, 12, u1, dayDate); u1.push(ip1);
          ip2a = this.findIPadSlotRotate(employees, wk, dy, 12, 14, u2, [ip1], dayDate); u2.push(ip2a);
          ip2b = this.findIPadSlotRotate(employees, wk, dy, 14, 16, u2, [ip1], dayDate); u2.push(ip2b);
          ip3a = this.findIPadSlotRotate(employees, wk, dy, 16, 18, u3, [ip1, ip2a, ip2b], dayDate); u3.push(ip3a);
          ip3b = this.findIPadSlotRotate(employees, wk, dy, 18, 20, u3, [ip1, ip2a, ip2b], dayDate); u3.push(ip3b);
          ipDisplay1 = ip1; ipTime1 = '9:00 AM - 12:00 PM';
          if (ip2a === ip2b && ip2a !== 'X') ipDisplay2 = ip2a;
          else if (ip2a !== 'X' && ip2b !== 'X') ipDisplay2 = ip2a + ' 12-2 / ' + ip2b + ' 2-4';
          else if (ip2a !== 'X') ipDisplay2 = ip2a + ' 12-2'; else if (ip2b !== 'X') ipDisplay2 = ip2b + ' 2-4'; else ipDisplay2 = 'X';
          ipTime2 = '12:00 PM - 4:00 PM';
          if (ip3a === ip3b && ip3a !== 'X') ipDisplay3 = ip3a;
          else if (ip3a !== 'X' && ip3b !== 'X') ipDisplay3 = ip3a + ' 4-6 / ' + ip3b + ' 6-8';
          else if (ip3a !== 'X') ipDisplay3 = ip3a + ' 4-6'; else if (ip3b !== 'X') ipDisplay3 = ip3b + ' 6-8'; else ipDisplay3 = 'X';
          ipTime3 = '4:00 PM - 8:00 PM';
        }
        let uReg1 = [r1, r2, ip1], uReg2 = [r1b2, r2b2, ip2a, ip2b].filter(Boolean), uReg3 = [r1b3, r2b3, ip3a, ip3b].filter(Boolean);
        const rg3b1 = lod1 !== 'X' ? lod1 : this.findRole(employees, wk, dy, 1, 'REG', uReg1, dayDate, isSunday, false); uReg1.push(rg3b1);
        const a1 = this.findRole(employees, wk, dy, 1, 'REG', uReg1, dayDate, isSunday, false); uReg1.push(a1);
        const a2 = this.findRole(employees, wk, dy, 1, 'REG', uReg1, dayDate, isSunday, false); uReg1.push(a2);
        const a3 = this.findRole(employees, wk, dy, 1, 'REG', uReg1, dayDate, isSunday, false); uReg1.push(a3);
        const rg1 = this.findRole(employees, wk, dy, 1, 'REG', uReg1, dayDate, isSunday, false); uReg1.push(rg1);
        const rg2 = this.findRole(employees, wk, dy, 1, 'REG', uReg1, dayDate, isSunday, false); uReg1.push(rg2);
        const rg3b2 = lod2 !== 'X' ? lod2 : this.findRoleRotate(employees, wk, dy, 2, 'REG', uReg2, [rg3b1], dayDate, isSunday); uReg2.push(rg3b2);
        const a1b2 = this.findRoleRotate(employees, wk, dy, 2, 'REG', uReg2, [a1], dayDate, isSunday); uReg2.push(a1b2);
        const a2b2 = this.findRoleRotate(employees, wk, dy, 2, 'REG', uReg2, [a2], dayDate, isSunday); uReg2.push(a2b2);

      };
      
      const saveChanges = () => { localStorage.setItem('pharmacy-scheduler-v3', JSON.stringify({ employees, week1Start, week2Start, schedules, allSchedules, generatedDays, cleaningLogs })); setHasUnsavedChanges(false); alert('Changes saved!'); };
      
      const handleFileUpload = (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const data = new Uint8Array(evt.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet, { header: 1 });
            const newEmployees = [];
            for (let i = 2; i < json.length; i++) {
              const row = json[i]; if (!row[0]) continue;
              const isCheck = (v) => v === '✓' || v === 'X' || v === 'x' || v === true || v === 'TRUE';
              newEmployees.push({ name: row[0] || '', vault: isCheck(row[1]), reception: isCheck(row[2]), lod: isCheck(row[3]), ipad: isCheck(row[4]), registers: isCheck(row[5]), ptoText: row[6] || '', notes: row[7] || '', week1: { 1: row[8] || '', 2: row[9] || '', 3: row[10] || '', 4: row[11] || '', 5: row[12] || '', 6: row[13] || '', 7: row[14] || '' }, week2: { 1: row[15] || '', 2: row[16] || '', 3: row[17] || '', 4: row[18] || '', 5: row[19] || '', 6: row[20] || '', 7: row[21] || '' } });
            }
            setEmployees(newEmployees);
          } catch (err) { console.error(err); }
        };
        reader.readAsArrayBuffer(file);
      };
      
      const handleSaveEmployee = (emp) => {
        if (editingEmployee !== null) { const updated = [...employees]; updated[editingEmployee] = emp; setEmployees(updated); setEditingEmployee(null); }
        else { setEmployees([...employees, emp]); setShowAddForm(false); }
      };
      
      const handleCalendarDayClick = (date) => {
        const dateKey = date.toISOString().split('T')[0];
        if (allSchedules[dateKey]) {
          const idx = schedules.findIndex(s => new Date(s.date).toISOString().split('T')[0] === dateKey);
          if (idx >= 0) setSelectedDay(idx);
          else { setSchedules([...schedules, allSchedules[dateKey]].sort((a, b) => new Date(a.date) - new Date(b.date))); setSelectedDay(schedules.length); }
        } else generateSingleDay(date);
      };
      
      const handleCleaningSubmit = (log) => { const today = new Date().toISOString().split('T')[0]; const existing = cleaningLogs[today] || []; setCleaningLogs({ ...cleaningLogs, [today]: [...existing, log] }); };
      
      const getDateForDay = (wk, dy) => { const start = wk === 1 ? new Date(week1Start) : new Date(week2Start); start.setDate(start.getDate() + (dy - 1)); return (start.getMonth() + 1) + '/' + start.getDate(); };
      
      return (
        <div className="min-h-screen pb-20">
          {showLoginModal && <LoginModal onLogin={() => { setIsLoggedIn(true); setShowLoginModal(false); }} onClose={() => setShowLoginModal(false)} />}
          {showCleaningModal && <CleaningModal task={showCleaningModal} onClose={() => setShowCleaningModal(null)} onSubmit={handleCleaningSubmit} />}
          {viewingLog && <CleaningModal task={viewingLog.task} existingLog={viewingLog} onClose={() => setViewingLog(null)} onSubmit={() => {}} />}
          
          <header className="no-print bg-white/80 backdrop-blur-sm border-b sticky top-0 z-40">
            <div className="max-w-[1800px] mx-auto px-4 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-400 to-emerald-600 flex items-center justify-center"><span className="text-white text-xl">📋</span></div>
                  <h1 className="text-xl font-bold text-gray-900">Pharmacy Scheduler</h1>
                </div>
                <div className="flex items-center gap-4">
                  <div className="flex gap-2">
                    <button onClick={() => setTab('schedule')} className={'px-4 py-2 rounded-lg font-medium text-sm transition-all ' + (tab === 'schedule' ? 'tab-active' : 'bg-gray-100 hover:bg-gray-200')}>Daily Schedule</button>
                    {isLoggedIn && (<>
                      <button onClick={() => setTab('employees')} className={'px-4 py-2 rounded-lg font-medium text-sm transition-all ' + (tab === 'employees' ? 'tab-active' : 'bg-gray-100 hover:bg-gray-200')}>Employee Master Schedule</button>
                      <button onClick={() => setTab('summary')} className={'px-4 py-2 rounded-lg font-medium text-sm transition-all ' + (tab === 'summary' ? 'tab-active' : 'bg-gray-100 hover:bg-gray-200')}>Staffing Summary</button>
                      <button onClick={() => setTab('cleaning')} className={'px-4 py-2 rounded-lg font-medium text-sm transition-all ' + (tab === 'cleaning' ? 'tab-active' : 'bg-gray-100 hover:bg-gray-200')}>Cleaning Logs</button>
                    </>)}
                  </div>
                  {!isLoggedIn ? (<button onClick={() => setShowLoginModal(true)} className="px-4 py-2 bg-gray-800 text-white rounded-lg font-medium text-sm hover:bg-gray-900">🔐 Supervisor Login</button>) : (<button onClick={() => { setIsLoggedIn(false); setTab('schedule'); }} className="px-4 py-2 bg-red-600 text-white rounded-lg font-medium text-sm hover:bg-red-700">Logout</button>)}
                </div>
              </div>
            </div>
          </header>
          
          <main className="max-w-[1800px] mx-auto px-4 py-6">
            {tab === 'schedule' && (
              <div className="fade-in">
                {todaySchedule ? (
                  <>
                    <div className="no-print flex items-center justify-between mb-4">
                      <h2 className="text-xl font-bold">{getESTHour() >= 20 ? "Tomorrow's" : "Today's"} Schedule</h2>
                      <button onClick={() => window.print()} className="px-4 py-2 bg-gray-800 text-white rounded-lg font-medium hover:bg-gray-900">🖨️ Print</button>
                    </div>
                    <ScheduleDisplay schedule={todaySchedule} employees={sortedEmployees} onCleaningSign={setShowCleaningModal} isEditable={false} />
                  </>
                ) : (
                  <div className="text-center py-12 bg-white rounded-lg card-shadow">
                    <span className="text-5xl mb-4 block">📅</span>
                    <p className="text-gray-500 mb-4">No schedule available for today.</p>
                    {isLoggedIn ? (<button onClick={() => setTab('employees')} className="btn-primary px-6 py-2 text-white rounded-lg font-medium">Go to Employee Master Schedule →</button>) : (<p className="text-sm text-gray-400">Please contact a supervisor to generate schedules.</p>)}
                  </div>
                )}
              </div>
            )}
            
            {tab === 'employees' && isLoggedIn && (
              <div className="fade-in">
                <div className="grid grid-cols-12 gap-4">
                  <div className="col-span-3">
                    <div className="bg-white p-4 rounded-lg card-shadow mb-4">
                      <h3 className="font-bold mb-3">Schedule Period</h3>
                      <div className="space-y-2">
                        <div><label className="block text-xs font-medium mb-1">Week 1 Start</label><input type="date" value={week1Start} onChange={(e) => { setWeek1Start(e.target.value); const d = new Date(e.target.value); d.setDate(d.getDate() + 7); setWeek2Start(d.toISOString().split('T')[0]); }} className="w-full px-2 py-1.5 text-sm border rounded-lg" /></div>
                        <div><label className="block text-xs font-medium mb-1">Week 2 Start</label><input type="date" value={week2Start} onChange={(e) => setWeek2Start(e.target.value)} className="w-full px-2 py-1.5 text-sm border rounded-lg" /></div>
                      </div>
                      {employees.length > 0 && week1Start && week2Start && (<button onClick={generateAllSchedules} className="mt-3 btn-primary px-3 py-2 text-white rounded-lg font-bold text-sm w-full">🗓️ Generate All 14 Days</button>)}
                      <div className="mt-4 pt-4 border-t"><h4 className="font-bold text-sm mb-2">Generate Single Day</h4><input type="date" value={singleDayDate} onChange={(e) => setSingleDayDate(e.target.value)} className="w-full px-2 py-1.5 text-sm border rounded-lg mb-2" /><button onClick={() => singleDayDate && generateSingleDay(new Date(singleDayDate))} disabled={!singleDayDate || employees.length === 0} className="w-full px-3 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 disabled:opacity-50">Generate Day</button></div>
                    </div>
                    <MonthlyCalendar generatedDays={generatedDays} onDayClick={handleCalendarDayClick} />
                    <div className="mt-4 bg-white p-4 rounded-lg card-shadow"><h3 className="font-bold mb-2">Import</h3><label className="block"><div className="border-2 border-dashed border-gray-300 rounded-lg p-3 text-center cursor-pointer hover:border-emerald-500 hover:bg-emerald-50 transition-all"><span className="text-xl">📁</span><p className="text-xs font-medium text-gray-700">Upload Excel</p><input type="file" accept=".xlsx,.xls,.csv" onChange={handleFileUpload} className="hidden" /></div></label><button onClick={() => setShowAddForm(true)} className="mt-2 w-full px-3 py-1.5 bg-gray-100 rounded-lg text-xs font-medium hover:bg-gray-200">➕ Add Manually</button></div>
                  </div>
                  
                  <div className="col-span-9">
                    {schedules.length > 0 && (<div className="flex flex-wrap gap-1 mb-3">{schedules.map((s, i) => (<button key={i} onClick={() => setSelectedDay(i)} className={'px-2 py-1 rounded text-xs font-medium transition-all ' + (selectedDay === i ? 'bg-emerald-600 text-white' : 'bg-white hover:bg-gray-100 border')}>{s.isSunday ? '☀️' : ''} {s.dateStr}</button>))}</div>)}
                    
                    {(showAddForm || editingEmployee !== null) && (<div className="mb-3"><EmployeeForm employee={editingEmployee !== null ? employees[editingEmployee] : null} onSave={handleSaveEmployee} onCancel={() => { setShowAddForm(false); setEditingEmployee(null); }} /></div>)}
                    
                    {schedules.length > 0 && schedules[selectedDay] && (
                      <div className="mb-4">
                        <div className="flex items-center justify-between mb-2">
                          <span className="text-sm font-medium text-gray-600">Editing: {schedules[selectedDay].fullTitle}</span>
                          {hasUnsavedChanges && <button onClick={saveChanges} className="px-4 py-1 bg-amber-500 text-white rounded text-sm font-medium hover:bg-amber-600">💾 Save Changes</button>}
                        </div>
                        <ScheduleDisplay schedule={schedules[selectedDay]} employees={sortedEmployees} onScheduleUpdate={handleScheduleUpdate} isEditable={true} onCleaningSign={setShowCleaningModal} />
                      </div>
                    )}
                    
                    {employees.length > 0 && (
                      <div className="bg-white rounded-lg card-shadow overflow-hidden">
                        <div className="bg-gray-800 text-white px-4 py-2 flex justify-between items-center">
                          <h3 className="font-bold text-sm">Master Schedule ({employees.length} Employees)</h3>
                          {schedules.length > 0 && schedules[selectedDay] && <span className="text-emerald-300 text-xs">🟢 = Scheduled for {schedules[selectedDay].fullTitle}</span>}
                        </div>
                        <div className="overflow-x-auto max-h-[350px] overflow-y-auto">
                          <table className="w-full text-xs">
                            <thead className="sticky top-0 z-10">
                              <tr className="bg-gray-100">
                                <th className="px-2 py-1 text-left font-semibold sticky left-0 bg-gray-100 z-20 min-w-[150px]">Name</th>
                                <th className="px-1 py-1 text-center w-8">V</th><th className="px-1 py-1 text-center w-8">R</th><th className="px-1 py-1 text-center w-8">L</th><th className="px-1 py-1 text-center w-8">I</th><th className="px-1 py-1 text-center w-8">Reg</th><th className="px-1 py-1 text-center min-w-[50px]">PTO</th>
                                {week1Start && [1,2,3,4,5,6,7].map(d => (<th key={'w1-'+d} className="px-1 py-1 text-center bg-blue-50 min-w-[85px]"><div className="text-[10px]">{['Mon','Tue','Wed','Thu','Fri','Sat','Sun'][d-1]}</div><div className="text-[9px] text-gray-500">{getDateForDay(1, d)}</div></th>))}
                                {week2Start && [1,2,3,4,5,6,7].map(d => (<th key={'w2-'+d} className="px-1 py-1 text-center bg-green-50 min-w-[85px]"><div className="text-[10px]">{['Mon','Tue','Wed','Thu','Fri','Sat','Sun'][d-1]}</div><div className="text-[9px] text-gray-500">{getDateForDay(2, d)}</div></th>))}
                                <th className="px-1 py-1 min-w-[40px]"></th>
                              </tr>
                            </thead>
                            <tbody>
                              {sortedEmployees.map((emp, idx) => {
                                const currentSchedule = schedules[selectedDay];
                                let isScheduledToday = false;
                                if (currentSchedule) {
                                  const allNames = [...currentSchedule.lod.map(l => l.name), ...currentSchedule.reception.flatMap(r => [r.r1, r.r2]), ...currentSchedule.ipad.map(i => i.display), ...currentSchedule.medCheckout.flatMap(m => [m.mc1, m.mc2, m.med3au1]), ...currentSchedule.auCheckout.flatMap(a => [a.au2, a.au3, a.au4]), ...currentSchedule.vault.flatMap(v => [v.au, v.med]), ...currentSchedule.cleaning.map(c => c.name), ...currentSchedule.lunches.map(l => l.name), ...currentSchedule.breaks.filter(b => b.name).map(b => b.name)].map(n => n ? n.toUpperCase() : '');
                                  isScheduledToday = allNames.includes(emp.name.toUpperCase());
                                }
                                const shape = empShapes[emp.name.toUpperCase()];
                                const realIdx = employees.findIndex(e => e.name === emp.name);
                                return (
                                  <tr key={idx} className={'border-t ' + (isScheduledToday ? 'bg-emerald-50' : 'hover:bg-gray-50')}>
                                    <td className={'px-2 py-1 font-medium sticky left-0 ' + (isScheduledToday ? 'bg-emerald-100' : 'bg-white')}>
                                      {shape && <EmpShape color={shape.color} shape={shape.shape} />}
                                      {emp.name}
                                    </td>
                                    <td className="px-1 py-1 text-center">{emp.vault && <div className="w-3 h-3 mx-auto rounded bg-emerald-500"></div>}</td>
                                    <td className="px-1 py-1 text-center">{emp.reception && <div className="w-3 h-3 mx-auto rounded bg-emerald-500"></div>}</td>
                                    <td className="px-1 py-1 text-center">{emp.lod && <div className="w-3 h-3 mx-auto rounded bg-emerald-500"></div>}</td>
                                    <td className="px-1 py-1 text-center">{emp.ipad && <div className="w-3 h-3 mx-auto rounded bg-emerald-500"></div>}</td>
                                    <td className="px-1 py-1 text-center">{emp.registers && <div className="w-3 h-3 mx-auto rounded bg-emerald-500"></div>}</td>
                                    <td className="px-1 py-1 text-center text-[10px]">{emp.ptoText || '-'}</td>
                                    {week1Start && [1,2,3,4,5,6,7].map(d => <td key={'w1-'+d} className="px-1 py-1 text-center text-[10px] bg-blue-50/30">{emp.week1 && emp.week1[d] ? emp.week1[d] : '-'}</td>)}
                                    {week2Start && [1,2,3,4,5,6,7].map(d => <td key={'w2-'+d} className="px-1 py-1 text-center text-[10px] bg-green-50/30">{emp.week2 && emp.week2[d] ? emp.week2[d] : '-'}</td>)}
                                    <td className="px-1 py-1"><button onClick={() => setEditingEmployee(realIdx)} className="text-blue-600 hover:underline text-[10px]">Edit</button></td>
                                  </tr>
                                );
                              })}
                            </tbody>
                          </table>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            )}
            
            {tab === 'summary' && isLoggedIn && (
              <div className="fade-in">
                {schedules.length > 0 ? <StaffingSummary schedules={schedules} allSchedules={allSchedules} onDaySelect={setSelectedDay} /> : (<div className="text-center py-12 bg-white rounded-lg card-shadow"><p className="text-gray-500">Generate schedules first to see the summary.</p></div>)}
              </div>
            )}
            
            {tab === 'cleaning' && isLoggedIn && <CleaningLogsCalendar cleaningLogs={cleaningLogs} onViewLog={setViewingLog} />}
          </main>
        </div>
      );
    };
    
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
