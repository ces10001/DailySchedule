const STATION_OPTIONS = ['','AU2','AU3','AU4','MED1','MED2','MED3','Vault','Reception 1','Reception 2','iPad'];

];

// ============== UTILITIES ==============
const formatEST = (iso) => new Date(iso).toLocaleString('en-US',{timeZone:'America/New_York',month:'numeric',day:'numeric',year:'2-digit',hour:'numeric',minute:'2-digit',hour12:true});
const getESTTime = () => { const d = new Date().toLocaleString('en-US',{timeZone:'America/New_York',hour:'numeric',minute:'numeric',hour12:false}); const [h,m] = d.split(':'); return parseInt(h) + parseInt(m)/60; };
const formatTime = (h) => { const hr = Math.floor(h), m = Math.round((h-hr)*60), sfx = hr >= 12 ? ' PM' : ' AM', dh = hr > 12 ? hr-12 : (hr === 0 ? 12 : hr); return m === 0 ? dh+':00'+sfx : dh+':'+String(m).padStart(2,'0')+sfx; };
const toDateKey = (d) => d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
const todayKey = () => toDateKey(new Date());

// ============== UTILITIES (continued) ==============
// Extract employee name from cell value, stripping trailing time suffixes like "12-2", "2-4", "4-6", "6-8"
const extractName = (s) => s ? s.replace(/\s+\d+-\d+\s*$/,'').trim().toUpperCase() : '';

// Sanitize a schedule object — ensures all required fields exist with defaults
// Prevents white screen crashes from old/incomplete schedule data
// Firebase drops empty arrays and null values, so we must restore them
const sanitizeSched = (s) => {
  if (!s || typeof s !== 'object') return null;
  const empty3 = () => [{name:'X'},{name:'X'},{name:'X'}];
  const emptyRec = () => [{r1:'X',r2:'X',time:''},{r1:'X',r2:'X',time:''},{r1:'X',r2:'X',time:''}];
  const emptyIpad = () => [{display:'X',split:null,time:''},{display:'X',split:null,time:''},{display:'X',split:null,time:''}];
  const emptyMC = () => [{mc1:'X',mc2:'X',med3au1:'X',time:''},{mc1:'X',mc2:'X',med3au1:'X',time:''},{mc1:'X',mc2:'X',med3au1:'X',time:''}];
  const emptyAU = () => [{au2:'X',au3:'X',au4:'X',au2Split:null,time:''},{au2:'X',au3:'X',au4:'X',au2Split:null,time:''},{au2:'X',au3:'X',au4:'X',au2Split:null,time:''}];
  const emptyVault = () => [{au:'RPH',med:'RPH',time:''},{au:'RPH',med:'RPH',time:''},{au:'RPH',med:'RPH',time:''}];
  
  // Deep-fix arrays: ensure each item has all required fields
  const fixArr = (arr, defaults) => {
    if (!arr || !Array.isArray(arr)) return defaults();
    return arr.map((item, i) => {
      const def = defaults()[i] || defaults()[0];
      if (!item || typeof item !== 'object') return def;
      return { ...def, ...item };
    });
  };
  
  return {
    ...s,
    lod: fixArr(s.lod, empty3),
    reception: fixArr(s.reception, emptyRec),
    ipad: fixArr(s.ipad, emptyIpad),
    medCheckout: fixArr(s.medCheckout, emptyMC),
    auCheckout: fixArr(s.auCheckout, emptyAU),
    vault: fixArr(s.vault, emptyVault),
    cleaning: s.cleaning && Array.isArray(s.cleaning) ? s.cleaning : [{task:'',name:'X'},{task:'',name:'X'},{task:'',name:'X'},{task:'',name:'X'},{task:'',name:'X'}],
    lunches: s.lunches && Array.isArray(s.lunches) ? s.lunches : [],
    breaks: s.breaks && Array.isArray(s.breaks) ? s.breaks : [],
    deposits: s.deposits && Array.isArray(s.deposits) ? s.deposits : [{time:'9:00 AM - 12:00 PM',person:''}],
    downtime: s.downtime || {'2PM-4PM DOWNTIME': null, '6PM-7PM CLOSING': null},
    stats: s.stats || {vB1:0,vB2:0,vB3:0,rB1:0,rB2:0,rB3:0,rgB1:0,rgB2:0,rgB3:0},
    fullTitle: s.fullTitle || (s.dayTitle||'') + ' ' + (s.dateStr||''),
    weekNum: s.weekNum || 1,
    dayNum: s.dayNum || 1,
    isSunday: s.isSunday || false,
    date: s.date || new Date().toISOString(),
    dateStr: s.dateStr || '',
  };
};

// ============== SCHEDULING ENGINE ==============
const Engine = {
  parse(seg) {
    if (!seg) return { s: -1, e: -1 };
    // Normalize: replace em/en dashes with hyphen, trim
    const s2 = seg.replace(/[–—]/g, '-').trim();
    if (!s2.includes('-')) return { s: -1, e: -1 };
    const pts = s2.split('-'), startStr = pts[0].trim(), endStr = pts[pts.length-1].trim();
    // Support "AM", "PM", "a", "p", "am", "pm"
    const sAM = /a\.?m?\.?$/i.test(startStr), sPM = /p\.?m?\.?$/i.test(startStr);
    const eAM = /a\.?m?\.?$/i.test(endStr), ePM = /p\.?m?\.?$/i.test(endStr);
    const sp = startStr.replace(/[ap]\.?m?\.?/gi,'').trim().split(':');
    const ep = endStr.replace(/[ap]\.?m?\.?/gi,'').trim().split(':');
    let s = (parseFloat(sp[0])||0) + (parseFloat(sp[1])||0)/60;
    let e = (parseFloat(ep[0])||0) + (parseFloat(ep[1])||0)/60;
    if (sPM && s < 12) s += 12; if (sAM && s === 12) s = 0;
    if (ePM && e < 12) e += 12; if (eAM && e === 12) e = 0;
    if (ePM && !sAM && !sPM && s < 12) s += 12;
    return { s, e };
  },
  onPTO(emp, date) {
    const pto = (emp.ptoText||'').trim();
    if (!pto) return false;
    if (['✓','TRUE','X','x'].includes(pto)) return true;
    const year = date.getFullYear();
    const parseMD = (s) => {
      const parts = s.trim().split('/');
      if (parts.length < 2) return null;
      const m = parseInt(parts[0]) - 1, d = parseInt(parts[1]);
      const y = parts[2] ? parseInt(parts[2]) : year;
      if (isNaN(m) || isNaN(d)) return null;
      return new Date(y, m, d, 12, 0, 0); // noon to avoid TZ issues
    };
    for (let rng of pto.split(',')) {
      rng = rng.trim();
      if (rng.includes('-')) {
        const [a,b] = rng.split('-');
        const sd = parseMD(a), ed = parseMD(b);
        if (sd && ed) {
          const d0 = new Date(date.getFullYear(), date.getMonth(), date.getDate(), 12);
          if (d0 >= sd && d0 <= ed) return true;
        }
      } else {
        const sd = parseMD(rng);
        if (sd && sd.toDateString() === date.toDateString()) return true;
      }
    }
    return false;
  },
  sched(emp, wk, dy) { return wk === 1 ? emp.week1?.[dy]||'' : emp.week2?.[dy]||''; },
  avail(emp, wk, dy, blk, date, sun) {
    if (this.onPTO(emp, date)) return false;
    const sc = this.sched(emp, wk, dy);
    if (!sc || sc.toUpperCase() === 'OFF') return false;
    let bS, bE;
    if (sun) { bS = blk===1?10:blk===2?12:15; bE = blk===1?12:blk===2?15:18.25; }
    else { bS = blk===1?9:blk===2?12:16; bE = blk===1?12:blk===2?16.25:20.25; }
    const { s, e } = this.parse(sc);
    return s >= 0 && s <= bS && e >= bE;
  },
  availH(emp, wk, dy, sH, eH, date) {
    if (this.onPTO(emp, date)) return false;
    const sc = this.sched(emp, wk, dy);
    if (!sc || sc.toUpperCase() === 'OFF') return false;
    const { s, e } = this.parse(sc);
    return s >= 0 && s <= sH && e >= eH;
  },
  startTime(emp, wk, dy) { const { s } = this.parse(this.sched(emp, wk, dy)); return s >= 0 ? s : 99; },
  endTime(emp, wk, dy) { const { e } = this.parse(this.sched(emp, wk, dy)); return e >= 0 ? e : 0; },
  vaultOnly: e => e.vault && !e.reception && !e.lod && !e.ipad && !e.registers,
  recOnly: e => e.reception && !e.lod && !e.ipad && !e.registers,
  ipadOnly: e => e.ipad && !e.reception && !e.lod && !e.registers,
  regOnly: e => e.registers && !e.reception && !e.lod && !e.ipad,
  isEarly(emp, wk, dy) { const s = this.startTime(emp, wk, dy), e = this.endTime(emp, wk, dy); return s >= 8 && s <= 9 && e >= 16 && e <= 16.5; },
  isLate(emp, wk, dy) { const s = this.startTime(emp, wk, dy), e = this.endTime(emp, wk, dy); return s >= 12 && s <= 12.25 && e >= 20; },
  isEvening(emp, wk, dy) { const s = this.startTime(emp, wk, dy), e = this.endTime(emp, wk, dy); return s >= 16 && s <= 16.25 && e >= 20; },
  arrivesEarly(emp, wk, dy, date, sun) {
    if (this.onPTO(emp, date)) return false;
    const sc = this.sched(emp, wk, dy);
    if (!sc || sc.toUpperCase() === 'OFF') return false;
    const { s } = this.parse(sc);
    return s >= 0 && s <= (sun ? 9.75 : 8.75);
  },
  findRole(emps, wk, dy, blk, role, used, date, sun, exLOD) {
    const check = (e, single) => {
      if (this.onPTO(e, date) || this.vaultOnly(e)) return false;
      if (exLOD && e.lod) return false;
      let match = false, sMatch = false;
      if (role === 'REC') { match = e.reception; sMatch = this.recOnly(e); }
      else if (role === 'IPAD') { match = e.ipad; sMatch = this.ipadOnly(e); }
      else if (role === 'REG') { match = e.registers; sMatch = this.regOnly(e); }
      else if (role === 'LOD') { match = e.lod; sMatch = true; }
      return single ? (match && sMatch) : match;
    };
    for (const e of emps) if (check(e, true) && this.avail(e, wk, dy, blk, date, sun) && !used.includes(e.name)) return e.name;
    for (const e of emps) if (check(e, false) && this.avail(e, wk, dy, blk, date, sun) && !used.includes(e.name)) return e.name;
    return 'X';
  },
  findRoleRotate(emps, wk, dy, blk, role, used, avoid, date, sun) {
    const check = (e, single) => {
      if (this.onPTO(e, date) || this.vaultOnly(e) || avoid.includes(e.name)) return false;
      let match = false, sMatch = false;
      if (role === 'REC') { match = e.reception; sMatch = this.recOnly(e); }
      else if (role === 'REG') { match = e.registers; sMatch = this.regOnly(e); }
      return single ? (match && sMatch) : match;
    };
    for (const e of emps) if (check(e, true) && this.avail(e, wk, dy, blk, date, sun) && !used.includes(e.name)) return e.name;
    for (const e of emps) if (check(e, false) && this.avail(e, wk, dy, blk, date, sun) && !used.includes(e.name)) return e.name;
    return this.findRole(emps, wk, dy, blk, role, used, date, sun, false);
  },
  findIPad(emps, wk, dy, sH, eH, used, date) {
    for (const e of emps) if (!this.onPTO(e, date) && !this.vaultOnly(e) && e.ipad && this.ipadOnly(e) && this.availH(e, wk, dy, sH, eH, date) && !used.includes(e.name)) return e.name;
    for (const e of emps) if (!this.onPTO(e, date) && !this.vaultOnly(e) && e.ipad && this.availH(e, wk, dy, sH, eH, date) && !used.includes(e.name)) return e.name;
    return 'X';
  },
  findIPadRotate(emps, wk, dy, sH, eH, used, avoid, date) {
    for (const e of emps) if (!this.onPTO(e, date) && !this.vaultOnly(e) && !avoid.includes(e.name) && e.ipad && this.ipadOnly(e) && this.availH(e, wk, dy, sH, eH, date) && !used.includes(e.name)) return e.name;
    for (const e of emps) if (!this.onPTO(e, date) && !this.vaultOnly(e) && !avoid.includes(e.name) && e.ipad && this.availH(e, wk, dy, sH, eH, date) && !used.includes(e.name)) return e.name;
    return this.findIPad(emps, wk, dy, sH, eH, used, date);
  },
  findVault(emps, wk, dy, blk, used, date, sun) {
    for (const e of emps) if (!this.onPTO(e, date) && e.vault && this.vaultOnly(e) && this.avail(e, wk, dy, blk, date, sun) && !used.includes(e.name)) return e.name;
    for (const e of emps) if (!this.onPTO(e, date) && e.vault && this.avail(e, wk, dy, blk, date, sun) && !used.includes(e.name)) return e.name;
    return 'X';
  },
  buildDay(emps, wk, dy, date, sun, rot) {
    const days = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
    const title = days[date.getDay()], dateStr = (date.getMonth()+1)+'/'+date.getDate();
    const t1S = sun?'10:00 AM':'9:00 AM', t1E = '12:00 PM', t2S = '12:00 PM', t2E = sun?'3:00 PM':'4:15 PM', t3S = sun?'3:00 PM':'4:00 PM', t3E = sun?'6:15 PM':'8:15 PM';
    const cleanTime = sun ? '9:30 (9:45) AM - 10:00 AM' : '8:30 (8:45) AM - 9:00 AM';
    
    // Cleaning assignments
    const early = emps.filter(e => this.arrivesEarly(e, wk, dy, date, sun) && !this.vaultOnly(e));
    const cleaning = CLEANING_AREAS.map((task, i) => ({ task, name: early.length ? early[(rot+i)%early.length].name : 'X' }));
    
    // Position assignments
    let u1=[], u2=[], u3=[];
    
    // === SUPERVISOR LOCK: Pre-assign supervisors to same position across all blocks ===
    const supLock = { rec1: [null,null,null], rec2: [null,null,null], vaultAU: [null,null,null], vaultMed: [null,null,null], reg: {} };
    // Find supervisors working today (check ANY block, not just block 1)
    const supervisors = emps.filter(e => e.supervisor && !this.onPTO(e, date) && 
      (this.avail(e, wk, dy, 1, date, sun) || this.avail(e, wk, dy, 2, date, sun) || this.avail(e, wk, dy, 3, date, sun)));
    
    supervisors.forEach(sup => {
      // Determine which blocks this supervisor covers
      const supBlocks = [0,1,2].filter(b => this.avail(sup, wk, dy, b+1, date, sun));
      if (supBlocks.length === 0) return;
      
      // Determine primary role priority: vault > reception > registers
      if (sup.vault) {
        if (!supLock.vaultMed[supBlocks[0]]) {
          supBlocks.forEach(b => supLock.vaultMed[b] = sup.name);
        } else if (!supLock.vaultAU[supBlocks[0]]) {
          supBlocks.forEach(b => supLock.vaultAU[b] = sup.name);
        }
      } else if (sup.reception) {
        if (!supLock.rec1[supBlocks[0]]) {
          supBlocks.forEach(b => supLock.rec1[b] = sup.name);
        } else if (!supLock.rec2[supBlocks[0]]) {
          supBlocks.forEach(b => supLock.rec2[b] = sup.name);
        }
      } else if (sup.registers) {
        const regSlots = ['med3au1','au2','au3','au4','mc2','mc1'];
        const usedSlots = Object.keys(supLock.reg);
        const slot = regSlots.find(s => !usedSlots.includes(s));
        if (slot) {
          supLock.reg[slot] = [null,null,null];
          supBlocks.forEach(b => supLock.reg[slot][b] = sup.name);
        }
      }
      // Add supervisor to ALL block used lists so normal fill skips them entirely
      u1.push(sup.name); u2.push(sup.name); u3.push(sup.name);
    });
    
    const lod1 = this.findRole(emps, wk, dy, 1, 'LOD', u1, date, sun, false); u1.push(lod1);
    const lod2 = this.findRole(emps, wk, dy, 2, 'LOD', u2, date, sun, false); u2.push(lod2);
    const lod3 = this.findRole(emps, wk, dy, 3, 'LOD', u3, date, sun, false); u3.push(lod3);
    
    // Reception — use supervisor overrides if set
    let r1 = supLock.rec1[0] || this.findRole(emps, wk, dy, 1, 'REC', [...u1], date, sun, true); u1.push(r1);
    let r2 = supLock.rec2[0] || this.findRole(emps, wk, dy, 1, 'REC', [...u1], date, sun, true); u1.push(r2);
    const r1b2 = supLock.rec1[1] || this.findRoleRotate(emps, wk, dy, 2, 'REC', [...u2], [r1,lod2], date, sun); u2.push(r1b2);
    const r2b2 = supLock.rec2[1] || this.findRoleRotate(emps, wk, dy, 2, 'REC', [...u2], [r2,lod2], date, sun); u2.push(r2b2);
    const r1b3 = supLock.rec1[2] || this.findRoleRotate(emps, wk, dy, 3, 'REC', [...u3], [r1,r1b2,lod3], date, sun); u3.push(r1b3);
    const r2b3 = supLock.rec2[2] || this.findRoleRotate(emps, wk, dy, 3, 'REC', [...u3], [r2,r2b2,lod3], date, sun); u3.push(r2b3);
    
    // Vault — use supervisor overrides if set
    let vU1=[...u1,lod1]; const vAU1 = supLock.vaultAU[0] || this.findVault(emps, wk, dy, 1, vU1, date, sun); vU1.push(vAU1); const vMed1 = supLock.vaultMed[0] || this.findVault(emps, wk, dy, 1, vU1, date, sun);
    let vU2=[...u2,lod2]; const vAU2 = supLock.vaultAU[1] || this.findVault(emps, wk, dy, 2, vU2, date, sun); vU2.push(vAU2); const vMed2 = supLock.vaultMed[1] || this.findVault(emps, wk, dy, 2, vU2, date, sun);
    let vU3=[...u3,lod3]; const vAU3 = supLock.vaultAU[2] || this.findVault(emps, wk, dy, 3, vU3, date, sun); vU3.push(vAU3); const vMed3 = supLock.vaultMed[2] || this.findVault(emps, wk, dy, 3, vU3, date, sun);
    
    // Registers AFTER vault — exclude vault people from register pool
    const vaultPeople = [vAU1,vMed1,vAU2,vMed2,vAU3,vMed3].filter(n=>n&&n!=='X'&&n!=='RPH');
    let uR1=[r1,r2,lod1,...vaultPeople], uR2=[r1b2,r2b2,lod2,...vaultPeople], uR3=[r1b3,r2b3,lod3,...vaultPeople];
    // Add supervisors to register used lists too
    supervisors.forEach(s => { uR1.push(s.name); uR2.push(s.name); uR3.push(s.name); });
    
    const supReg = supLock.reg;
    const rg3b1 = supReg.med3au1?.[0] || (lod1!=='X' ? lod1 : this.findRole(emps, wk, dy, 1, 'REG', uR1, date, sun, false)); uR1.push(rg3b1);
    const a1 = supReg.au2?.[0] || this.findRole(emps, wk, dy, 1, 'REG', uR1, date, sun, false); uR1.push(a1);
    const a2 = supReg.au3?.[0] || this.findRole(emps, wk, dy, 1, 'REG', uR1, date, sun, false); uR1.push(a2);
    const a3 = supReg.au4?.[0] || this.findRole(emps, wk, dy, 1, 'REG', uR1, date, sun, false); uR1.push(a3);
    const rg2 = supReg.mc2?.[0] || this.findRole(emps, wk, dy, 1, 'REG', uR1, date, sun, false); uR1.push(rg2);
    const rg1 = supReg.mc1?.[0] || this.findRole(emps, wk, dy, 1, 'REG', uR1, date, sun, false);
    
    const rg3b2 = supReg.med3au1?.[1] || (lod2!=='X' ? lod2 : this.findRoleRotate(emps, wk, dy, 2, 'REG', uR2, [rg3b1], date, sun)); uR2.push(rg3b2);
    let a1b2 = supReg.au2?.[1] || this.findRoleRotate(emps, wk, dy, 2, 'REG', uR2, [a1], date, sun); uR2.push(a1b2);
    const a2b2 = supReg.au3?.[1] || this.findRoleRotate(emps, wk, dy, 2, 'REG', uR2, [a2], date, sun); uR2.push(a2b2);
    const a3b2 = supReg.au4?.[1] || this.findRoleRotate(emps, wk, dy, 2, 'REG', uR2, [a3], date, sun); uR2.push(a3b2);
    const rg2b2 = supReg.mc2?.[1] || this.findRoleRotate(emps, wk, dy, 2, 'REG', uR2, [rg2], date, sun); uR2.push(rg2b2);
    const rg1b2 = supReg.mc1?.[1] || this.findRoleRotate(emps, wk, dy, 2, 'REG', uR2, [rg1], date, sun);
    
    const rg3b3 = supReg.med3au1?.[2] || (lod3!=='X' ? lod3 : this.findRoleRotate(emps, wk, dy, 3, 'REG', uR3, [rg3b1,rg3b2], date, sun)); uR3.push(rg3b3);
    let a1b3 = supReg.au2?.[2] || this.findRoleRotate(emps, wk, dy, 3, 'REG', uR3, [a1,a1b2], date, sun); uR3.push(a1b3);
    const a2b3 = supReg.au3?.[2] || this.findRoleRotate(emps, wk, dy, 3, 'REG', uR3, [a2,a2b2], date, sun); uR3.push(a2b3);
    const a3b3 = supReg.au4?.[2] || this.findRoleRotate(emps, wk, dy, 3, 'REG', uR3, [a3,a3b2], date, sun); uR3.push(a3b3);
    const rg2b3 = supReg.mc2?.[2] || this.findRoleRotate(emps, wk, dy, 3, 'REG', uR3, [rg2,rg2b2], date, sun); uR3.push(rg2b3);
    const rg1b3 = supReg.mc1?.[2] || this.findRoleRotate(emps, wk, dy, 3, 'REG', uR3, [rg1,rg1b2], date, sun);
    
    // iPad AFTER registers — gets whoever is left
    let ip1, ip2a, ip2b, ip3a, ip3b, ipD1, ipD2, ipD3, ipT1, ipT2, ipT3;
    let ipadSplit2 = null, ipadSplit3 = null;
    let a1b2Split = null, a1b3Split = null;
    const allUsed1 = [...u1, ...uR1, rg1, ...vaultPeople];
    const allUsed2 = [...u2, ...uR2, rg1b2, ...vaultPeople];
    const allUsed3 = [...u3, ...uR3, rg1b3, ...vaultPeople];
    
    if (sun) {
      ip1 = this.findIPad(emps, wk, dy, 10, 12, allUsed1, date);
      ip2a = this.findIPadRotate(emps, wk, dy, 12, 15, allUsed2, [ip1], date);
      ip3a = this.findIPadRotate(emps, wk, dy, 15, 18.25, allUsed3, [ip1,ip2a], date);
      ipD1=ip1; ipD2=ip2a; ipD3=ip3a;
      ipT1='10:00 AM - 12:00 PM'; ipT2='12:00 PM - 3:00 PM'; ipT3='3:00 PM - 6:15 PM';
    } else {
      ip1 = this.findIPad(emps, wk, dy, 9, 12, allUsed1, date);
      ip2a = this.findIPadRotate(emps, wk, dy, 12, 14, allUsed2, [ip1], date);
      ip2b = this.findIPadRotate(emps, wk, dy, 14, 16, allUsed2, [ip1,ip2a], date);
      ip3a = this.findIPadRotate(emps, wk, dy, 16, 18, allUsed3, [ip1,ip2a,ip2b], date);
      ip3b = this.findIPadRotate(emps, wk, dy, 18, 20, allUsed3, [ip1,ip2a,ip2b,ip3a], date);
      ipD1=ip1; ipT1='9:00 AM - 12:00 PM';
      
      if (ip2a !== ip2b && ip2a !== 'X' && ip2b !== 'X') {
        ipD2 = ip2a+' 12-2 / '+ip2b+' 2-4';
        ipadSplit2 = { first: ip2a, second: ip2b };
      } else if (ip2a === ip2b && ip2a !== 'X') { ipD2 = ip2a;
      } else if (ip2a !== 'X' && ip2b === 'X') {
        const emp2a = emps.find(e => e.name === ip2a);
        if (emp2a && this.availH(emp2a, wk, dy, 12, 16, date)) { ipD2 = ip2a; } else { ipD2 = ip2a+' 12-2'; }
      } else if (ip2b !== 'X' && ip2a === 'X') {
        const emp2b = emps.find(e => e.name === ip2b);
        if (emp2b && this.availH(emp2b, wk, dy, 12, 16, date)) { ipD2 = ip2b; } else { ipD2 = ip2b+' 2-4'; }
      } else { ipD2 = 'X'; }
      ipT2='12:00 PM - 4:00 PM';
      
      if (ip3a !== ip3b && ip3a !== 'X' && ip3b !== 'X') {
        ipD3 = ip3a+' 4-6 / '+ip3b+' 6-8';
        ipadSplit3 = { first: ip3a, second: ip3b };
      } else if (ip3a === ip3b && ip3a !== 'X') { ipD3 = ip3a;
      } else if (ip3a !== 'X' && ip3b === 'X') {
        const emp3a = emps.find(e => e.name === ip3a);
        if (emp3a && this.availH(emp3a, wk, dy, 16, 20, date)) { ipD3 = ip3a; } else { ipD3 = ip3a+' 4-6'; }
      } else if (ip3b !== 'X' && ip3a === 'X') {
        const emp3b = emps.find(e => e.name === ip3b);
        if (emp3b && this.availH(emp3b, wk, dy, 16, 20, date)) { ipD3 = ip3b; } else { ipD3 = ip3b+' 6-8'; }
      } else { ipD3 = 'X'; }
      ipT3='4:00 PM - 8:00 PM';
    }
    
    // iPad split → AU2 override (swap iPad halves onto AU2)
    if (ipadSplit2) {
      a1b2 = ipadSplit2.second+' 12-2 / '+ipadSplit2.first+' 2-4';
      a1b2Split = { first: ipadSplit2.second, second: ipadSplit2.first };
    }
    if (ipadSplit3) {
      a1b3 = ipadSplit3.second+' 4-6 / '+ipadSplit3.first+' 6-8';
      a1b3Split = { first: ipadSplit3.second, second: ipadSplit3.first };
    }
    
    // Lunches — early shift employees start at 12 PM, late shift (12-8:15) start at 2:30 PM
    const earlyL = emps.filter(e => !this.vaultOnly(e) && !this.onPTO(e, date) && this.isEarly(e, wk, dy));
    const lateL = emps.filter(e => !this.vaultOnly(e) && !this.onPTO(e, date) && this.isLate(e, wk, dy));
    const lunches = []; let lt = 12;
    for (const e of earlyL) if (lt <= 14) { lunches.push({ name: e.name, time: formatTime(lt), cover: '' }); lt += 0.5; }
    // Late shift lunches start at 2:30 PM (14.5) at the earliest
    let lateLt = Math.max(lt, 14.5);
    for (const e of lateL) if (lateLt <= 16) { lunches.push({ name: e.name, time: formatTime(lateLt), cover: '' }); lateLt += 0.5; }
    
    // 15-min breaks — exclude employees with noBreak flag
    const brkEmps = emps.filter(e => !this.vaultOnly(e) && !this.onPTO(e, date) && !e.noBreak && this.isEvening(e, wk, dy));
    const breaks = []; const brkSlots = [17, 17.25, 17.5, 17.75];
    brkEmps.forEach((e, i) => { if (i < 4) breaks.push({ name: e.name, time: formatTime(brkSlots[i]), cover: '' }); });
    while (breaks.length < 4) breaks.push({ name: '', time: formatTime(brkSlots[breaks.length]), cover: '' });
    
    // cf counts people: X=0, regular=1, split=2
    const cf = n => !n || n === 'X' ? 0 : n.includes('/') ? 2 : 1;
    const stats = { vB1: cf(vAU1)+cf(vMed1), vB2: cf(vAU2)+cf(vMed2), vB3: cf(vAU3)+cf(vMed3), rB1: cf(r1)+cf(r2), rB2: cf(r1b2)+cf(r2b2), rB3: cf(r1b3)+cf(r2b3), rgB1: cf(rg3b1)+cf(a1)+cf(a2)+cf(a3)+cf(rg1)+cf(rg2), rgB2: cf(rg3b2)+cf(a1b2)+cf(a2b2)+cf(a3b2)+cf(rg1b2)+cf(rg2b2), rgB3: cf(rg3b3)+cf(a1b3)+cf(a2b3)+cf(a3b3)+cf(rg1b3)+cf(rg2b3) };
    
    // Adjust vault block times for supervisors whose shifts don't match standard block times
    const fmtH = (h) => { const hr = Math.floor(h); const mn = Math.round((h - hr) * 60); const ampm = hr >= 12 ? 'PM' : 'AM'; const hr12 = hr > 12 ? hr - 12 : hr === 0 ? 12 : hr; return hr12 + ':' + String(mn).padStart(2,'0') + ' ' + ampm; };
    const adjustVaultTime = (person, defaultTime) => {
      if (!person || person === 'RPH' || person === 'X') return defaultTime;
      const emp = emps.find(e => e.name === person);
      if (!emp || !emp.supervisor) return defaultTime;
      const sc = wk === 1 ? emp.week1?.[dy]||'' : emp.week2?.[dy]||'';
      if (!sc) return defaultTime;
      const parsed = this.parse(sc);
      const endH = parsed?.e || 0;
      const parts = defaultTime.split(' - ');
      const defParsed = this.parse(parts[1]);
      const defEnd = defParsed?.s || defParsed?.e || 0;
      if (endH > 0 && endH !== defEnd) return parts[0] + ' - ' + fmtH(endH);
      return defaultTime;
    };
    const vT1 = t1S+' - '+t1E, vT2 = t2S+' - '+t2E, vT3 = t3S+' - '+t3E;
    const vT1F = adjustVaultTime(vMed1, vT1) !== vT1 ? adjustVaultTime(vMed1, vT1) : adjustVaultTime(vAU1, vT1);
    const vT2F = adjustVaultTime(vMed2, vT2) !== vT2 ? adjustVaultTime(vMed2, vT2) : adjustVaultTime(vAU2, vT2);
    const vT3F = adjustVaultTime(vMed3, vT3) !== vT3 ? adjustVaultTime(vMed3, vT3) : adjustVaultTime(vAU3, vT3);

    return {
      dayTitle: title, dateStr, fullTitle: title+' '+dateStr+' (Wk '+wk+')', cleanTime, cleaning,
      times: { t1S, t1E, t2S, t2E, t3S, t3E },
      lod: [{name:lod1,time:t1S+' - '+t1E},{name:lod2,time:t2S+' - '+t2E},{name:lod3,time:t3S+' - '+t3E}],
      reception: [{r1,r2,time:t1S+' - '+t1E},{r1:r1b2,r2:r2b2,time:t2S+' - '+t2E},{r1:r1b3,r2:r2b3,time:t3S+' - '+t3E}],
      ipad: [{display:ipD1,time:ipT1,split:null},{display:ipD2,time:ipT2,split:ipadSplit2},{display:ipD3,time:ipT3,split:ipadSplit3}],
      medCheckout: [{mc1:rg1,mc2:rg2,med3au1:rg3b1,time:t1S+' - '+t1E},{mc1:rg1b2,mc2:rg2b2,med3au1:rg3b2,time:t2S+' - '+t2E},{mc1:rg1b3,mc2:rg2b3,med3au1:rg3b3,time:t3S+' - '+t3E}],
      auCheckout: [
        {au2:a1,au3:a2,au4:a3,time:t1S+' - '+t1E,au2Split:null},
        {au2:a1b2,au3:a2b2,au4:a3b2,time:t2S+' - '+t2E,au2Split:a1b2Split},
        {au2:a1b3,au3:a2b3,au4:a3b3,time:t3S+' - '+t3E,au2Split:a1b3Split}
      ],
      vault: [{au:vAU1==='X'?'RPH':vAU1,med:vMed1==='X'?'RPH':vMed1,time:vT1F},{au:vAU2==='X'?'RPH':vAU2,med:vMed2==='X'?'RPH':vMed2,time:vT2F},{au:vAU3==='X'?'RPH':vAU3,med:vMed3==='X'?'RPH':vMed3,time:vT3F}],
      vaultOpen: sun ? '9:30 AM - 10:00 AM' : '8:00 AM - 9:00 AM',
      lunches, breaks, deposits: [{time:'9:00 AM - 12:00 PM', person:''}], 
      downtime: {'2PM-4PM DOWNTIME': null, '6PM-7PM CLOSING': null},
      stats, isSunday: sun, weekNum: wk, dayNum: dy, date: date.toISOString(), generatedAt: new Date().toISOString()
    };
  },
  genStandalone(emps, date, rot) { const d = new Date(date); d.setHours(12,0,0,0); const dow = d.getDay()===0?7:d.getDay(); return this.buildDay(emps, 1, dow, d, dow===7, rot||0); },
  genSingle(emps, date, w1, w2, rot) {
    const target = new Date(date); target.setHours(12,0,0,0); let wk=0;
    // Check if target falls within 7 days of w1 or w2 start
    for (let d=0; d<7; d++) { const c = new Date(w1+'T12:00:00'); c.setDate(c.getDate()+d); if (c.toDateString()===target.toDateString()) { wk=1; break; } }
    if (!wk) for (let d=0; d<7; d++) { const c = new Date(w2+'T12:00:00'); c.setDate(c.getDate()+d); if (c.toDateString()===target.toDateString()) { wk=2; break; } }
    if (!wk) return null;
    // Use actual day of week: 1=Mon, 2=Tue, ..., 7=Sun
    const dow = target.getDay()===0 ? 7 : target.getDay();
    return this.buildDay(emps, wk, dow, target, dow===7, rot||0);
  },
  genAll(emps, w1, w2) {
    const out = []; let rot = 0;
    for (let w=1; w<=2; w++) {
      const start = new Date((w===1?w1:w2)+'T12:00:00');
      for (let d=0; d<7; d++) {
        const dd = new Date(start); dd.setDate(dd.getDate()+d);
        const dow = dd.getDay()===0 ? 7 : dd.getDay(); // 1=Mon...7=Sun
        out.push(this.buildDay(emps, w, dow, dd, dow===7, rot++));
      }
    }
    return out;
  }
};

// ============== UI COMPONENTS ==============
const CleaningModal = ({ task, onClose, onSubmit, log }) => {
  const [checked, setChecked] = useState(log?.tasks || {});
  const [initials, setInitials] = useState(log?.initials || '');
  const tasks = CLEANING_TASKS[task] || DOWNTIME_TASKS[task] || [];
  const view = !!log, allDone = tasks.every((_, i) => checked[i]);
  const canSubmit = allDone && initials.trim().length > 0;
  const submit = () => {
    if (!initials.trim()) return alert('Enter initials');
    if (!allDone) return alert('Complete all tasks');
    onSubmit({ task, initials: initials.trim().toUpperCase(), tasks: checked, completedAt: new Date().toISOString() });
    onClose();
  };
  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50">
      <div className="bg-white rounded-xl p-6 w-full max-w-lg card-shadow fade-in max-h-[80vh] overflow-y-auto">
        <h2 className="text-xl font-bold mb-4">{task} {view && <span className="text-sm font-normal text-gray-500">- by {log.initials}</span>}</h2>
        {!view && <button onClick={() => { const c={}; tasks.forEach((_,i)=>c[i]=true); setChecked(c); }} className="mb-4 px-4 py-2 bg-emerald-100 text-emerald-700 rounded-lg text-sm font-medium">✓ Select All</button>}
        <div className="space-y-2 mb-4">{tasks.map((t,i) => <label key={i} className={'flex items-start gap-3 p-2 rounded hover:bg-gray-50'+(t.startsWith('**')?' bg-amber-50':'')}><input type="checkbox" checked={checked[i]||false} onChange={e=>!view&&setChecked({...checked,[i]:e.target.checked})} disabled={view} className="mt-1 w-5 h-5"/><span className={'text-sm'+(t.startsWith('**')?' font-bold text-amber-700':'')}>{t}</span></label>)}</div>
        {!view && <div className="mb-4"><label className="block text-sm font-medium mb-1">Initials</label><input value={initials} onChange={e=>setInitials(e.target.value.slice(0,4))} className="w-full px-4 py-2 border rounded-lg uppercase" maxLength={4}/></div>}
        <div className="flex gap-2">
          {!view && (canSubmit 
            ? <button onClick={submit} className="flex-1 px-4 py-2 bg-emerald-500 text-black rounded-lg font-bold flex items-center justify-center gap-2 hover:bg-emerald-600 transition-colors"><span className="text-xl">✓</span> Complete</button>
            : <button disabled className="flex-1 px-4 py-2 bg-gray-300 text-gray-500 rounded-lg font-bold cursor-not-allowed">Submit (check all tasks + initials)</button>
          )}
          <button onClick={onClose} className="px-4 py-2 bg-gray-200 rounded-lg">{view?'Close':'Cancel'}</button>
        </div>
      </div>
    </div>
  );
};

const SplitCell = ({ value, shapes, editable, onUpdate, splitData, hl, allShapes }) => {
  const [editing, setEditing] = useState(false);
  const [text, setText] = useState(value||'');
  const save = () => { onUpdate(text); setEditing(false); };
  const isSplit = value && value.includes(' / ');
  
  if (editing) {
    return (
      <div className="schedule-cell bg-white p-0">
        <input value={text} onChange={e=>setText(e.target.value)} onBlur={save} 
          onKeyDown={e=>{if(e.key==='Enter')save();if(e.key==='Escape'){setText(value);setEditing(false);}}} 
          autoFocus className="w-full h-full px-2 py-1 text-xs font-bold text-center border-0 outline-none"/>
      </div>
    );
  }
  
  if (isSplit) {
    const parts = value.split(' / ');
    const first = parts[0] || '';
    const second = parts[1] || '';
    // Extract name (stripping trailing time) and time portion
    const firstName = extractName(first);
    const secondName = extractName(second);
    const firstTime = (first.match(/\d+-\d+\s*$/) || [''])[0].trim();
    const secondTime = (second.match(/\d+-\d+\s*$/) || [''])[0].trim();
    const sh1 = shapes?.[firstName];
    const sh2 = shapes?.[secondName];
    const hl1 = hl && hl.size > 0 && hl.has(firstName);
    const hl2 = hl && hl.size > 0 && hl.has(secondName);
    const anyHl = hl1 || hl2;
    const hlColor1 = hl1 && allShapes?.[firstName]?.color;
    const hlColor2 = hl2 && allShapes?.[secondName]?.color;
    
    return (
      <div onClick={()=>editable&&setEditing(true)} 
        className={'schedule-cell bg-white font-bold text-[11px] whitespace-nowrap overflow-visible '+(anyHl?'cell-highlight ':'')+(editable?'cursor-pointer hover:bg-gray-50':'')}
        style={{textAlign:'left', paddingLeft:'4px', ...(anyHl ? {'--hl-color': hlColor1 || hlColor2 || '#3B82F6'} : {})}}>

        <span className="text-gray-500 text-[9px] mx-0.5">{firstTime}</span>
        <span className="text-gray-400 mx-0.5">/</span>
        <span>{secondName}</span>
        <span className="text-gray-500 text-[9px] mx-0.5">{secondTime}</span>
        {editable && <span className="text-gray-400 text-[9px] ml-0.5">✏️</span>}
      </div>
    );
  }
  
  const firstName = value && value!=='X' ? extractName(value) : null;
  const sh = firstName && shapes?.[firstName];
  const isHl = hl && hl.size > 0 && firstName && hl.has(firstName);
  const hlColor = isHl && allShapes?.[firstName]?.color;
  const hlStyle = isHl ? { '--hl-color': hlColor || '#3B82F6' } : {};
  const base = 'schedule-cell font-bold text-xs flex items-center justify-center gap-1 '+(value==='X'||!value?'bg-gray-400':'bg-white')+(isHl?' cell-highlight':'');
  if (!editable) return <div className={base} style={hlStyle}>{(value||'X').toUpperCase()}</div>;
  return <div onClick={()=>setEditing(true)} className={base+' cursor-pointer hover:bg-gray-50'} style={hlStyle}>
    <span>{(value||'X').toUpperCase()}</span>
    <span className="text-gray-400 text-[10px] ml-1">✏️</span>
  </div>;
};

const HOLIDAYS = [
  { m:1, d:1, name:"New Year's Day", emoji:'🎆', colors:['#FFD700','#C0C0C0','#FFFFFF'], theme:'newyear' },
  { m:2, d:14, name:"Valentine's Day", emoji:'💝', colors:['#FF69B4','#FF1493','#FFB6C1'], theme:'valentine' },
  { m:3, d:17, name:"St. Patrick's Day", emoji:'☘️', colors:['#00A550','#009A44','#2E8B57'], theme:'stpatricks' },
  { m:4, d:20, name:"4/20", emoji:'🌿', colors:['#228B22','#32CD32','#90EE90'], theme:'420' },
  { m:7, d:4, name:"Independence Day", emoji:'🇺🇸', colors:['#FF0000','#FFFFFF','#0000FF'], theme:'july4' },
  { m:7, d:10, name:"7/10", emoji:'🍯', colors:['#FFD700','#FFA500','#228B22'], theme:'710' },
  { m:10, d:31, name:"Halloween", emoji:'🎃', colors:['#FF6600','#800080','#000000'], theme:'halloween' },
  { m:11, d:0, name:"Thanksgiving", emoji:'🦃', colors:['#D2691E','#FF8C00','#DAA520'], theme:'thanksgiving', dynamic:true },
  { m:11, d:11, name:"Veterans Day", emoji:'🎖️', colors:['#003366','#CC0000','#FFFFFF'], theme:'veterans' },
  { m:12, d:25, name:"Christmas", emoji:'🎄', colors:['#FF0000','#008000','#FFD700'], theme:'christmas' },
  { m:12, d:31, name:"New Year's Eve", emoji:'🥂', colors:['#FFD700','#C0C0C0','#4169E1'], theme:'newyear' },
];
const getThanksgiving = (year) => { let d = new Date(year, 10, 1), c = 0; while (c < 4) { if (d.getDay() === 4) c++; if (c < 4) d.setDate(d.getDate()+1); } return d.getDate(); };
const getLaborDay = (year) => { let d = new Date(year, 8, 1); while (d.getDay() !== 1) d.setDate(d.getDate()+1); return d.getDate(); };
const getEaster = (year) => { const a=year%19,b=Math.floor(year/100),c=year%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),month=Math.floor((h+l-7*m+114)/31),day=((h+l-7*m+114)%31)+1; return {m:month,d:day}; };
const getHoliday = () => {
  const now = new Date(), m = now.getMonth()+1, d = now.getDate(), yr = now.getFullYear();
  // Check dynamic holidays first
  if (m === 11) { const tg = getThanksgiving(yr); if (d >= tg - 3 && d <= tg) return HOLIDAYS.find(h => h.theme === 'thanksgiving'); }
  if (m === 9 && d === getLaborDay(yr)) return { name:"Labor Day", emoji:'💪', colors:['#003366','#CC0000','#FFFFFF'], theme:'laborday' };
  const easter = getEaster(yr);
  if (m === easter.m && d === easter.d) return { name:"Easter", emoji:'🐣', colors:['#FFB6C1','#E6E6FA','#98FB98'], theme:'easter' };
  // Check static holidays
  for (const h of HOLIDAYS) { if (!h.dynamic && h.m === m && h.d === d) return h; }
  // Extended ranges
  if (m === 12 && d >= 20 && d <= 26) return HOLIDAYS.find(h => h.theme === 'christmas');
  if (m === 10 && d >= 25) return HOLIDAYS.find(h => h.theme === 'halloween');
  return null;
};
const getBirthdaysToday = (emps) => {
  const now = new Date(), m = now.getMonth()+1, d = now.getDate();
  return emps.filter(e => { if (!e.birthday) return false; const p = e.birthday.replace(/\s/g,'').split('/'); return parseInt(p[0])===m && parseInt(p[1])===d; }).map(e => e.name);
};

const ScheduleDisplay = ({ sched: rawSched, emps, shapes, onUpdate, editable, onSign, showShapes, cleanLogs, highlightEmps }) => {
  const sched = sanitizeSched(rawSched);
  if (!sched) return null;
  if (!sched) return null;
  const sh = showShapes ? shapes : null;
  const hl = highlightEmps || new Set();
  const upd = (path, val) => {
    if (!onUpdate) return;
    const s = JSON.parse(JSON.stringify(sched)), pts = path.split('.');
    let o = s; for (let i=0; i<pts.length-1; i++) o = o[pts[i]];
    o[pts[pts.length-1]] = val;
    s.manuallyEdited = true; s.editedAt = new Date().toISOString();
    onUpdate(s);
  };
  
  // Update time across ALL sections for a given block index
  const updBlockTime = (blockIdx, newTime) => {
    if (!onUpdate) return;
    const s = JSON.parse(JSON.stringify(sched));
    if (s.lod[blockIdx]) s.lod[blockIdx].time = newTime;
    if (s.reception[blockIdx]) s.reception[blockIdx].time = newTime;
    if (s.ipad[blockIdx]) s.ipad[blockIdx].time = newTime;
    if (s.medCheckout[blockIdx]) s.medCheckout[blockIdx].time = newTime;
    if (s.auCheckout[blockIdx]) s.auCheckout[blockIdx].time = newTime;
    if (s.vault[blockIdx]) s.vault[blockIdx].time = newTime;
    s.manuallyEdited = true; s.editedAt = new Date().toISOString();
    onUpdate(s);
  };
  
  // Build conflict function for a specific block + category
  const makeConflictFn = (blockIdx, currentCat, currentPath) => (candidate) => {
    if (!candidate || candidate === 'X' || candidate === 'RPH') return null;
    const up = candidate.toUpperCase();
    // Check what categories this person is already in for this block
    const inCats = new Set();
    const chk = (val, cat, path) => {
      if (path === currentPath) return; // Skip current cell
      if (!val || val === 'X' || val === 'RPH') return;
      if (val.includes(' / ')) {
        val.split(' / ').forEach(p => {
          if (extractName(p) === up) inCats.add(cat);
        });
      } else if (extractName(val) === up) {
        inCats.add(cat);
      }
    };
    chk(sched.lod[blockIdx]?.name, 'LOD', 'lod.'+blockIdx+'.name');
    chk(sched.reception[blockIdx]?.r1, 'reception', 'reception.'+blockIdx+'.r1');
    chk(sched.reception[blockIdx]?.r2, 'reception', 'reception.'+blockIdx+'.r2');
    chk(sched.ipad[blockIdx]?.display, 'ipad', 'ipad.'+blockIdx+'.display');
    chk(sched.medCheckout[blockIdx]?.mc1, 'register', 'medCheckout.'+blockIdx+'.mc1');
    chk(sched.medCheckout[blockIdx]?.mc2, 'register', 'medCheckout.'+blockIdx+'.mc2');
    chk(sched.medCheckout[blockIdx]?.med3au1, 'register', 'medCheckout.'+blockIdx+'.med3au1');
    chk(sched.auCheckout[blockIdx]?.au2, 'register', 'auCheckout.'+blockIdx+'.au2');
    chk(sched.auCheckout[blockIdx]?.au3, 'register', 'auCheckout.'+blockIdx+'.au3');
    chk(sched.auCheckout[blockIdx]?.au4, 'register', 'auCheckout.'+blockIdx+'.au4');
    chk(sched.vault[blockIdx]?.au, 'vault', 'vault.'+blockIdx+'.au');
    chk(sched.vault[blockIdx]?.med, 'vault', 'vault.'+blockIdx+'.med');
    
    if (inCats.size === 0) return null;
    // Check for duplicate: same person already somewhere in this block
    // (Even if same category — e.g. already on AU3, trying to put on MED3)
    const vaultConflict = (currentCat === 'vault' && (inCats.has('register') || inCats.has('reception') || inCats.has('ipad'))) ||
      (inCats.has('vault') && (currentCat === 'register' || currentCat === 'reception' || currentCat === 'ipad'));
    const wouldConflict = vaultConflict ||
      (currentCat === 'reception' && inCats.has('register')) ||
      (currentCat === 'register' && inCats.has('reception')) ||
      (currentCat === 'ipad' && inCats.has('reception')) ||
      (currentCat === 'reception' && inCats.has('ipad')) ||
      (currentCat === 'ipad' && inCats.has('register')) ||
      (currentCat === 'register' && inCats.has('ipad'));
    // Also flag if person is already on SAME category (duplicate in block)
    const sameCatDupe = inCats.has(currentCat) && currentCat !== 'lod';
    if (wouldConflict || sameCatDupe) return 'Already on ' + [...inCats].join(' + ') + ' this block';
    return null;
  };
  
  const todaysLogs = cleanLogs?.[todayKey()] || [];
  const isTaskComplete = (task) => {
    const log = todaysLogs.find(l => l.task === task);
    if (!log) return false;
    const taskList = CLEANING_TASKS[task] || [];
    return taskList.every((_, i) => log.tasks?.[i]);
  };
  
  const CleanRow = ({ c, i }) => {
    const [open, setOpen] = useState(false);
    const complete = isTaskComplete(c.task);
    const cHl = hl.size > 0 && c.name && c.name!=='X' && hl.has(c.name.toUpperCase());
    const cHlColor = cHl && shapes?.[c.name.toUpperCase()]?.color;
    
    return (
      <div className={'schedule-cell text-red-600 font-bold text-xs py-1 flex items-center justify-between relative'+(cHl?' cell-highlight':'')} style={cHl?{'--hl-color':cHlColor||'#3B82F6'}:{}}>

                {editable ? <div className="schedule-cell text-xs py-0.5"><select value={b.time} onChange={e=>upd('breaks.'+i+'.time',e.target.value)} className="w-full text-xs bg-transparent border-0 cursor-pointer p-0 text-center">{BREAK_TIME_OPTIONS.map((t,j)=><option key={j} value={t}>{t}</option>)}</select></div> : <div className="schedule-cell text-xs py-0.5">{b.time}</div>}
                <NameCell name={b.cover||''} shapes={null} editable={editable} emps={emps} onUpdate={v=>upd('breaks.'+i+'.cover',v)} hl={hl} allShapes={shapes}/>
              </React.Fragment>; })}
            </div>
          </div>
          <div>
            <Header color="black">DEPOSITS</Header>
            <div className="grid grid-cols-2">
              <div className="schedule-cell bg-blue-100 font-bold text-xs py-0.5">TIME</div>
              <div className="schedule-cell bg-blue-100 font-bold text-xs py-0.5">PERSON</div>
              {(sched.deposits||[{time:'9:00 AM - 12:00 PM',person:''}]).map((dep,i) => <React.Fragment key={i}>
                <div className="schedule-cell text-xs py-0.5">{editable ? <input type="text" value={dep.time} onChange={e=>{const d=JSON.parse(JSON.stringify(sched));if(!d.deposits)d.deposits=[{time:'9:00 AM - 12:00 PM',person:''}];d.deposits[i].time=e.target.value;upd('deposits',d.deposits);}} className="w-full bg-transparent text-xs border-0 p-0 text-center" placeholder="Time"/> : dep.time}</div>
                <div className="schedule-cell text-xs py-0.5">{editable ? <select value={dep.person||''} onChange={e=>{const d=JSON.parse(JSON.stringify(sched));if(!d.deposits)d.deposits=[{time:'9:00 AM - 12:00 PM',person:''}];d.deposits[i].person=e.target.value;upd('deposits',d.deposits);}} className="w-full bg-transparent text-xs border-0 p-0 text-center font-bold cursor-pointer"><option value=""></option>{emps.map(emp=><option key={emp.name} value={emp.name}>{emp.name}</option>)}</select> : <span className="font-bold">{dep.person}</span>}</div>
              </React.Fragment>)}
            </div>
          </div>

      </div>
      
      {/* Downtime Cleaning Blocks */}
      <div className="mt-3 grid grid-cols-2 gap-3 no-print">
        {DOWNTIME_AREAS.map(area => {
          const areaData = sched.downtime?.[area] || {};
          const tasks = DOWNTIME_TASKS[area] || [];
          const allDone = tasks.every((t, i) => t.startsWith('**') || areaData['t'+i]?.completedAt);
          return (
            <div key={area} className={'rounded-lg border-2 p-3 '+(allDone?'border-emerald-400 bg-emerald-50':'border-gray-300 bg-white')}>
              <h4 className="font-black text-sm mb-2">{area} CLEANING</h4>
              <div className="space-y-1.5">
                {tasks.map((t, i) => {
                  const taskLog = areaData['t'+i];
                  const done = !!taskLog?.completedAt;
                  const isReminder = t.startsWith('**');
                  if (isReminder) return <div key={i} className="text-xs font-bold text-amber-700 py-0.5">{t}</div>;
                  return (
                    <div key={i} className={'flex items-center justify-between gap-2 py-1 border-b border-gray-100 '+(done?'opacity-60':'')}>
                      <span className={'text-xs '+(done?'line-through text-gray-400':'text-gray-800')}>{t}</span>
                      {done ? (
                        <span className="text-[9px] text-emerald-700 whitespace-nowrap font-medium">✓ {taskLog.initials}</span>
                      ) : (
                        <DowntimeSignBtn onSign={(initials) => {
                          const updated = JSON.parse(JSON.stringify(sched));
                          if (!updated.downtime) updated.downtime = {};
                          if (!updated.downtime[area]) updated.downtime[area] = {};
                          updated.downtime[area]['t'+i] = { initials: initials.toUpperCase(), completedAt: new Date().toISOString() };
                          updated.manuallyEdited = true; updated.editedAt = new Date().toISOString();
                          if (onUpdate) onUpdate(updated);
                        }}/>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
      <p className="text-[10px] text-red-700 font-bold text-center mt-2 no-print">** LET LOD, SUPERVISOR, OR RPH KNOW YOU ARE STEPPING OFF THE FLOOR TO CLEAN DURING DOWNTIME **</p>
      
      {editable && sched.manuallyEdited && <div className="mt-2 text-xs text-amber-600">⚠️ Edited {formatEST(sched.editedAt)}</div>}
    </div>
  );
};

// ============== STAFFING SUMMARY ==============
const StaffingSummary = ({ scheds, allScheds, onSelect, staffReqs, setStaffReqs }) => {
  const [sel, setSel] = useState(null);
  const [month, setMonth] = useState(new Date().getMonth());
  const [year, setYear] = useState(new Date().getFullYear());
  const ideal = sun => sun ? staffReqs.sunday : staffReqs.weekday;
  const blkT = (sun, b) => sun ? (b===1?'10A-12P':b===2?'12P-3P':'3P-6:15P') : (b===1?'9A-12P':b===2?'12P-4:15P':'4P-8:15P');
  const blkName = b => b===1?'Morning':b===2?'Noon':'Evening';
  const issues = s => {
    const id = ideal(s.isSunday), out = [];
    [1,2,3].forEach(b => {
      const bi = b-1;
      if (s.stats['vB'+b] < id.v[bi]) out.push(blkName(b)+' ('+blkT(s.isSunday,b)+'): Vault — have '+s.stats['vB'+b]+', need '+id.v[bi]);
      if (s.stats['rB'+b] < id.r[bi]) out.push(blkName(b)+' ('+blkT(s.isSunday,b)+'): Reception — have '+s.stats['rB'+b]+', need '+id.r[bi]);
      if (s.stats['rgB'+b] < id.rg[bi]) out.push(blkName(b)+' ('+blkT(s.isSunday,b)+'): Registers — have '+s.stats['rgB'+b]+'/6, need '+id.rg[bi]);
    });
    return out;
  };
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dim = new Date(year, month+1, 0).getDate(), fd = new Date(year, month, 1).getDay();
  const days = [...Array(fd).fill(null), ...Array.from({length:dim},(_,i)=>i+1)];
  const getSch = d => d ? sanitizeSched(allScheds[year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0')]) : null;
  const selSch = sel !== null && scheds[sel] ? sanitizeSched(scheds[sel]) : null;
  const selIss = selSch ? issues(selSch) : [];
  
  const updReq = (dayType, pos, blkIdx, val) => {
    const n = val === '' ? 0 : Math.max(0, Math.min(9, parseInt(val) || 0));
    setStaffReqs(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      next[dayType][pos][blkIdx] = n;
      return next;
    });
  };
  
  const ReqInput = ({ dayType, pos, blkIdx }) => (
    <input type="number" min="0" max="9" value={staffReqs[dayType][pos][blkIdx]}
      onChange={e=>updReq(dayType,pos,blkIdx,e.target.value)}
      className="w-10 text-center bg-white/30 border border-white/40 rounded text-sm py-0.5 text-white font-bold"/>
  );
  
  return (
    <div className="fade-in">
      <div className="bg-gradient-to-r from-blue-600 to-blue-800 text-white p-5 rounded-xl mb-6">
        <h2 className="text-xl font-bold mb-3">Minimum Staffing Requirements <span className="text-xs font-normal opacity-75">(click numbers to edit)</span></h2>
        <div className="grid grid-cols-2 gap-4 text-sm">
          <div className="bg-white/15 rounded-lg p-3">
            <h3 className="font-bold mb-2">Monday – Saturday</h3>
            <table className="w-full text-left text-xs">
              <thead><tr className="border-b border-white/30"><th className="py-1">Position</th><th className="py-1">Morning <span className="opacity-60">(9A-12P)</span></th><th className="py-1">Noon <span className="opacity-60">(12P-4:15P)</span></th><th className="py-1">Evening <span className="opacity-60">(4P-8:15P)</span></th></tr></thead>
              <tbody>
                <tr><td className="py-1">Vault</td><td><ReqInput dayType="weekday" pos="v" blkIdx={0}/></td><td><ReqInput dayType="weekday" pos="v" blkIdx={1}/></td><td><ReqInput dayType="weekday" pos="v" blkIdx={2}/></td></tr>
                <tr><td className="py-1">Reception</td><td><ReqInput dayType="weekday" pos="r" blkIdx={0}/></td><td><ReqInput dayType="weekday" pos="r" blkIdx={1}/></td><td><ReqInput dayType="weekday" pos="r" blkIdx={2}/></td></tr>
                <tr><td className="py-1">Registers (of 6)</td><td><ReqInput dayType="weekday" pos="rg" blkIdx={0}/></td><td><ReqInput dayType="weekday" pos="rg" blkIdx={1}/></td><td><ReqInput dayType="weekday" pos="rg" blkIdx={2}/></td></tr>
              </tbody>
            </table>
          </div>
          <div className="bg-white/15 rounded-lg p-3">
            <h3 className="font-bold mb-2">Sunday</h3>
            <table className="w-full text-left text-xs">
              <thead><tr className="border-b border-white/30"><th className="py-1">Position</th><th className="py-1">Morning <span className="opacity-60">(10A-12P)</span></th><th className="py-1">Noon <span className="opacity-60">(12P-3P)</span></th><th className="py-1">Evening <span className="opacity-60">(3P-6:15P)</span></th></tr></thead>
              <tbody>
                <tr><td className="py-1">Vault</td><td><ReqInput dayType="sunday" pos="v" blkIdx={0}/></td><td><ReqInput dayType="sunday" pos="v" blkIdx={1}/></td><td><ReqInput dayType="sunday" pos="v" blkIdx={2}/></td></tr>
                <tr><td className="py-1">Reception</td><td><ReqInput dayType="sunday" pos="r" blkIdx={0}/></td><td><ReqInput dayType="sunday" pos="r" blkIdx={1}/></td><td><ReqInput dayType="sunday" pos="r" blkIdx={2}/></td></tr>
                <tr><td className="py-1">Registers (of 6)</td><td><ReqInput dayType="sunday" pos="rg" blkIdx={0}/></td><td><ReqInput dayType="sunday" pos="rg" blkIdx={1}/></td><td><ReqInput dayType="sunday" pos="rg" blkIdx={2}/></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
      <div className="bg-white rounded-lg card-shadow p-6 mb-6">
        <div className="flex items-center justify-between mb-4">
          <button onClick={()=>{if(month===0){setMonth(11);setYear(year-1);}else setMonth(month-1);}} className="p-2 hover:bg-gray-100 rounded text-xl">←</button>
          <h3 className="font-bold text-xl">Staffing — {months[month]} {year}</h3>
          <button onClick={()=>{if(month===11){setMonth(0);setYear(year+1);}else setMonth(month+1);}} className="p-2 hover:bg-gray-100 rounded text-xl">→</button>
        </div>
        <div className="grid grid-cols-7 gap-2 text-center font-medium text-gray-500 mb-2">{['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=><div key={d}>{d}</div>)}</div>
        <div className="grid grid-cols-7 gap-2">{days.map((d,i) => {
          const s = getSch(d), iss = s ? issues(s) : [], bad = iss.length > 0;
          const today = new Date(), isT = d === today.getDate() && month === today.getMonth() && year === today.getFullYear();
          return <div key={i} onClick={()=>{if(s){const idx=scheds.findIndex(x=>toDateKey(new Date(x.date))===toDateKey(new Date(s.date)));if(idx>=0){setSel(idx);onSelect?.(idx);}}}} className={'p-2 min-h-[70px] rounded-lg border cursor-pointer '+(!d?'bg-gray-50 border-transparent':'hover:bg-gray-50 ')+(s?(bad?'bg-red-50 border-red-300':'bg-emerald-50 border-emerald-300'):'border-gray-200 ')+(isT?'ring-2 ring-blue-500':'')}>{d && <><div className={'font-bold '+(isT?'text-blue-600':'')}>{d}</div>{s && <div className={'text-xs mt-1 '+(bad?'text-red-600':'text-emerald-600')}>{bad?'⚠️ '+iss.length+' issue'+(iss.length>1?'s':''):'✓ OK'}</div>}</>}</div>;
        })}</div>
      </div>
      {selSch && <div className="bg-white rounded-xl p-6 card-shadow">
        <h3 className="text-xl font-bold mb-4">{selSch.fullTitle}</h3>
        {selIss.length === 0 ? <div className="bg-emerald-100 text-emerald-800 p-4 rounded-lg">✓ All positions staffed!</div> : <div className="bg-red-100 text-red-800 p-4 rounded-lg"><p className="font-bold mb-2">⚠️ Shortages:</p><ul className="list-disc list-inside text-sm">{selIss.map((x,i)=><li key={i}>{x}</li>)}</ul></div>}
        <div className="mt-4 grid grid-cols-3 gap-4">{['Vault','Reception','Registers'].map(a => <div key={a} className="bg-gray-50 p-3 rounded-lg"><div className="font-bold text-sm mb-2">{a}</div><div className="text-xs space-y-1">{[1,2,3].map(b=><div key={b} className="flex justify-between"><span>Block {b} ({blkT(selSch.isSunday,b)}):</span><span className="font-bold">{a==='Vault'?selSch.stats['vB'+b]:a==='Reception'?selSch.stats['rB'+b]:selSch.stats['rgB'+b]}</span></div>)}</div></div>)}</div>
      </div>}
    </div>
  );
};

// ============== CLEANING LOGS ==============
const CleaningLogs = ({ logs, onView, allScheds, onClearLog, breakSignups, onClearBreaks, onUpdateSched }) => {
  const today = new Date();
  const [month, setMonth] = useState(today.getMonth());
  const [year, setYear] = useState(today.getFullYear());
  const [selDay, setSelDay] = useState(null);
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dim = new Date(year, month+1, 0).getDate(), fd = new Date(year, month, 1).getDay();
  const days = [...Array(fd).fill(null), ...Array.from({length:dim},(_,i)=>i+1)];
  const getKey = d => d ? year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0') : null;
  const getLogs = d => d ? logs[getKey(d)] || [] : [];
  const getSched = d => d ? allScheds?.[getKey(d)] : null;
  const getBreaks = d => d ? breakSignups?.[getKey(d)] || {} : {};
  const selLogs = selDay ? getLogs(selDay) : [];
  const selSched = selDay ? getSched(selDay) : null;
  const selBreaks = selDay ? getBreaks(selDay) : {};
  const missing = selDay ? CLEANING_AREAS.filter(a => !selLogs.some(l=>l.task===a)) : [];
  const breakCount = d => { const b = getBreaks(d); return Object.values(b).filter(v => v && v.name).length; };
  const breakEntries = Object.entries(selBreaks).filter(([_,v]) => v?.name).sort(([a],[b]) => {
    const toMin = t => { const [time, p] = t.split(' '); const [h,m] = time.split(':'); let hr = parseInt(h); if (p==='PM'&&hr<12) hr+=12; if (p==='AM'&&hr===12) hr=0; return hr*60+parseInt(m); };
    return toMin(a) - toMin(b);
  });
  
  const getAssigned = (task) => {
    if (!selSched || !selSched.cleaning) return null;
    const c = selSched.cleaning.find(x => x.task === task);
    return c?.name && c.name !== 'X' ? c.name : null;
  };
  
  return (
    <div className="fade-in">

        <div className="grid grid-cols-7 gap-2">{days.map((d,i) => {
          const dl = getLogs(d), cnt = new Set(dl.map(l=>l.task)).size, all = cnt===5, part = cnt>0&&cnt<5;
          const bc = breakCount(d);
          const isT = d===today.getDate()&&month===today.getMonth()&&year===today.getFullYear();
          return <div key={i} onClick={()=>d&&setSelDay(d)} className={'p-2 min-h-[70px] rounded-lg border cursor-pointer '+(!d?'bg-gray-50 border-transparent':'hover:bg-gray-50 ')+(all?'bg-emerald-50 border-emerald-300':part?'bg-amber-50 border-amber-300':'border-gray-200 ')+(selDay===d?'ring-2 ring-blue-500':'')+(isT?' border-blue-500 border-2':'')}>{d && <><div className={'font-bold '+(isT?'text-blue-600':'')}>{d}</div>{cnt>0 && <div className={'text-[10px] mt-0.5 '+(all?'text-emerald-600':'text-amber-600')}>{cnt}/5 clean</div>}{bc>0 && <div className="text-[10px] text-blue-600">{bc} break{bc!==1?'s':''}</div>}</>}</div>;
        })}</div>
      </div>
      
      {selDay && <div className="space-y-6">
        {/* === CLEANING LOG === */}
        <div className="bg-white rounded-lg card-shadow p-6">
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-bold text-lg">Cleaning Log — {months[month]} {selDay}, {year}</h3>
            {selLogs.length > 0 && <button onClick={()=>{if(confirm('Clear ALL cleaning logs for this day?')){const key=getKey(selDay);const nl={...logs};delete nl[key];onClearLog?.(nl);}}} className="px-3 py-1 bg-red-500 text-white rounded text-[10px] font-medium hover:bg-red-600">🗑️ Clear All</button>}
          </div>
          {selLogs.length === 0 ? <p className="text-gray-500">No cleaning tasks logged.</p> : <div className="space-y-2">{selLogs.map((l,i)=>{
            const assigned = getAssigned(l.task);
            return <div key={i} className="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
              <div className="flex-1 cursor-pointer hover:bg-gray-100 rounded p-1" onClick={()=>onView?.(l)}>
                <span className="font-bold">{l.task}</span>
                {assigned && <span className="text-gray-400 text-sm ml-1">({assigned})</span>}
                <span className="text-gray-500 ml-2">by {l.initials}</span>
                <span className="text-sm text-gray-400 ml-2">{formatEST(l.completedAt)}</span>
              </div>
              <button onClick={()=>{if(confirm('Clear '+l.task+' log?')){const key=getKey(selDay);const nl={...logs};nl[key]=(nl[key]||[]).filter((_,j)=>j!==i);if(nl[key].length===0) delete nl[key];onClearLog?.(nl);}}} className="ml-2 text-red-400 hover:text-red-600 text-xs" title="Clear this area">✕</button>
            </div>;
          })}</div>}
          {missing.length > 0 && <div className="mt-4 p-3 bg-red-50 rounded-lg"><p className="font-bold text-red-700 text-sm mb-1">⚠️ Missing:</p><div className="text-red-600 text-sm space-y-1">{missing.map((m,i) => {
            const assigned = getAssigned(m);
            return <div key={i}>{m}{assigned && <span className="text-red-400 ml-1">({assigned})</span>}</div>;
          })}</div></div>}
          
          {/* === DOWNTIME CLEANING SUB-SECTION === */}
          {selSched && (() => {
            const sanSched = sanitizeSched(selSched);
            const dt = sanSched?.downtime || {};
            const hasDT = DOWNTIME_AREAS.some(area => {
              const ad = dt[area] || {};

            });
            if (!hasDT) return null;
            const schedKey = getKey(selDay);
            return <div className="mt-4 pt-4 border-t">
              <h4 className="font-bold text-lg mb-3">Downtime Cleaning</h4>
              {DOWNTIME_AREAS.map(area => {
                const areaData = dt[area] || {};
                const tasks = DOWNTIME_TASKS[area] || [];
                const signedTasks = tasks.map((t,i) => ({task: t, log: areaData['t'+i], idx: i})).filter(x => x.log?.completedAt);
                if (signedTasks.length === 0) return null;
                return <div key={area} className="mb-3">
                  <p className="font-bold text-sm text-gray-700 mb-1">{area} CLEANING</p>
                  <div className="space-y-1">{signedTasks.map((st,j) => (
                    <div key={j} className="flex items-center justify-between text-xs p-2 bg-emerald-50 rounded">
                      <span>{st.task}</span>
                      <div className="flex items-center gap-2">
                        <span className="text-emerald-700 font-medium">✓ {st.log.initials} — {formatEST(st.log.completedAt)}</span>
                        <button onClick={()=>{if(confirm('Clear "'+st.task+'" sign-off?')){
                          const updated = JSON.parse(JSON.stringify(sanSched));
                          if (updated.downtime?.[area]) { delete updated.downtime[area]['t'+st.idx]; }
                          onUpdateSched?.(schedKey, updated);
                        }}} className="text-red-400 hover:text-red-600" title="Clear this entry">✕</button>
                      </div>
                    </div>
                  ))}</div>
                </div>;
              })}
            </div>;
          })()}
        </div>
        
        {/* === 15 MIN BREAK SIGN-UP LOG === */}
        <div className="bg-white rounded-lg card-shadow p-6">
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-bold text-lg">15 Min Break Sign-Up — {months[month]} {selDay}, {year}</h3>
            {breakEntries.length > 0 && <button onClick={()=>{if(confirm('Clear all break sign-ups for this day?')){const key=getKey(selDay);const nb={...breakSignups};delete nb[key];onClearBreaks?.(nb);}}} className="px-3 py-1 bg-red-500 text-white rounded text-[10px] font-medium hover:bg-red-600">🗑️ Clear Breaks</button>}
          </div>
          {breakEntries.length === 0 
            ? <p className="text-gray-500">No breaks signed up for this day.</p>
            : <div className="overflow-hidden rounded-lg border border-gray-300">
                <table className="w-full text-sm">
                  <thead><tr className="bg-gray-800 text-white">
                    <th className="px-3 py-2 text-left font-bold">TIME</th>
                    <th className="px-3 py-2 text-left font-bold">NAME</th>
                    <th className="px-3 py-2 text-left font-bold">STATION</th>
                    <th className="px-3 py-2 text-left font-bold">COVERED BY</th>
                  </tr></thead>
                  <tbody>{breakEntries.map(([time, row]) => (
                    <tr key={time} className="border-b">
                      <td className="px-3 py-2 font-bold">{time}</td>
                      <td className="px-3 py-2">{row.name}</td>
                      <td className="px-3 py-2">{row.station || '—'}</td>
                      <td className="px-3 py-2">{row.coveredBy || '—'}</td>

                  ))}</tbody>
                </table>
              </div>
          }
        </div>
      </div>}
    </div>
  );
};

// ============== COVERAGE ALERT ==============
const CoverageAlert = ({ sched: rawSched, staffReqs }) => {
  const sched = sanitizeSched(rawSched);
  if (!sched) return null;
  const sun = sched.isSunday;
  const st = sched.stats;
  const reqs = sun ? staffReqs.sunday : staffReqs.weekday;
  
  const blkLabels = sun 
    ? { 1: { name: 'MORNING', time: '10A-12P' }, 2: { name: 'NOON', time: '12P-3P' }, 3: { name: 'EVENING', time: '3P-6:15P' } }
    : { 1: { name: 'MORNING', time: '9A-12P' }, 2: { name: 'NOON', time: '12P-4:15P' }, 3: { name: 'EVENING', time: '4P-8:15P' } };
  
  const issues = [];
  [1,2,3].forEach(b => {
    const bi = b - 1;
    const blk = [];
    if (sched.lod[bi]?.name === 'X') blk.push({ pos: 'LOD', need: 1, have: 0 });
    const recCount = st['rB'+b];
    if (recCount < reqs.r[bi]) blk.push({ pos: 'Reception', need: reqs.r[bi], have: recCount });
    const regCount = st['rgB'+b];
    if (regCount < reqs.rg[bi]) blk.push({ pos: 'Registers', need: reqs.rg[bi], have: regCount, of: 6 });
    const vaultCount = st['vB'+b];
    if (vaultCount < reqs.v[bi]) blk.push({ pos: 'Vault', need: reqs.v[bi], have: vaultCount });
    if (blk.length > 0) issues.push({ block: b, label: blkLabels[b], items: blk });
  });
  
  if (issues.length === 0) return null;
  
  const totalNeeded = issues.reduce((s, x) => s + x.items.length, 0);
  
  return (
    <div className="bg-red-100 border-2 border-red-500 rounded-lg p-3 mt-4">
      <p className="font-bold text-red-800 text-sm mb-2">⚠️ COVERAGE NEEDED</p>
      <div className="space-y-2">
        {issues.map(({ block, label, items }) => (
          <div key={block} className="bg-white rounded p-2 border border-red-300">
            <div className="flex items-center justify-between mb-1">
              <span className="font-bold text-red-900 text-xs">{label.name} <span className="font-normal text-red-600">({label.time})</span></span>
            </div>
            <div className="text-xs text-red-800 space-y-0.5">
              {items.map((it, i) => (
                <div key={i} className="flex items-center gap-2">
                  <span className="font-bold bg-red-200 px-1.5 py-0.5 rounded text-red-900">x{it.need - it.have} needed</span>
                  <span>{it.pos} — have {it.have}{it.of ? '/'+it.of : ''}, need {it.need}</span>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

// ============== SCHEDULE VALIDATOR - Cross-references master vs daily ==============
const ScheduleValidator = ({ sched: rawSched, emps }) => {
  const sched = sanitizeSched(rawSched);
  if (!sched || !emps || emps.length === 0) return null;
  
  const date = new Date(sched.date);
  date.setHours(12,0,0,0);
  const sun = sched.isSunday;
  const wk = sched.weekNum;
  // Use actual day of week from date, not stored dayNum (which may be wrong on old schedules)
  const dy = date.getDay() === 0 ? 7 : date.getDay(); // 1=Mon...7=Sun
  
  // Collect all names appearing in each block of daily schedule
  const getNamesInBlock = (blockIdx) => {
    const names = new Set();
    const add = (n) => { if (n && n !== 'X' && n !== 'RPH') {
      // Handle split cells: "A 12-2 / B 2-4"
      if (n.includes(' / ')) {
        n.split(' / ').forEach(p => names.add(extractName(p)));
      } else {
        names.add(extractName(n));
      }
    }};
    add(sched.lod[blockIdx]?.name);
    add(sched.reception[blockIdx]?.r1); add(sched.reception[blockIdx]?.r2);
    add(sched.ipad[blockIdx]?.display);
    add(sched.medCheckout[blockIdx]?.mc1); add(sched.medCheckout[blockIdx]?.mc2); add(sched.medCheckout[blockIdx]?.med3au1);
    add(sched.auCheckout[blockIdx]?.au2); add(sched.auCheckout[blockIdx]?.au3); add(sched.auCheckout[blockIdx]?.au4);
    add(sched.vault[blockIdx]?.au); add(sched.vault[blockIdx]?.med);
    return names;
  };
  
  const issues = [];
  
  // For each employee who should be working, verify they're in the schedule for their blocks
  emps.forEach(emp => {
    if (Engine.onPTO(emp, date)) return;
    const shift = wk === 1 ? emp.week1?.[dy] : emp.week2?.[dy];
    if (!shift || shift.toUpperCase() === 'OFF') return;
    
    const { s, e } = Engine.parse(shift);
    if (s < 0) return;
    
    const upName = emp.name.toUpperCase();
    const blocks = [];
    
    // Determine which blocks this employee should appear in
    if (sun) {
      if (s <= 10 && e >= 12) blocks.push(0);
      if (s <= 12 && e >= 15) blocks.push(1);
      if (s <= 15 && e >= 18.25) blocks.push(2);
    } else {
      if (s <= 9 && e >= 12) blocks.push(0);
      if (s <= 12 && e >= 16.25) blocks.push(1);
      if (s <= 16 && e >= 20.25) blocks.push(2);
    }
    
    // Check they appear in each expected block
    const missingBlocks = [];
    blocks.forEach(bIdx => {
      const names = getNamesInBlock(bIdx);
      if (!names.has(upName)) {
        missingBlocks.push(bIdx + 1);
      }
    });
    
    if (missingBlocks.length > 0 && !Engine.vaultOnly(emp)) {
      issues.push({
        name: emp.name,
        shift,
        issue: 'Scheduled ' + shift + ' but missing from block(s) ' + missingBlocks.join(', '),
        severity: 'warning'
      });
    }
  });
  
  // Check for actual conflicts AND duplicates (same person in multiple positions)
  [0, 1, 2].forEach(bIdx => {
    // Track which categories each person appears in AND count total appearances
    const personCats = {};
    const personCount = {};
    const personPositions = {};
    const addCat = (n, cat, pos) => { if (n && n !== 'X' && n !== 'RPH') {
      if (n.includes(' / ')) {
        n.split(' / ').forEach(p => {
          const nm = extractName(p);
          if (!personCats[nm]) personCats[nm] = new Set();
          personCats[nm].add(cat);
          personCount[nm] = (personCount[nm] || 0) + 1;
          if (!personPositions[nm]) personPositions[nm] = [];
          personPositions[nm].push(pos);
        });
      } else {
        const nm = extractName(n);
        if (!personCats[nm]) personCats[nm] = new Set();
        personCats[nm].add(cat);
        personCount[nm] = (personCount[nm] || 0) + 1;
        if (!personPositions[nm]) personPositions[nm] = [];
        personPositions[nm].push(pos);
      }
    }};
    addCat(sched.lod[bIdx]?.name, 'lod', 'LOD');
    addCat(sched.reception[bIdx]?.r1, 'reception', 'Reception 1'); addCat(sched.reception[bIdx]?.r2, 'reception', 'Reception 2');
    addCat(sched.ipad[bIdx]?.display, 'ipad', 'iPad');
    addCat(sched.medCheckout[bIdx]?.mc1, 'register', 'MC1'); addCat(sched.medCheckout[bIdx]?.mc2, 'register', 'MC2'); addCat(sched.medCheckout[bIdx]?.med3au1, 'register', 'MED3/AU1');
    addCat(sched.auCheckout[bIdx]?.au2, 'register', 'AU2'); addCat(sched.auCheckout[bIdx]?.au3, 'register', 'AU3'); addCat(sched.auCheckout[bIdx]?.au4, 'register', 'AU4');
    addCat(sched.vault[bIdx]?.au, 'vault', 'AU Vault'); addCat(sched.vault[bIdx]?.med, 'vault', 'Med Vault');
    
    Object.entries(personCats).forEach(([name, cats]) => {
      // First: check for DUPLICATE assignment (same person in 2+ positions in same block)
      if (personCount[name] > 1) {
        // LOD + register is OK by design
        // Split iPad + AU2 register is OK by design
        const positions = personPositions[name];
        const isLodReg = cats.has('lod') && cats.size <= 2 && (cats.has('register') || cats.has('lod'));
        const hasSplitIpadReg = cats.has('ipad') && cats.has('register') && 
          (sched.ipad[bIdx]?.display?.includes(' / ') || sched.auCheckout[bIdx]?.au2?.includes(' / '));
        
        if (!isLodReg && !hasSplitIpadReg) {
          issues.push({
            name,
            shift: '',
            issue: 'Appears in ' + personCount[name] + ' positions in block ' + (bIdx+1) + ': ' + positions.join(', '),
            severity: 'error'
          });
          return; // Skip further checks for this person since we already flagged them
        }
      }
      
      // Second: check for cross-category conflicts
      const hasSplitIpadReg = cats.has('ipad') && cats.has('register') && 
        (sched.ipad[bIdx]?.display?.includes(' / ') || sched.auCheckout[bIdx]?.au2?.includes(' / '));
      const vaultConflict = cats.has('vault') && (cats.has('register') || cats.has('reception') || cats.has('ipad'));
      const hasConflict = vaultConflict ||
        (cats.has('reception') && cats.has('register')) ||
        (cats.has('ipad') && cats.has('reception')) ||
        (cats.has('ipad') && cats.has('register') && !hasSplitIpadReg);
      
      if (hasConflict) {
        const catList = [...cats].filter(c => c !== 'lod').join(' + ');
        issues.push({
          name,
          shift: '',
          issue: 'On ' + catList + ' in block ' + (bIdx + 1) + ' (conflict)',
          severity: 'error'
        });
      }
    });
  });
  
  // Check for PTO employees appearing in schedule
  emps.forEach(emp => {
    if (!Engine.onPTO(emp, date)) return;
    const upName = emp.name.toUpperCase();
    [0, 1, 2].forEach(bIdx => {
      if (getNamesInBlock(bIdx).has(upName)) {
        issues.push({
          name: emp.name,
          shift: '',
          issue: 'On PTO but appears in block ' + (bIdx + 1),
          severity: 'error'
        });
      }
    });
  });
  
  // Reverse check: flag employees on the daily schedule who are NOT scheduled in the master for this day
  const allDailyNames = new Set();
  [0, 1, 2].forEach(bIdx => getNamesInBlock(bIdx).forEach(n => allDailyNames.add(n)));
  sched.lunches.forEach(l => { if (l.name && l.name !== '') allDailyNames.add(l.name.toUpperCase()); });
  sched.cleaning.forEach(c => { if (c.name && c.name !== 'X') allDailyNames.add(extractName(c.name)); });
  
  allDailyNames.forEach(upName => {
    const emp = emps.find(e => e.name.toUpperCase() === upName);
    if (!emp) return; // Unknown name — could be manually typed, skip
    if (Engine.onPTO(emp, date)) return; // Already flagged by PTO check above
    const shift = wk === 1 ? emp.week1?.[dy] : emp.week2?.[dy];
    if (!shift || shift === '' || shift.toUpperCase() === 'OFF') {
      issues.push({
        name: emp.name,
        shift: 'OFF',
        issue: 'Not scheduled this day (master shows OFF) — manually added',
        severity: 'notice'
      });
    }
  });
  
  if (issues.length === 0) return (
    <div className="bg-emerald-50 border-2 border-emerald-500 rounded-lg p-3 mt-3">
      <p className="font-bold text-emerald-800 text-sm">✓ Cross-Reference: All schedules match master</p>
    </div>
  );
  
  return (
    <div className="bg-amber-50 border-2 border-amber-500 rounded-lg p-3 mt-3">
      <p className="font-bold text-amber-800 text-sm mb-2">⚠️ Schedule Validation ({issues.length} issue{issues.length>1?'s':''})</p>
      <div className="space-y-1 max-h-48 overflow-y-auto">
        {issues.map((x, i) => (
          <div key={i} className={'text-xs p-2 rounded ' + (x.severity === 'error' ? 'bg-red-100 text-red-800' : x.severity === 'notice' ? 'bg-orange-100 text-orange-800' : 'bg-amber-100 text-amber-800')}>
            <span className="font-bold">{x.name}:</span> {x.issue}
          </div>
        ))}
      </div>
    </div>
  );
};

// ============== SMALLER COMPONENTS ==============
const PASS_HASH = '05c0378d73e91e4ef2c39ef5d70dceede6bbde29f541424476895af84662cc6b';
const USER_HASH = '0834c2d60725ac5902257b3b78dd161ad26d1c0290dbf1e47cc14add5b8c8142';

const hashStr = async (str) => {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
};

const LoginModal = ({ onLogin, onClose }) => {
  const [user, setUser] = useState('');
  const [pass, setPass] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);
  const login = async () => {
    setLoading(true);
    setErr('');
    try {
      const [uh, ph] = await Promise.all([hashStr(user), hashStr(pass)]);
      if (uh === USER_HASH && ph === PASS_HASH) onLogin();
      else setErr('Invalid credentials');
    } catch(e) { setErr('Login error'); }
    setLoading(false);
  };
  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50">
      <div className="bg-white rounded-xl p-8 w-full max-w-md card-shadow fade-in">
        <h2 className="text-2xl font-bold mb-6 text-center">Supervisor Login</h2>
        {err && <div className="mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm">{err}</div>}
        <div className="mb-4"><label className="block text-sm font-medium mb-1">Username</label><input value={user} onChange={e=>setUser(e.target.value)} className="w-full px-4 py-3 border rounded-lg"/></div>
        <div className="mb-6"><label className="block text-sm font-medium mb-1">Password</label><input type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&login()} className="w-full px-4 py-3 border rounded-lg"/></div>
        <div className="flex gap-3"><button onClick={login} disabled={loading} className="flex-1 btn-primary px-4 py-3 text-white rounded-lg font-bold disabled:opacity-50">{loading?'Verifying...':'Login'}</button><button onClick={onClose} className="px-4 py-3 bg-gray-200 rounded-lg">Cancel</button></div>
      </div>
    </div>
  );

const Calendar = ({ generated, onClick, allScheds }) => {
  const today = new Date();
  const [month, setMonth] = useState(today.getMonth());
  const [year, setYear] = useState(today.getFullYear());
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dim = new Date(year, month+1, 0).getDate(), fd = new Date(year, month, 1).getDay();
  const days = [...Array(fd).fill(null), ...Array.from({length:dim},(_,i)=>i+1)];
  const getKey = d => d ? year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0') : null;
  const getSch = d => d ? allScheds?.[getKey(d)] : null;
  const hasSchedule = d => { const k = getKey(d); return !!(allScheds?.[k] || generated?.[k]); };
  const isPast = d => d && new Date(year,month,d,23,59) < today;
  
  return (
    <div className="bg-white rounded-lg card-shadow p-4">
      <div className="flex items-center justify-between mb-3">
        <button onClick={()=>{if(month===0){setMonth(11);setYear(year-1);}else setMonth(month-1);}} className="p-1 hover:bg-gray-100 rounded text-lg">←</button>
        <h3 className="font-bold">{months[month]} {year}</h3>
        <button onClick={()=>{if(month===11){setMonth(0);setYear(year+1);}else setMonth(month+1);}} className="p-1 hover:bg-gray-100 rounded text-lg">→</button>
      </div>
      <div className="grid grid-cols-7 gap-1 text-center text-xs font-medium text-gray-500 mb-1">{['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=><div key={d}>{d}</div>)}</div>
      <div className="grid grid-cols-7 gap-1">{days.map((d,i) => {
        const has = hasSchedule(d), isT = d===today.getDate()&&month===today.getMonth()&&year===today.getFullYear();
        const s = getSch(d);
        const times = [generated?.[getKey(d)], s?.editedAt, s?.generatedAt].filter(Boolean);
        const lastTime = times.length > 0 ? times.sort().pop() : null;
        const past = isPast(d) && !has;
        return <div key={i} onClick={()=>d&&onClick(new Date(year,month,d,12,0,0))} className={'p-1 min-h-[55px] text-xs rounded border cursor-pointer hover:bg-gray-50 '+(!d?'bg-gray-50 border-transparent':'')+(has?' bg-emerald-100 border-emerald-400':past?' bg-red-50 border-red-300':' border-gray-200')+(isT?' ring-2 ring-blue-500':'')}>{d && <><div className="flex items-center justify-between"><span className={'font-bold '+(isT?'text-blue-600':'')}>{d}</span><span className="flex items-center gap-0.5">{s?.manuallyEdited && <span className="text-[8px]" title="Manually edited">✏️</span>}{s && s.weekNum ? <span className={'text-[9px] font-bold px-1 rounded '+(s.weekNum===1?'bg-blue-200 text-blue-800':'bg-green-200 text-green-800')}>W{s.weekNum}</span> : null}</span></div>{has && lastTime ? <div className="text-[7px] text-emerald-700 mt-0.5" title={lastTime}>✓ {new Date(lastTime).toLocaleString('en-US',{timeZone:'America/New_York',month:'numeric',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true}).replace(',','')}</div> : past ? <div className="text-[8px] text-red-500 mt-0.5">✗</div> : null}</>}</div>;
      })}</div>
    </div>
  );
};
